/* ══ MÓDULO GARANTÍAS ════════════════════════════════════════════════════ */
function GarantiasSection({gars,ords,cls,tecs,onAdd,onReclamo,onDel}){
  const [q,setQ]=useState("");
  const [estF,setEstF]=useState("Todos");
  const [confirm,setConfirm]=useState(null);
  const [showReclamo,setShowReclamo]=useState(null);
  const hoy=new Date();

  const filt=gars.filter(g=>{
    const cli=cls.find(c=>c.id===g.cliId);
    const mq=!q||g.ordId.toLowerCase().includes(q.toLowerCase())||(cli?.nombre||"").toLowerCase().includes(q.toLowerCase())||g.equipo.toLowerCase().includes(q.toLowerCase());
    const me=estF==="Todos"||g.estado===estF;
    return mq&&me;
  }).map(g=>{
    const vence=new Date(g.fechaVence);
    const diasRestantes=Math.ceil((vence-hoy)/(1000*60*60*24));
    const estado=g.estado==="Reclamada"?"Reclamada":diasRestantes<0?"Expirada":diasRestantes<=7?"Por vencer":"Vigente";
    return {...g,estado,diasRestantes};
  });

  const EST_C={Vigente:["#f0fdf4","#059669"],Expirada:["#f8fafc","#94a3b8"],"Por vencer":["#fffbeb","#d97706"],Reclamada:["#fef2f2","#dc2626"]};

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style=${{padding:"16px 24px",borderBottom:"1px solid rgba(0,0,0,.06)",backdropFilter:"blur(20px) saturate(180%)",WebkitBackdropFilter:"blur(20px) saturate(180%)",background:"rgba(255,255,255,.75)",flexShrink:0,position:"relative",zIndex:1}}>
      <div class="section-header">
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Garantías</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:2}}>
            ${gars.filter(g=>g.estado!=="Expirada"&&g.estado!=="Reclamada").length} activas ·
            <span style=${{color:"#d97706",fontWeight:600}}> ${filt.filter(g=>g.diasRestantes>=0&&g.diasRestantes<=7&&g.estado!=="Reclamada").length} por vencer</span>
          </div>
        </div>
      </div>
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div class="search-bar" style=${{maxWidth:280}}>

/* ══ PANEL NOTIFICACIONES ════════════════════════════════════════════════ */
function NotifPanel({ords,inv,gars,cls,session,onClose,onNavTo}){
  const hoy=new Date();
  const myTecId=session?.tecId||null;
  const isAdmin=session?.rol==="admin";

  // Helper: días desde una fecha
  const diasDesde=(f)=>Math.floor((hoy-new Date(f))/(864e5));
  const diasHasta=(f)=>Math.ceil((new Date(f)-hoy)/(864e5));

  const notifs=[];

  /* ── RECORDATORIOS POR TÉCNICO ────────────────────────────────────── */

  // R1. Fecha de entrega prometida vencida
  ords.filter(o=>o.ent&&o.est!=="Entregado"&&(isAdmin||o.tec===myTecId)).forEach(o=>{
    const dias=diasHasta(o.ent);
    if(dias<0){
      const cli=cls.find(c=>c.id===o.cid);
      const tec=o.tec;
      notifs.push({
        id:"ent"+o.id, tipo:"entrega_vencida", prioridad:1,
        color:"#dc2626", bg:"#fef2f2", borde:"#fecaca",
        icon:"📅",
        titulo:`Entrega vencida hace ${Math.abs(dias)} día${Math.abs(dias)!==1?"s":""}`,
        desc:`${o.id} · ${cli?.nombre||"?"} · ${o.equipo}`,
        sub:`Prometida: ${fmtD(o.ent)} · Estado: ${o.est}`,
        nav:"orders", ordId:o.id
      });
    }
  });

  // R2. Orden sin movimiento +3 días
  ords.filter(o=>o.est!=="Entregado"&&o.est!=="Listo"&&(isAdmin||o.tec===myTecId)).forEach(o=>{
    const dias=diasDesde(o.fecha);
    if(dias>=3){
      const cli=cls.find(c=>c.id===o.cid);
      notifs.push({
        id:"mov"+o.id, tipo:"sin_movimiento", prioridad:2,
        color:"#d97706", bg:"#fffbeb", borde:"#fde68a",
        icon:"⏳",
        titulo:`Sin movimiento por ${dias} día${dias!==1?"s":""}`,
        desc:`${o.id} · ${cli?.nombre||"?"} · ${o.equipo}`,
        sub:`Estado actual: ${o.est}${o.urg==="Urgente"?" · 🔴 URGENTE":""}`,
        nav:"orders", ordId:o.id
      });
    }
  });

  // R3. Orden "Listo" sin entregar +2 días
  ords.filter(o=>o.est==="Listo"&&(isAdmin||o.tec===myTecId)).forEach(o=>{
    const dias=diasDesde(o.fecha);
    if(dias>=2){
      const cli=cls.find(c=>c.id===o.cid);
      notifs.push({
        id:"lst"+o.id, tipo:"listo_pendiente", prioridad:2,
        color:"#059669", bg:"#f0fdf4", borde:"#bbf7d0",
        icon:"✅",
        titulo:`Lista para entrega hace ${dias} día${dias!==1?"s":""}`,
        desc:`${o.id} · ${cli?.nombre||"?"} · ${o.equipo}`,
        sub:`Avisar al cliente para coordinar entrega`,
        nav:"orders", ordId:o.id
      });
    }
  });

  /* ── ALERTAS GENERALES (solo admin) ──────────────────────────────── */
  if(isAdmin){
    // Stock bajo
    inv.filter(i=>i.stock<=3).forEach(i=>{
      notifs.push({
        id:"i"+i.id, tipo:"stock", prioridad:3,
        color:"#ea580c", bg:"#fff7ed", borde:"#fed7aa",
        icon:"📦",
        titulo:`Stock bajo — ${i.nombre}`,
        desc:`Solo ${i.stock} unidad${i.stock!==1?"es":""} disponible${i.stock!==1?"s":""}`,
        sub:"Considera hacer un pedido pronto",
        nav:"inv"
      });
    });

    // Garantías por vencer
    gars.forEach(g=>{
      const dias=diasHasta(g.fechaVence);
      if(dias>=0&&dias<=7&&g.estado!=="Reclamada"){
        const cli=cls.find(c=>c.id===g.cliId);
        notifs.push({
          id:"g"+g.id, tipo:"garantia", prioridad:3,
          color:"#7c3aed", bg:"#f5f3ff", borde:"#ddd6fe",
          icon:"🛡️",
          titulo:`Garantía por vencer — ${g.ordId}`,
          desc:`${cli?.nombre||"?"} · ${g.equipo}`,
          sub:`Vence ${dias===0?"hoy":dias===1?"mañana":"en "+dias+" días"}`,
          nav:"garantias"
        });
      }
    });
  }

  // Ordenar por prioridad
  notifs.sort((a,b)=>a.prioridad-b.prioridad);

  const grupos=[
    {label:"🔴 Entregas vencidas",   tipos:["entrega_vencida"]},
    {label:"⏳ Sin movimiento",       tipos:["sin_movimiento"]},
    {label:"✅ Listos sin entregar",  tipos:["listo_pendiente"]},
    {label:"📦 Stock bajo",           tipos:["stock"]},
    {label:"🛡️ Garantías",           tipos:["garantia"]},
  ];

  return html`<div style=${{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",padding:"60px 16px 16px",background:"rgba(0,0,0,.18)"}} onClick=${onClose}>
    <div class="modal fade-in" style=${{width:420,maxHeight:"84vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 80px rgba(0,0,0,.25)"}} onClick=${e=>e.stopPropagation()}>

      <!-- Header -->
      <div style=${{padding:"18px 22px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:34,height:34,borderRadius:9,background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <${Ic} n="bell" z=${17} s="#1d4ed8"/>
          </div>
          <div>
            <div style=${{fontSize:15,fontWeight:700,color:"#0f172a"}}>Recordatorios</div>
            <div style=${{fontSize:11,color:"#94a3b8",marginTop:1}}>${notifs.length===0?"Sin alertas":notifs.length+" alerta"+( notifs.length!==1?"s":"")+" pendiente"+(notifs.length!==1?"s":"")}</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
      </div>

      <!-- Body -->
      <div style=${{overflowY:"auto",flex:1}}>
        ${notifs.length===0
          ?html`<div style=${{padding:"48px 24px",textAlign:"center",color:"#94a3b8"}}>
            <div style=${{fontSize:40,marginBottom:12}}>🎉</div>
            <div style=${{fontWeight:700,fontSize:15,color:"#475569",marginBottom:6}}>¡Todo en orden!</div>
            <div style=${{fontSize:13,lineHeight:1.6}}>No hay órdenes vencidas<br/>ni alertas pendientes</div>
          </div>`
          :grupos.map(({label,tipos})=>{
            const items=notifs.filter(n=>tipos.includes(n.tipo));
            if(!items.length) return null;
            return html`<div key=${label}>
              <div style=${{padding:"8px 22px 4px",fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,background:"#f8fafc",borderBottom:"1px solid #f1f5f9"}}>${label} · ${items.length}</div>
              ${items.map(n=>html`
                <div key=${n.id} onClick=${()=>{onNavTo(n.nav);onClose();}}
                  style=${{padding:"13px 20px",borderBottom:"1px solid #f8fafc",cursor:"pointer",
                    display:"flex",gap:12,alignItems:"flex-start",
                    borderLeft:"3px solid",borderLeftColor:n.borde,
                    transition:"background .1s"}}
                  onMouseOver=${e=>{e.currentTarget.style.background=n.bg}}
                  onMouseOut=${e=>{e.currentTarget.style.background="#fff"}}>
                  <div style=${{fontSize:20,flexShrink:0,marginTop:1}}>${n.icon}</div>
                  <div style=${{flex:1,minWidth:0}}>
                    <div style=${{fontWeight:700,fontSize:12,color:n.color,marginBottom:2}}>${n.titulo}</div>
                    <div style=${{fontSize:12,color:"#1e293b",fontWeight:500,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${n.desc}</div>
                    <div style=${{fontSize:11,color:"#94a3b8"}}>${n.sub}</div>
                  </div>
                  <${Ic} n="chevron" z=${14} s="#cbd5e1"/>
                </div>`)}
            </div>`;
          })}
      </div>

      <!-- Footer -->
      ${notifs.length>0&&html`<div style=${{padding:"12px 20px",borderTop:"1px solid #f1f5f9",background:"#f8fafc",flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style=${{fontSize:11,color:"#94a3b8"}}>Toca una alerta para ir a la orden</span>
        <button class="btn btn-ghost btn-sm" onClick=${()=>{onNavTo("orders");onClose();}}>Ver órdenes</button>
      </div>`}
    </div>
  </div>`;
}

    const file=e.target.files[0]; if(!file) return;

/* ══ BÚSQUEDA GLOBAL (Ctrl+K) ═══════════════════════════════════════════ */
function GlobalSearch({ords,cls,inv,cots,onNav,onClose}){
  const [q,setQ]=useState("");
  const inputRef=React.useRef();

  React.useEffect(()=>{
    inputRef.current?.focus();
  },[]);

  const results=React.useMemo(()=>{
    const t=q.trim().toLowerCase();
    if(t.length<2) return [];
    const out=[];

    // Órdenes
    ords.forEach(o=>{
      const cl=cls.find(x=>x.id===o.cid);
      const hay=[o.id,o.equipo,o.serie,o.prob,cl?.nombre,cl?.tel,cl?.email].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"orden", icon:"🔧", color:"#7c3aed",
        titulo:o.id+" — "+o.equipo,
        sub:(cl?.nombre||"?")+" · "+o.est,
        nav:"orders", id:o.id
      });
    });

    // Clientes
    cls.forEach(cl=>{
      const hay=[cl.nombre,cl.tel,cl.email,cl.empresa].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"cliente", icon:"👤", color:"#0891b2",
        titulo:cl.nombre,
        sub:[cl.empresa,cl.tel,cl.email].filter(Boolean).join(" · "),
        nav:"clients", id:cl.id
      });
    });

    // Inventario
    inv.forEach(i=>{
      const hay=[i.nombre,i.id,i.cat,i.notas].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"inventario", icon:"📦", color:"#d97706",
        titulo:i.nombre,
        sub:(i.cat?i.cat+" · ":"")+"Stock: "+i.stock+(i.stock<=3?" ⚠️":""),
        nav:"inv", id:i.id
      });
    });

    // Cotizaciones
    cots.forEach(ct=>{
      const cl=cls.find(x=>x.id===ct.cid);
      const hay=[ct.id,cl?.nombre,ct.descripcion,ct.ref].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"cotización", icon:"📋", color:"#059669",
        titulo:ct.id+" — "+(cl?.nombre||"?"),
        sub:(ct.descripcion||ct.ref||"")+" · "+mxn(ct.tot||0),
        nav:"cots", id:ct.id
      });
    });

    return out.slice(0,12);
  },[q,ords,cls,inv,cots]);

  const TIPO_ORDER=["orden","cliente","inventario","cotización"];
  const grouped=TIPO_ORDER.map(t=>({tipo:t,items:results.filter(r=>r.tipo===t)})).filter(g=>g.items.length>0);

  const [sel,setSel]=useState(0);
  const flat=results;

  function handleKey(e){
    if(e.key==="ArrowDown"){e.preventDefault();setSel(p=>Math.min(p+1,flat.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setSel(p=>Math.max(p-1,0));}
    else if(e.key==="Enter"&&flat[sel]){onNav(flat[sel].nav);onClose();}
    else if(e.key==="Escape") onClose();
  }

  return html`<div style=${{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80}} onClick=${onClose}>
    <div style=${{width:"100%",maxWidth:580,background:"var(--mac-bg)",borderRadius:14,boxShadow:"0 24px 64px rgba(0,0,0,.3)",overflow:"hidden"}} onClick=${e=>e.stopPropagation()}>

      <!-- Input -->
      <div style=${{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:"1px solid var(--mac-rim)"}}>
        <span style=${{fontSize:18}}>🔍</span>
        <input ref=${inputRef} value=${q} onChange=${e=>{setQ(e.target.value);setSel(0);}}
          onKeyDown=${handleKey}
          placeholder="Buscar órdenes, clientes, inventario, cotizaciones…"
          style=${{flex:1,border:"none",outline:"none",fontSize:15,background:"transparent",color:"var(--mac-ink)",fontFamily:"inherit"}}/>
        ${q&&html`<button onClick=${()=>setQ("")} style=${{background:"none",border:"none",cursor:"pointer",color:"var(--mac-ink4)",fontSize:18,lineHeight:1,padding:"0 4px"}}>✕</button>`}
        <kbd style=${{fontSize:10,padding:"2px 6px",borderRadius:5,background:"var(--mac-surface2)",border:"1px solid var(--mac-rim)",color:"var(--mac-ink4)",fontFamily:"monospace"}}>ESC</kbd>
      </div>

      <!-- Results -->
      <div style=${{maxHeight:420,overflowY:"auto"}}>
        ${q.trim().length<2&&html`
          <div style=${{padding:"28px 20px",textAlign:"center"}}>
            <div style=${{fontSize:28,marginBottom:8}}>⌨️</div>
            <div style=${{fontSize:13,fontWeight:600,color:"var(--mac-ink2)"}}>Escribe para buscar</div>
            <div style=${{fontSize:11,color:"var(--mac-ink4)",marginTop:4}}>Órdenes · Clientes · Inventario · Cotizaciones</div>
            <div style=${{display:"flex",gap:8,justifyContent:"center",marginTop:14,flexWrap:"wrap"}}>
              ${[["🔧","Órdenes","orders"],["👤","Clientes","clients"],["📦","Inventario","inv"],["📋","Cotizaciones","cots"]].map(([ic,lbl,nav])=>html`
                <button key=${nav} onClick=${()=>{onNav(nav);onClose();}} style=${{
                  padding:"6px 12px",borderRadius:8,border:"1px solid var(--mac-rim)",
                  background:"var(--mac-surface)",cursor:"pointer",fontFamily:"inherit",
                  fontSize:11,fontWeight:600,color:"var(--mac-ink3)",display:"flex",alignItems:"center",gap:5}}>
                  ${ic} ${lbl}
                </button>`)}
            </div>
          </div>`}

/* ── Panel lateral de eventos del día ───────────────────────────────────── */
function CalDayPanel({fecha,eventos,cls,ords,tecs,onAddCita,onAddRec,onEditCita,onEditRec,onDelCita,onDelRec,onSyncGCal,onClose}){
  const [syncing,setSyncing]=useState({});

  async function handleSync(ev){
    setSyncing(p=>({...p,[ev.id]:true}));
    const gasUrl=localStorage.getItem("redcom_gas_url");
    if(!gasUrl){alert("Configura la URL del GAS en Preferencias → Google Drive.");setSyncing(p=>({...p,[ev.id]:false}));return;}
    const res=await onSyncGCal("calendar_create",{
      title:ev.titulo||(EV_TIPOS[ev.tipo]?.icon+" "+ev.tipo),
      date:ev.fecha,
      time:ev.hora||"09:00",
      description:ev.notas||"",
      tipo:ev.tipo,
    });
    setSyncing(p=>({...p,[ev.id]:false}));
    if(res?.ok){alert("✅ Evento sincronizado con Google Calendar");}
    else{alert("❌ Error al sincronizar: "+(res?.error||"Sin respuesta del GAS"));}
  }

  const fmtFecha=f=>{try{const [y,m,d]=f.split("-");const names=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return d+" "+names[parseInt(m)-1]+" "+y;}catch{return f;}};

  return html`<div style=${{width:320,flexShrink:0,background:"var(--mac-bg)",borderLeft:"1px solid var(--mac-rim)",display:"flex",flexDirection:"column",height:"100%"}}>
    <div style=${{padding:"14px 16px",borderBottom:"1px solid var(--mac-rim)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--mac-surface)"}}>
      <div>
        <div style=${{fontSize:14,fontWeight:800,color:"var(--mac-ink)"}}>${fmtFecha(fecha)}</div>
        <div style=${{fontSize:11,color:"var(--mac-ink4)",marginTop:1}}>${eventos.length} evento${eventos.length!==1?"s":""}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${13}/></button>
    </div>

    <div style=${{display:"flex",gap:6,padding:"10px 12px",borderBottom:"1px solid var(--mac-rim)",flexShrink:0}}>
      <button class="btn btn-primary btn-sm" style=${{flex:1,justifyContent:"center",fontSize:11}} onClick=${onAddCita}>
        📅 Cita
      </button>
      <button class="btn btn-sm" style=${{flex:1,justifyContent:"center",fontSize:11,background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}} onClick=${onAddRec}>
        🔔 Recordatorio
      </button>
    </div>

    <div style=${{flex:1,overflowY:"auto",padding:10,display:"flex",flexDirection:"column",gap:8}}>
      ${eventos.length===0
        ?html`<div style=${{textAlign:"center",padding:"30px 0",color:"var(--mac-ink4)"}}>
            <div style=${{fontSize:28,marginBottom:8}}>📭</div>
            <div style=${{fontSize:12}}>Sin eventos este día</div>
          </div>`
        :eventos.map(ev=>{
          const tp=EV_TIPOS[ev.tipo]||EV_TIPOS.cita;
          const ord=ev.ordId?ords.find(o=>o.id===ev.ordId):null;
          const cl=ev.cliId?cls.find(x=>x.id===ev.cliId):ord?cls.find(x=>x.id===ord.cid):null;
          const tec=ev.tecId?tecs.find(t=>t.id===ev.tecId):null;
          const isSyncing=syncing[ev.id];
          return html`<div key=${ev.id} style=${{background:tp.bg,border:"1.5px solid",borderColor:tp.color+"44",borderRadius:10,padding:"10px 12px"}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style=${{display:"flex",alignItems:"center",gap:6}}>
                <span style=${{fontSize:14}}>${tp.icon}</span>
                <div style=${{fontSize:12,fontWeight:700,color:tp.color}}>${ev.titulo||tp.label}</div>
              </div>
              <div style=${{fontSize:11,fontFamily:"monospace",color:tp.color,flexShrink:0,marginLeft:8}}>${ev.hora||""}</div>
            </div>
            ${ev.notas&&html`<div style=${{fontSize:11,color:"var(--mac-ink3)",marginBottom:4,fontStyle:"italic"}}>${ev.notas}</div>`}
            ${cl&&html`<div style=${{fontSize:10,color:"var(--mac-ink4)"}}>👤 ${cl.nombre}</div>`}
            ${ord&&html`<div style=${{fontSize:10,color:"var(--mac-ink4)"}}>🔧 ${ord.id} · ${ord.equipo}</div>`}
            ${tec&&html`<div style=${{fontSize:10,color:"var(--mac-ink4)"}}>👷 ${tec.nombre}</div>`}
            <div style=${{display:"flex",gap:5,marginTop:8,justifyContent:"flex-end"}}>
              ${ev.gcEventId
                ?html`<span style=${{fontSize:9,color:"#059669",fontWeight:700}}>✓ Google Cal</span>`
                :html`<button class="btn btn-ghost btn-sm" style=${{fontSize:10,padding:"3px 8px"}}
                    onClick=${()=>handleSync(ev)} disabled=${isSyncing}>
                    ${isSyncing?"⏳":"📅"} ${isSyncing?"Sincronizando…":"Sync GCal"}
                  </button>`}
              ${ev._tipo==="cita"&&html`
                <button class="btn btn-ghost btn-sm" style=${{padding:"3px 6px"}} onClick=${()=>onEditCita(ev)}><${Ic} n="edit" z=${11}/></button>

/* ══ CALENDARIO SECTION ══════════════════════════════════════════════════ */
function CalendarioSection({ords,cls,tecs,citas,recs,session,config,onSaveCita,onDelCita,onSaveRec,onDelRec,onSyncGCal}){
  const hoy = new Date().toISOString().slice(0,10);
  const [cur,setCur]   = useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [selDay,setSelDay] = useState(null);
  const [showCitaModal,setShowCitaModal] = useState(false);
  const [showRecModal,setShowRecModal]   = useState(false);
  const [editCita,setEditCita] = useState(null);
  const [editRec,setEditRec]   = useState(null);
  const [syncingAll,setSyncingAll] = useState(false);

  const {y,m} = cur;
  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  // Build all events for this month
  function buildEventos(fecha){
    const ev=[];
    // Entregas de órdenes
    ords.filter(o=>o.ent===fecha&&o.est!=="Entregado").forEach(o=>{
      const cl=cls.find(x=>x.id===o.cid);
      ev.push({id:"ent-"+o.id,tipo:"entrega",_tipo:"ord",titulo:"Entrega: "+o.equipo+(cl?" · "+cl.nombre:""),hora:"",ordId:o.id,cliId:o.cid,fecha,notas:o.notas||"",gcEventId:null});
    });
    // Urgentes activas
    ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado"&&o.fecha===fecha).forEach(o=>{
      const cl=cls.find(x=>x.id===o.cid);
      ev.push({id:"urg-"+o.id,tipo:"urgente",_tipo:"ord",titulo:"🚨 URGENTE: "+o.equipo+(cl?" · "+cl.nombre:""),hora:"",ordId:o.id,cliId:o.cid,fecha,notas:o.prob||"",gcEventId:null});
    });
    // Citas
    citas.filter(c=>c.fecha===fecha).forEach(c=>{
      ev.push({...c,tipo:c.tipo||"cita",_tipo:"cita"});
    });
    // Recordatorios
    recs.filter(r=>r.fecha===fecha).forEach(r=>{
      ev.push({...r,tipo:"recordatorio",_tipo:"rec"});
    });
    return ev.sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));
  }

  // Calendar grid
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const fmtDate=(d)=>y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  const selEvs = selDay ? buildEventos(fmtDate(selDay)) : [];

  // Stats for the month
  const mesStr=y+"-"+String(m+1).padStart(2,"0");
  const entregas=ords.filter(o=>o.ent?.startsWith(mesStr)&&o.est!=="Entregado").length;
  const urgentes=ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado").length;
  const citasMes=citas.filter(c=>c.fecha.startsWith(mesStr)).length;
  const recsMes=recs.filter(r=>r.fecha.startsWith(mesStr)).length;

  function prevMes(){setCur(p=>{const mm=p.m===0?11:p.m-1;const yy=p.m===0?p.y-1:p.y;return{y:yy,m:mm};});}
  function nextMes(){setCur(p=>{const mm=p.m===11?0:p.m+1;const yy=p.m===11?p.y+1:p.y;return{y:yy,m:mm};});}

  async function syncAllToGCal(){
    const gasUrl=localStorage.getItem("redcom_gas_url");
    if(!gasUrl){alert("Configura la URL del GAS primero en Preferencias.");return;}
    setSyncingAll(true);
    let ok=0,err=0;
    const todos=[...citas,...recs];
    for(const ev of todos){
      if(ev.gcEventId) continue;
      const res=await onSyncGCal("calendar_create",{
        title:ev.titulo||(ev.tipo||"Recordatorio"),
        date:ev.fecha,
        time:ev.hora||"09:00",
        description:ev.notas||"",
        tipo:ev.tipo||"recordatorio",
      });
      if(res?.ok){ok++;}else{err++;}
    }
    setSyncingAll(false);
    alert("Sync completo: "+ok+" eventos enviados"+(err>0?", "+err+" errores":"")+".");
  }

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>

    <!-- Header -->
    <div style=${{background:"var(--mac-bg)",borderBottom:"1px solid var(--mac-rim)",padding:"12px 20px",flexShrink:0}}>
      <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <!-- Mes nav -->
        <button class="btn btn-ghost btn-sm" onClick=${prevMes}>‹</button>
        <div style=${{fontSize:18,fontWeight:800,color:"var(--mac-ink)",minWidth:180,textAlign:"center"}}>${MESES[m]} ${y}</div>
        <button class="btn btn-ghost btn-sm" onClick=${nextMes}>›</button>
        <button class="btn btn-ghost btn-sm" onClick=${()=>setCur({y:new Date().getFullYear(),m:new Date().getMonth()})} style=${{fontSize:11}}>Hoy</button>
        <div style=${{marginLeft:"auto",display:"flex",gap:8}}>
          <button class="btn btn-ghost btn-sm" onClick=${syncAllToGCal} disabled=${syncingAll}
            title="Sincronizar todas las citas y recordatorios con Google Calendar"
            style=${{fontSize:11,display:"flex",alignItems:"center",gap:5,color:"#059669",borderColor:"#bbf7d0"}}>
            ${syncingAll?"⏳ Sincronizando…":"📅 Sync Google Calendar"}
          </button>
          <button class="btn btn-primary btn-sm" onClick=${()=>{setEditCita(null);setShowCitaModal(true);}} style=${{fontSize:11}}>
            📅 Nueva cita
          </button>
          <button class="btn btn-sm" style=${{fontSize:11,background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}
            onClick=${()=>{setEditRec(null);setShowRecModal(true);}}>
            🔔 Recordatorio
          </button>
        </div>
      </div>

      <!-- Stats rápidas -->
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        ${[
          ["📦","Entregas",entregas,"#1d4ed8","#eff6ff"],
          ["🚨","Urgentes",urgentes,"#dc2626","#fef2f2"],
          ["📅","Citas",citasMes,"#7c3aed","#f5f3ff"],
          ["🔔","Recordatorios",recsMes,"#d97706","#fffbeb"],
        ].map(([ic,lbl,n,col,bg])=>html`
          <div key=${lbl} style=${{background:bg,border:"1px solid",borderColor:col+"33",borderRadius:8,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
            <span style=${{fontSize:12}}>${ic}</span>
            <span style=${{fontSize:11,fontWeight:700,color:col}}>${n} ${lbl}</span>
          </div>`)}
        <!-- Leyenda -->
        <div style=${{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          ${Object.entries(EV_TIPOS).map(([k,v])=>html`

  const sub=subtotalMat+subtotalMO;

    setSelInv("");setQty(1);

    const txt=aiInput.trim(); if(!txt||aiLoading) return;

Responde ÚNICAMENTE con un JSON array válido (sin texto extra, sin markdown, sin bloques de código):
[{"nombre":"...","cat":"...","qty":1,"costo":0,"precio":0,"unidad":"pza"}]
Categorías válidas: "Cableado Estructurado","Videovigilancia IP","Videovigilancia Analógica","Redes","Almacenamiento","Hardware","Ferretería","Consumible","Mano de Obra","Otro"
Unidades válidas: "pza","m","tira","bote","caja","rollo","lote","serv"

Tubería conduit galv 3/4" 3m: costo 100, precio 165. Coples+abrazaderas lote: costo 180, precio 290.
Caja superficie 1 puerto: costo 50, precio 85. Patch cord 1m: costo 38, precio 65. Patch cord 2m: costo 50, precio 85.
Canaleta PVC 40x25mm 2m: costo 55, precio 95. Canaleta PVC 60x40mm 2m: costo 85, precio 145.
Cámara AHD domo 2MP: costo 370, precio 580. DVR 4ch 1080p: costo 780, precio 1200. Fuente 12V 5A CCTV: costo 195, precio 320.
Router TP-Link AC1200: costo 510, precio 780. Switch 8p Gigabit: costo 350, precio 550.
MO media jornada: precio 500. MO jornada completa: precio 850. MO instalación CCTV 4 cam: precio 1200. MO punto red Cat6: precio 450.
Devuelve SOLO el array JSON, sin ningún texto antes o después.`;
    try{
      const res=await fetch(gasUrl,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({
          action:"ai",
          system:sysPrompt,
          messages:[{role:"user",content:`Agrega estos artículos a la cotización (responde solo JSON array): ${txt}`}]

      });
      const data=await res.json();
      if(!data.ok){setAiMsg("❌ Error del servidor IA: "+(data.error||"Sin respuesta"));setAiLoading(false);return;}
      const raw=(data.reply||"").replace(/```json|```/g,"").trim();

      if(!match){setAiMsg("⚠️ La IA no devolvió una lista válida. Intenta de nuevo siendo más específico.");setAiLoading(false);return;}
      const items=JSON.parse(match[0]);

      setCalc(p=>({...p,items:[...p.items,...items.map((it,idx)=>({...it,id:Date.now()+"_ai_"+idx,costo:Number(it.costo)||0,precio:Number(it.precio)||0,qty:Number(it.qty)||1}))]}));

    <!-- MODAL GUARDADAS -->
    ${viewSaved&&html`<div class="modal-bg" onClick=${()=>setViewSaved(null)}>

            <div key=${s.id} style=${{border:"1px solid #e2e8f0",borderRadius:10,padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,background:"#fff"}}>

              <div style=${{display:"flex",gap:4}}>
                <button class="btn btn-ghost btn-sm" onClick=${()=>loadCalc(s)} title="Cargar"><${Ic} n="edit" z=${13}/></button>

                <button class="btn btn-danger btn-sm" onClick=${()=>delCalc(s.id)} title="Eliminar"><${Ic} n="trash" z=${13} s="#dc2626"/></button>

  </div>`;
}

  const [showNewUser,setNewUser]=useState(false);
  const [editUser,setEditUser]=useState(null);

    try{
      const s=localStorage.getItem("redcom_notas");

  });
  const [gas,setGas]=useState(()=>{try{return localStorage.getItem(GAS_KEY)||"";}catch(e){return "";}});
  const [syncSt,setSyncSt]=useState("idle"); // idle | saving | ok | error | loading
  const [showGasModal,setShowGasModal]=useState(false);

  const [darkTick,setDarkTick]=useState(0);
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [showSearch,setShowSearch]=useState(false);
  const [config,setConfig]=useState(()=>lsGet("redcom_config",{
    titulo:"Redcom — Sistema de Reparaciones",
    logo:"",
    empresa:"Redcom — Redes · Cómputo · Videovigilancia",
    ciudad:"Los Mochis, Sinaloa",
    tel:"",email:"",web:"",
    calle:"",numExt:"",cp:"",pais:"México",estado:"Sinaloa",
    darkMode:false,
    terminos:`• Los precios no incluyen instalación salvo que se especifique.
• Se requiere el 50% de anticipo para iniciar el proyecto.
• Garantía de 90 días en mano de obra. Garantía de fábrica en equipos.
• Redcom no se hace responsable de daños por mal uso del equipo después de la entrega.`
  }));
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=768);
  React.useEffect(()=>{
    function hk(e){if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setShowSearch(p=>!p);}if(e.key==="Escape")setShowSearch(false);}
    window.addEventListener("keydown",hk);

    React.useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  /* ══ FIRESTORE: sincronización en tiempo real ══════════════════════ */
  React.useEffect(()=>{
    if(!window.fbDb) return;
    // Cargar seqs desde Firestore al inicio (para sincronizar contadores)
    fbLoad("redcom_seqs").then(s=>{
      if(!s) return;
      if(s.OTS>OTS)    OTS=s.OTS;
      if(s.PRES>PRES)  PRES=s.PRES;
      if(s.CLISEQ>CLISEQ) CLISEQ=s.CLISEQ;
      if(s.INVSEQ>INVSEQ) INVSEQ=s.INVSEQ;
      if(s.TECSEQ>TECSEQ) TECSEQ=s.TECSEQ;
      if(s.COTSEQ>COTSEQ) COTSEQ=s.COTSEQ;
      if(s.PAGOQ>PAGOQ)   PAGOQ=s.PAGOQ;
      if(s.GARSEQ>GARSEQ) GARSEQ=s.GARSEQ;
    });

    // Listeners en tiempo real — cada colección actualiza el estado local
    const watch=(key,setter)=>window.fbDb.collection(FB_COL).doc(key)
      .onSnapshot({includeMetadataChanges:false}, snap=>{
        if(!snap.exists) return;
        if(snap.metadata.hasPendingWrites) return; // ignorar escrituras locales
        const val=snap.data().data;
        if(!val) return;
        setter(val);
        try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}
      }, err=>console.warn("onSnapshot["+key+"]:",err));

    const unsubs=[
      watch("redcom_ords",   setOrds),
      watch("redcom_cls",    setCls),
      watch("redcom_inv",    setInv),
      watch("redcom_tecs",   setTecs),
      watch("redcom_buds",   setBuds),
      watch("redcom_pagos",  setPagos),
      watch("redcom_cots",   setCots),
      watch("redcom_gars",   setGars),
      watch("redcom_provs",  setProvs),
      watch("redcom_ocs",    setOcs),
      watch("redcom_svcs",   setSvcs),
      watch("redcom_citas",  setCitas),
      watch("redcom_recs",   setRecs),
      watch("redcom_cortes", setCortes),
      watch("redcom_users",  setUsers),
      watch("redcom_config", (cfg)=>{
        // Migración automática del nombre de empresa
        const OLD=["Redcom Servicio Técnico en Cómputo","Redcom Servicio Técnico","Redcom — Servicio Técnico"];
        const NEW="Redcom — Redes · Cómputo · Videovigilancia";
        if(cfg && OLD.includes(cfg.empresa)){
          const updated={...cfg, empresa:NEW};
          setConfig(updated);
          lsSet("redcom_config", updated);
          fbSet("redcom_config", updated);
        } else {
          setConfig(cfg);
        }
      }),
      watch("redcom_notas",  setNotas),
    ];
    window._fbSyncOk=true;
    return()=>{ unsubs.forEach(u=>u()); window._fbSyncOk=false; };
  },[]); // solo al montar
  React.useEffect(()=>{
    window._syncStatus=setSyncSt;
    // Drive ya NO carga la base de datos al iniciar.
    // Firebase Firestore es la única fuente de verdad.
  },[gas]);
  const [tarifaMO,setTarifaMO]=useState(200);

  // Navigation
  const [sec,setSec]=useState("orders");
  const [view,setView]=useState("list");
  const [q,setQ]=useState("");
  const [fst,setFst]=useState("Todos");
  const [sel,setSel]=useState(null);

  // Modals
  const [showNewOrd,setNewOrd]=useState(false);
  const [editOrd,setEditOrd]=useState(null);
  const [budOrd,setBudOrd]=useState(null);
  const [showNewCli,setNewCli]=useState(false);
  const [editCli,setEditCli]=useState(null);
  const [showNewInv,setNewInv]=useState(false);
  const [editInv,setEditInv]=useState(null);
  const [showNewTec,setNewTec]=useState(false);
  const [editTec,setEditTec]=useState(null);

  function getAllData(){return{ords,cls,inv,tecs,buds,notas,users,svcs,cots,pagos,cortes,gars,provs,ocs,config,seqs:{OTS,PRES,CLISEQ,INVSEQ,TECSEQ,USERSEQ,SVSEQ,COTSEQ,PAGOQ,CORTEQ,GARSEQ,PRVSEQ,OCMPSEQ}};}
  const isAdmin=session?.rol==="admin";
  const notifCount=React.useMemo(()=>{
    const hoy=new Date();
    const myTecId=session?.tecId||null;
    const isAdm=session?.rol==="admin";
    let n=0;
    // R1. Fecha entrega vencida
    ords.filter(o=>o.ent&&o.est!=="Entregado"&&(isAdm||o.tec===myTecId)).forEach(o=>{
      if(Math.ceil((new Date(o.ent)-hoy)/(864e5))<0) n++;
    });
    // R2. Sin movimiento +3 días
    ords.filter(o=>o.est!=="Entregado"&&o.est!=="Listo"&&(isAdm||o.tec===myTecId)).forEach(o=>{
      if(Math.floor((hoy-new Date(o.fecha))/(864e5))>=3) n++;
    });
    // R3. Listo sin entregar +2 días
    ords.filter(o=>o.est==="Listo"&&(isAdm||o.tec===myTecId)).forEach(o=>{
      if(Math.floor((hoy-new Date(o.fecha))/(864e5))>=2) n++;
    });
    // Stock bajo y garantías (solo admin)
    if(isAdm){
      inv.filter(i=>i.stock<=3).forEach(()=>n++);
      gars.forEach(g=>{const d=Math.ceil((new Date(g.fechaVence)-hoy)/(864e5));if(d>=0&&d<=7&&g.estado!=="Reclamada")n++;});
    }
    return n;
  },[ords,inv,gars,session]);
  const canCotizar=isAdmin||session?.canCotizar===true;
  const myTecId=session?.tecId||null;
  // Técnicos only see their own orders
  const visibleOrds=isAdmin?ords:ords.filter(o=>o.tec===myTecId);
  const sOrd=ords.find(o=>o.id===sel);
  const sCli=sOrd?gcl(cls,sOrd.cid):{};
  const sTec=sOrd?tecs.find(t=>t.id===sOrd.tec):null;
  const sBud=sOrd?Object.values(buds).find(b=>b.oid===sOrd.id):null;

  const filt=visibleOrds.filter(o=>{
    const c=gcl(cls,o.cid);
    const t=tecs.find(x=>x.id===o.tec);
    const qq=q.toLowerCase();
    return(!qq||[o.id,c.nombre,o.equipo,o.prob,t?.nombre||""].some(x=>x.toLowerCase().includes(qq)))&&(fst==="Todos"||o.est===fst);
  });

  function saveOrd(o){
    if(!o.token) o={...o,token:genToken()};
    const now=new Date();
    const isNew=!ords.find(x=>x.id===o.id);
    const entry={fecha:now.toISOString().slice(0,10),hora:now.toTimeString().slice(0,5),estado:isNew?"Orden creada":"Orden editada",user:session?.nombre||"—",nota:isNew?o.equipo:""};
    const oConLog={...o,log:[entry,...(o.log||[])]};
    setOrds(p=>{const n=p.find(x=>x.id===oConLog.id)?p.map(x=>x.id===oConLog.id?oConLog:x):[oConLog,...p];lsSet("redcom_ords",n);saveSeqs();return n;});
    // Auto-create garantía when marking as Entregado
    if(o.est==="Entregado"){
      setGars(prev=>{
        if(prev.find(g=>g.ordId===o.id)) return prev; // ya existe
        const fechaEnt=new Date().toISOString().slice(0,10);
        const vence=new Date(); vence.setDate(vence.getDate()+90);
        const g={id:`GAR${String(++GARSEQ).padStart(4,"0")}`,ordId:o.id,cliId:o.cid,equipo:o.equipo,
          fechaEntrega:fechaEnt,fechaVence:vence.toISOString().slice(0,10),dias:90,
          estado:"Vigente",reclamoNotas:"",reclamoFecha:""};
        const n=[g,...prev];lsSet("redcom_gars",n);saveSeqs();
        return n;
      });
    }
    setNewOrd(false);setEditOrd(null);setSel(o.id);
  }
  function saveFotos(ordId,fotos){setOrds(p=>{const n=p.map(o=>o.id===ordId?{...o,fotos}:o);lsSet("redcom_ords",n);return n;});setShowFotos(null);}
  function saveFirma(ordId,firma){
    setOrds(p=>{
      const n=p.map(o=>o.id===ordId?{...o,firma,est:"Entregado"}:o);
      lsSet("redcom_ords",n);
      return n;
    });
    // Create garantía if not exists
    setGars(prev=>{
      if(prev.find(g=>g.ordId===ordId)) return prev;
      const vence=new Date(); vence.setDate(vence.getDate()+90);
      const g={id:`GAR${String(++GARSEQ).padStart(4,"0")}`,ordId,
        cliId:ords.find(o=>o.id===ordId)?.cid||"",
        equipo:ords.find(o=>o.id===ordId)?.equipo||"",
        fechaEntrega:new Date().toISOString().slice(0,10),
        fechaVence:vence.toISOString().slice(0,10),dias:90,
        estado:"Vigente",reclamoNotas:"",reclamoFecha:""};
      const n=[g,...prev];lsSet("redcom_gars",n);saveSeqs();
      return n;
    });
    setShowFirma(null);
  }
  function delOrd(id){setOrds(p=>{const n=p.filter(o=>o.id!==id);lsSet("redcom_ords",n);return n;});setSel(null);}
  function saveBud(b){
    // Descuento de stock: solo cuando cambia a Aceptado y no lo era antes
    const prevBud=buds[b.id];
    if(b.est==="Aceptado" && prevBud?.est!=="Aceptado"){
      setInv(prevInv=>{
        const next=prevInv.map(p=>{
          const usados=b.items.filter(it=>it.t==="r"&&it.ref===p.id);
          if(usados.length===0) return p;
          const qty=usados.reduce((s,it)=>s+(it.q||1),0);
          const newStock=Math.max(0,(p.stock||0)-qty);
          return {...p,stock:newStock};
        });
        lsSet("redcom_inv",next);
        return next;
      });
    }
    setBuds(p=>{const n={...p,[b.id]:b};lsSet("redcom_buds",n);saveSeqs();return n;});
    setOrds(p=>{const n=p.map(o=>o.id===b.oid?{...o,pid:b.id}:o);lsSet("redcom_ords",n);return n;});
    setBudOrd(null);
  }
  function saveSvc(s){setSvcs(p=>{const n=p.find(x=>x.id===s.id)?p.map(x=>x.id===s.id?s:x):[...p,s];lsSet("redcom_svcs",n);saveSeqs();return n;});setNewSvc(false);setEditSvc(null);}
  function delSvc(id){setSvcs(p=>{const n=p.filter(x=>x.id!==id);lsSet("redcom_svcs",n);return n;});}
  function importInv(nuevos){
    setInv(prev=>{
      let next=[...prev];
      let added=0, updated=0;
      nuevos.forEach(ni=>{
        const idx=next.findIndex(x=>x.id===ni.id);
        if(idx>=0){next[idx]={...next[idx],...ni};updated++;}
        else{next=[ni,...next];added++; INVSEQ=Math.max(INVSEQ,parseInt((ni.id||"").replace(/[^0-9]/g,""))||0);}
      });
      lsSet("redcom_inv",next);
      saveSeqs();
      alert(`Importación completada.
✓ ${added} artículos nuevos
✎ ${updated} actualizados`);
      return next;
    });

          const qty=usados.reduce((s,it)=>s+(it.qty||1),0);

                ${filt.length===0?html`<div class="empty-state"><${Ic} n="search" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
                :filt.map(o=>{
                  const c=gcl(cls,o.cid),t=tecs.find(x=>x.id===o.tec),bud=Object.values(buds).find(b=>b.oid===o.id),cv=bud?calc(bud.items):null;
                  return html`<div key=${o.id} class=${"order-row"+(sel===o.id?" sel":"")} onClick=${()=>setSel(sel===o.id?null:o.id)}>
                    <div style=${{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#1d4ed8",fontWeight:500}}>${o.id}</div>
                    <div><div style=${{fontWeight:600,fontSize:13}}>${c.nombre}</div><div style=${{fontSize:11,color:"#64748b",marginTop:1}}>${o.equipo}</div></div>
                    <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <${SPill} st=${o.est}/>
                      <${UPill} u=${o.urg}/>
                    </div>
                    <div style=${{fontSize:12,color:"#475569"}}>${t?.nombre||"—"}</div>
                    <div style=${{fontSize:11,color:"#94a3b8"}}>${fmtD(o.fecha)}</div>
                    <div style=${{fontSize:12,fontWeight:700,color:cv?"#059669":"#cbd5e1"}}>${cv?mxn(cv.tot):"—"}</div>
                  </div>`;
                })}
              </div>`
            :html`<${Kanban} ords=${filt} cls=${cls} tecs=${tecs} buds=${buds} sel=${sel} onSel=${id=>setSel(sel===id?null:id)} onMv=${(id,st)=>setOrds(p=>{const n=p.map(o=>o.id===id?{...o,est:st}:o);lsSet("redcom_ords",n);return n;})}/>`}
          </div>
          ${sOrd&&html`<div style=${{
              width:isMobile?"100%":"355px",
              flexShrink:0,
              borderLeft:"1px solid #e2e8f0",
              overflowY:"auto",
              position:isMobile?"fixed":"relative",
              inset:isMobile?"0 0 62px 0":"auto",
              zIndex:isMobile?40:"auto",
              background:"#fff"
            }}>
            <${Detail} ord=${sOrd} cli=${sCli} tec=${sTec} bud=${sBud} invItems=${inv}
              onEdit=${o=>setEditOrd(o)} onDel=${delOrd} onBud=${o=>setBudOrd(o)}
              onNotaVenta=${()=>{
                const nv={id:newNVId(),ord:sOrd,cli:sCli,bud:sBud,tecNombre:sTec?.nombre||"—",fecha:new Date().toLocaleDateString("es-MX")};
                addNota(nv);
                printNotaVenta(nv,config);
              }}
              onSt=${(id,st)=>{
                const now=new Date();
                const entry={fecha:now.toISOString().slice(0,10),hora:now.toTimeString().slice(0,5),estado:st,user:session?.nombre||"—",nota:""};
                setOrds(p=>{const n=p.map(o=>o.id===id?{...o,est:st,log:[entry,...(o.log||[])]}:o);lsSet("redcom_ords",n);return n;});
              }}
              onSaveDiag=${(id,diag,diagCosto)=>{
                const now=new Date();
                const entry={fecha:now.toISOString().slice(0,10),hora:now.toTimeString().slice(0,5),estado:"Diagnóstico guardado",user:session?.nombre||"—",nota:diag?.slice(0,60)||""};
                setOrds(p=>{const n=p.map(o=>o.id===id?{...o,diag,diagCosto,log:[entry,...(o.log||[])]}:o);lsSet("redcom_ords",n);return n;});
              }}
              onPrint=${printTicket}
              onFotos=${id=>setShowFotos(id)}
              onFirma=${id=>setShowFirma(id)}
              onPortal=${o=>{
                const url=portalURL(o.token||"");
                if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert("Link copiado: "+url));}
                else{alert("Link portal: "+url);}
              }}/>
          </div>`}
        </div>`}

      ${sec==="clients"&&html`<${ClientsSection} cls=${cls} ords=${ords} pagos=${pagos} gars=${gars} onAdd=${()=>setNewCli(true)} onEdit=${c=>setEditCli(c)} onDel=${delCli}/>`}
      ${sec==="inv"&&html`<${InvSection} inv=${inv} provs=${provs} ocs=${ocs} session=${session} onSaveOC=${saveOC} onAdd=${()=>setNewInv(true)} onEdit=${p=>setEditInv(p)} onDel=${delInv}/>`}
      ${sec==="techs"&&html`<${TecSection} tecs=${tecs} ords=${ords} onAdd=${()=>setNewTec(true)} onEdit=${t=>setEditTec(t)} onDel=${delTec}/>`}
      ${sec==="cots"&&canCotizar&&html`<${CotizacionesSection}
        cots=${cots} cls=${cls} inv=${inv} svcs=${svcs} tecs=${tecs} session=${session}
        onAdd=${()=>setNewCot(true)}
        onEdit=${ct=>setEditCot(ct)}
        onDel=${delCot}
        onPrint=${ct=>{const cli=cls.find(x=>x.id===ct.cid);const tec=tecs.find(x=>x.id===ct.tec);printCotizacion(ct,cli||{nombre:"—"},tec,config);}}
      />`}
      ${sec==="provs"&&isAdmin&&html`<${ProveedoresSection}
        provs=${provs} inv=${inv}
        onAdd=${()=>setNewProv(true)}
        onEdit=${pv=>setEditProv(pv)}
        onDel=${delProv}
        onNewOC=${pv=>{setNewOCPrvInit(pv);setNewOC(true);setSec("ocs");}}/>`}
      ${sec==="ocs"&&isAdmin&&html`<${OCSection}
        ocs=${ocs} provs=${provs} inv=${inv} session=${session}
        onAdd=${()=>setNewOC(true)}
        onEdit=${oc=>setEditOC(oc)}
        onDel=${delOC}
        onPrint=${(oc,pv)=>printOC(oc,pv)}/>`}
      ${sec==="reportes"&&isAdmin&&html`<${ReportesSection}
        ords=${ords} cls=${cls} inv=${inv} tecs=${tecs} svcs=${svcs}
        pagos=${pagos} cots=${cots} gars=${gars} gastos=${gastos} onImportInv=${importInv}/>`}
      ${sec==="caja"&&isAdmin&&html`<${CajaSection}
        pagos=${pagos} cortes=${cortes} ords=${ords} cls=${cls} inv=${inv} buds=${buds} cots=${cots} gastos=${gastos} session=${session} config=${config}
        onAddPago=${addPago} onCorte=${addCorte} onDelPago=${delPago} onAddGasto=${addGasto} onDelGasto=${delGasto}/>`}
      ${sec==="garantias"&&isAdmin&&html`<${GarantiasSection}
        gars=${gars} ords=${ords} cls=${cls} tecs=${tecs}
        onAdd=${addGar} onReclamo=${reclamoGar} onDel=${delGar}/>`}
      ${sec==="ia"&&html`<${IASection} inv=${inv} svcs=${svcs} tecs=${tecs}/>`}
      ${sec==="calc"&&html`<${CalcInstalacionSection} inv=${inv} svcs=${svcs} cls=${cls} tecs=${tecs} session=${session} config=${config} onSaveCot=${ct=>{saveCot({...ct,id:`COT-${String(++COTSEQ).padStart(4,"0")}`});setSec("cots");}}/>`}
      ${sec==="servicios"&&isAdmin&&html`<${ServiciosSection} svcs=${svcs} onAdd=${()=>setNewSvc(true)} onEdit=${s=>setEditSvc(s)} onDel=${delSvc}/>`}
      ${sec==="users"&&isAdmin&&html`<${UsersSection} users=${users} tecs=${tecs} session=${session} onAdd=${()=>setNewUser(true)} onEdit=${u=>setEditUser(u)} onDel=${delUser}/>`}
      ${sec==="dash"&&html`<${Dashboard} ords=${ords} buds=${buds} cls=${cls} tecs=${tecs} notas=${notas} pagos=${pagos} svcs=${svcs} onDelNota=${delNota} onPrintNota=${nv=>printNotaVenta(nv,config)}/>`}
      ${false&&html`<${CalendarioSection} ords=${ords} cls=${cls} tecs=${tecs} citas=${citas} recs=${recs} session=${session} config=${config} onSaveCita=${saveCita} onDelCita=${delCita} onSaveRec=${saveRec} onDelRec=${delRec} onSyncGCal=${syncGCal}/>`}
    </main>

    <!-- MODALS ÓRDENES -->
    ${(showNewOrd||editOrd)&&html`<${OrdModal} cls=${cls} tecs=${tecs} edit=${editOrd} onSave=${saveOrd} onClose=${()=>{setNewOrd(false);setEditOrd(null);}} onPrint=${printTicket}/>`}
    ${budOrd&&html`<${BudModal} ord=${budOrd} cli=${gcl(cls,budOrd.cid)} invItems=${inv} svcItems=${svcs} tarifaMO=${tarifaMO} exist=${Object.values(buds).find(b=>b.oid===budOrd.id)} onSave=${saveBud} onClose=${()=>setBudOrd(null)}/>`}
    <!-- MODALS CLIENTES -->
    ${(showNewCli||editCli)&&html`<${ClientModal} edit=${editCli} onSave=${saveCli} onClose=${()=>{setNewCli(false);setEditCli(null);}}/>`}
    <!-- MODALS INVENTARIO -->
    ${(showNewInv||editInv)&&html`<${InvModal} edit=${editInv} onSave=${saveInv} onClose=${()=>{setNewInv(false);setEditInv(null);}}/>`}
    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
      ${NAV_ITEMS.map(({key,lbl,icon})=>html`
        <button key=${key} class=${"bnav-btn"+(sec===key?" active":"")}
          onClick=${()=>{setSec(key);setSel(null);}}>
          <${Ic} n=${icon} z=${18} s=${sec===key?"#1d4ed8":"#94a3b8"}/>
          ${lbl}
          ${key==="orders"&&ords.length>0?html`<span style=${{background:"#eff6ff",color:"#1d4ed8",fontSize:8,padding:"0 5px",borderRadius:99,fontWeight:700}}>${ords.length}</span>`:""}
        </button>`)}
    </nav>

    <!-- NOTIFICACIONES -->

    ${showNotif&&html`<${NotifPanel}
      ords=${ords} inv=${inv} gars=${gars} cls=${cls} session=${session}
      onClose=${()=>setShowNotif(false)}
      onNavTo=${k=>{setSec(k);setSel(null);setShowNotif(false);}}/>`}
    <!-- FOTOS -->
    ${showFotos&&html`<${FotosModal}
      ord=${ords.find(o=>o.id===showFotos)||{id:showFotos,fotos:[]}}
      onSave=${fotos=>saveFotos(showFotos,fotos)}
      onClose=${()=>setShowFotos(null)}/>`}
    <!-- FIRMA -->
    ${showFirma&&html`<${FirmaModal}
      ord=${ords.find(o=>o.id===showFirma)||{id:showFirma}}
      cli=${cls.find(c=>c.id===(ords.find(o=>o.id===showFirma)?.cid))}
      onSave=${firma=>saveFirma(showFirma,firma)}
      onClose=${()=>setShowFirma(null)}/>`}
    <!-- MODALS PROVEEDORES -->
    ${(newProv||editProv)&&isAdmin&&html`<${ProvModal} edit=${editProv} onSave=${saveProv} onClose=${()=>{setNewProv(false);setEditProv(null);}}/>`}
    <!-- MODALS OC -->
    ${(newOC||editOC)&&isAdmin&&html`<${OCModal}
      edit=${editOC} prvInit=${newOCPrvInit} provs=${provs} inv=${inv} session=${session}
      onSave=${saveOC} onClose=${()=>{setNewOC(false);setEditOC(null);setNewOCPrvInit(null);}}/>`}
    <!-- MODALS COTIZACIONES -->
    ${(newCot||editCot)&&canCotizar&&html`<${CotModal}
      edit=${editCot} cls=${cls} inv=${inv} svcs=${svcs} tecs=${tecs} session=${session} config=${config}
      onSave=${saveCot} onClose=${()=>{setNewCot(false);setEditCot(null);}}/>`}
    <!-- MODALS SERVICIOS -->
    ${(newSvc||editSvc)&&html`<${SvcModal} edit=${editSvc} onSave=${saveSvc} onClose=${()=>{setNewSvc(false);setEditSvc(null);}}/>`}
    <!-- MODALS USUARIOS -->
    ${(showNewUser||editUser)&&html`<${UserModal} edit=${editUser} tecs=${tecs} onSave=${saveUser} onClose=${()=>{setNewUser(false);setEditUser(null);}}/>`}
    <!-- GOOGLE DRIVE -->
    ${showGasModal&&html`<${GasModal} current=${gas} onSave=${v=>{setGas(v);gasUrl=v;}} onClose=${()=>setShowGasModal(false)}/>`}
    <!-- PREFERENCIAS -->
    ${showConfig&&html`<${PreferenciasModal} config=${config} session=${session} users=${users} setUsers=${setUsers} onSave=${saveConfig} onClose=${()=>setShowConfig(false)}/>`}
    <!-- MODALS TÉCNICOS -->
    ${(showNewTec||editTec)&&html`<${TecModal} edit=${editTec} onSave=${saveTec} onClose=${()=>{setNewTec(false);setEditTec(null);}}/>`}
    <!-- BÚSQUEDA GLOBAL Ctrl+K -->
    ${showSearch&&html`<${GlobalSearch}
      ords=${ords} cls=${cls} inv=${inv} cots=${cots}
      onNav=${k=>{setSec(k);setSel(null);setShowSearch(false);}}
      onClose=${()=>setShowSearch(false)}/>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

/* ══ PWA — Manifest + Service Worker ══════════════════════════════════ */
(function(){
  // Generar ícono SVG en canvas para el manifest
  function makeIcon(size){
    const c=document.createElement("canvas");
    c.width=c.height=size;
    const ctx=c.getContext("2d");
    // Fondo azul redondeado
    const r=size*0.18;
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath();
    ctx.fillStyle="#1d4ed8";ctx.fill();
    // Texto RC
    ctx.fillStyle="#ffffff";
    ctx.font=`bold ${size*0.38}px 'IBM Plex Sans',Arial,sans-serif`;
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.fillText("RC",size/2,size/2);
    return c.toDataURL("image/png");
  }

  const icon192=makeIcon(192);
  const icon512=makeIcon(512);

  // Inyectar apple-touch-icon
  document.getElementById("pwa-icon").href=icon192;

  // Generar manifest
  const manifest={
    name:"Redcom — Sistema de Reparaciones",
    short_name:"Redcom",
    description:"Sistema de reparaciones, redes y cómputo",
    start_url:"./",
    display:"standalone",
    background_color:"#1d4ed8",
    theme_color:"#1d4ed8",
    orientation:"any",
    icons:[
      {src:icon192,sizes:"192x192",type:"image/png",purpose:"any maskable"},
      {src:icon512,sizes:"512x512",type:"image/png",purpose:"any maskable"}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  document.getElementById("pwa-manifest").href=URL.createObjectURL(blob);

  // Service Worker inline — cache básico para offline
  if("serviceWorker" in navigator){
    const swCode=`
const CACHE="redcom-v1";
self.addEventListener("install",e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(["/"])).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener("activate",e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener("fetch",e=>{
  if(e.request.method!=="GET") return;
  e.respondWith(
    fetch(e.request).then(r=>{
      if(r&&r.status===200){
        const rc=r.clone();
        caches.open(CACHE).then(c=>c.put(e.request,rc));
      }
      return r;
    }).catch(()=>caches.match(e.request))
  );
});`;
    const swBlob=new Blob([swCode],{type:"application/javascript"});
    const swUrl=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl,{scope:"./"}).catch(()=>{});
  }

  // Botón "Instalar app" cuando el navegador lo permite
  let deferredPrompt=null;
  window.addEventListener("beforeinstallprompt",e=>{
    e.preventDefault();
    deferredPrompt=e;
    // Mostrar botón flotante de instalación
    const btn=document.createElement("button");
    btn.id="pwa-install-btn";
    btn.innerHTML="📲 Instalar app";
    btn.style.cssText="position:fixed;bottom:72px;right:16px;z-index:9999;padding:10px 18px;border-radius:99px;border:none;background:#1d4ed8;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(29,78,216,.4);display:flex;align-items:center;gap:6px;";
    btn.onclick=()=>{
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(()=>{deferredPrompt=null;btn.remove();});
    };
    document.body.appendChild(btn);
  });

  window.addEventListener("appinstalled",()=>{
    const b=document.getElementById("pwa-install-btn");
    if(b) b.remove();
  });
})();
</script>
