<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#1d4ed8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Redcom"/>
<meta name="description" content="Redcom — Sistema de reparaciones, redes y cómputo"/>
<link rel="manifest" id="pwa-manifest"/>
<link rel="apple-touch-icon" id="pwa-icon"/>
<title>Redcom · Sistema de Reparaciones</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
<!-- ── FIREBASE SDK ── -->
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   REDCOM  ·  macOS Sonoma Design System
   Vibrancy · SF Pro · Traffic lights · Frosted glass sidebar
   ═══════════════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}

body{
  font-family:-apple-system,'Source Sans 3',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  background:#E8E8E8;
  color:#1D1D1F;
  font-size:13px;
  line-height:1.47059;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* macOS desktop pattern background */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(120,180,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(180,120,255,.06) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

:root{
  /* macOS system palette */
  --mac-bg:          #ECECEC;
  --mac-sidebar:     rgba(236,236,236,.85);
  --mac-surface:     #FFFFFF;
  --mac-surface2:    #F5F5F5;
  --mac-surface3:    #EBEBEB;
  --mac-rim:         rgba(0,0,0,.1);
  --mac-rim2:        rgba(0,0,0,.06);
  --mac-ink:         #1D1D1F;
  --mac-ink2:        #3A3A3C;
  --mac-ink3:        #6E6E73;
  --mac-ink4:        #AEAEB2;
  --mac-ink5:        #D1D1D6;
  --mac-blue:        #0A7AFF;
  --mac-blue-light:  #EBF3FF;
  --mac-red:         #FF3B30;
  --mac-green:       #30D158;
  --mac-amber:       #FF9F0A;
  --mac-purple:      #BF5AF2;
  /* Traffic lights */
  --tl-red:    #FF5F57;
  --tl-yellow: #FEBC2E;
  --tl-green:  #28C840;
  /* Structure */
  --r:    6px;
  --r2:   10px;
  --r3:   14px;
  --r4:   18px;
  --sidebar-w: 220px;
  --topbar-h:  44px;
  --shadow-xs: 0 1px 2px rgba(0,0,0,.08);
  --shadow-sm: 0 2px 6px rgba(0,0,0,.1), 0 0 0 .5px rgba(0,0,0,.06);
  --shadow:    0 4px 16px rgba(0,0,0,.12), 0 0 0 .5px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.18), 0 0 0 .5px rgba(0,0,0,.1);
  --shadow-window: 0 20px 60px rgba(0,0,0,.3), 0 0 0 .5px rgba(0,0,0,.2);
}

/* ── "Redcom Blue" — azul claro, vibrante, texto oscuro legible ── */
html.dark-mode{
  --mac-bg:         #EAF2FF;
  --mac-sidebar:    rgba(234,242,255,.9);
  --mac-surface:    #FFFFFF;
  --mac-surface2:   #EAF2FF;
  --mac-surface3:   #D6E8FF;
  --mac-rim:        rgba(0,80,200,.12);
  --mac-rim2:       rgba(0,80,200,.07);
  --mac-ink:        #0A1628;
  --mac-ink2:       #1A3050;
  --mac-ink3:       #3A6090;
  --mac-ink4:       #6A90B8;
  --mac-ink5:       #A8C4DE;
  --mac-blue:       #0055CC;
  --mac-blue-light: #D6E8FF;
  --mac-red:        #FF6B35;
  --mac-green:      #1A7A40;
  --mac-amber:      #CC6600;
  color-scheme:light;
}
html.dark-mode body{
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(59,139,255,.18) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(255,107,53,.1) 0%, transparent 50%),
    #D8ECFF;
}
html.dark-mode ::-webkit-scrollbar-thumb{background:rgba(0,60,160,.2)}

html.dark-mode aside{
  background:linear-gradient(175deg,#0044AA 0%,#0055CC 55%,#1A6EDD 100%)!important;
  border-right:.5px solid rgba(255,255,255,.2)!important;
  backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
}
html.dark-mode .sidebar-link{color:rgba(255,255,255,.6)!important}
html.dark-mode .sidebar-link:hover{background:rgba(255,255,255,.15)!important;color:#fff!important}
html.dark-mode .sidebar-link.active{background:rgba(255,255,255,.2)!important;color:#fff!important;font-weight:600!important;box-shadow:inset 3px 0 0 #FF6B35!important}
html.dark-mode .sidebar-group{color:rgba(255,255,255,.4)!important}

html.dark-mode .glass-topbar{
  background:rgba(234,242,255,.88)!important;
  border-bottom:.5px solid rgba(0,80,200,.12)!important;
  backdrop-filter:blur(20px) saturate(160%)!important;
  -webkit-backdrop-filter:blur(20px) saturate(160%)!important;
}

html.dark-mode input,html.dark-mode select,html.dark-mode textarea{
  background:#EAF2FF!important;border-color:transparent!important;color:#0A1628!important;box-shadow:none;
}
html.dark-mode label{color:#3A6090!important}
html.dark-mode .btn-ghost{background:#fff;border:.5px solid rgba(0,80,200,.2);color:#1A3050;box-shadow:none}
html.dark-mode .btn-ghost:hover{background:#EAF2FF;color:#0A1628}
html.dark-mode .modal{background:#fff!important;border:.5px solid rgba(0,80,200,.12)!important;box-shadow:0 20px 60px rgba(0,40,120,.15)!important}
html.dark-mode .modal-bg{background:rgba(0,30,100,.25)!important}
html.dark-mode .card{background:#fff;border:.5px solid rgba(0,80,200,.1)}
html.dark-mode .glass-card{background:#fff!important;border:.5px solid rgba(0,80,200,.08)!important}
html.dark-mode .order-row{border-bottom-color:rgba(0,80,200,.08)}
html.dark-mode .order-row>div{color:#0A1628}
html.dark-mode .order-row:hover{background:rgba(0,80,200,.04)}
html.dark-mode .order-row.sel{background:rgba(0,85,204,.1)!important}
html.dark-mode .tbl-row{border-bottom-color:rgba(0,80,200,.08)}
html.dark-mode .tbl-row>div{color:#0A1628}
html.dark-mode .tbl-row:hover{background:rgba(0,80,200,.04)}
html.dark-mode .th{background:rgba(0,80,200,.04)!important;border-bottom-color:rgba(0,80,200,.1)!important;color:#3A6090!important}
html.dark-mode .tbl-hdr{background:rgba(0,80,200,.04)!important;border-bottom-color:rgba(0,80,200,.1)!important}
html.dark-mode .tbl-hdr>div{color:#3A6090!important}
html.dark-mode .slide-in{background:#fff!important}
html.dark-mode .empty-state{color:#6A90B8}
html.dark-mode .bottom-nav{background:#fff;border-color:rgba(0,80,200,.12)}
html.dark-mode .bnav-btn{color:#6A90B8}
html.dark-mode .bnav-btn.active{color:#0055CC}

/* Forzar fondos blancos y texto oscuro en contenido (stat cards, panels, etc.) */
html.dark-mode main{
  background:#EAF2FF!important;
}
/* Override de colores inline oscuros que usan JS */
html.dark-mode main [style*="background:\"#1e293b"],
html.dark-mode main [style*="background:\"#0f172a"],
html.dark-mode main [style*="background:\"#1E293B"],
html.dark-mode main [style*="background:\"#334155"]{
  background:#fff!important;color:#0A1628!important;
}
/* Stat cards: normalizar fondos pasteles a blanco limpio */
html.dark-mode .glass-card{
  background:#FFFFFF!important;
  border-color:rgba(0,80,200,.1)!important;
}
/* Secciones y paneles de contenido */
html.dark-mode section,
html.dark-mode [class*="Section"],
html.dark-mode .card{
  background:#fff!important;
  color:#0A1628!important;
  border-color:rgba(0,80,200,.1)!important;
}

/* ══ EXTRA THEMES ════════════════════════════════════════════════════ */
html.theme-minimal{
  --mac-bg:#F5F4F0;--mac-surface:#FAFAF8;--mac-surface2:#EFEDE8;--mac-surface3:#E8E5DE;
  --mac-rim:rgba(0,0,0,.08);--mac-rim2:rgba(0,0,0,.05);
  --mac-ink:#1C1917;--mac-ink2:#44403C;--mac-ink3:#78716C;--mac-ink4:#A8A29E;--mac-ink5:#D6D3D1;
  --mac-blue:#111110;--mac-blue-light:#F0EFE9;
}
html.theme-minimal .btn-primary{background:#1C1917!important}
html.theme-minimal body{background:#F5F4F0}

html.theme-emerald{
  --mac-bg:#EFF8F2;--mac-surface:#FFFFFF;--mac-surface2:#E2F2E8;--mac-surface3:#CCE9D6;
  --mac-rim:rgba(27,67,50,.12);
  --mac-ink:#0D2B1E;--mac-ink2:#1E4D35;--mac-ink3:#3D7A5C;--mac-ink4:#6DB891;
  --mac-blue:#1B4332;--mac-blue-light:#D1F0DA;
}
html.theme-emerald .btn-primary{background:linear-gradient(135deg,#2D6A4F,#1B4332)!important}
html.theme-emerald body{background:#DCF0E4}
html.theme-emerald aside{background:linear-gradient(175deg,#2D6A4F,#40916C)!important}
html.theme-emerald .sidebar-link{color:rgba(255,255,255,.6)!important}
html.theme-emerald .sidebar-link:hover{background:rgba(255,255,255,.09)!important}
html.theme-emerald .sidebar-group{color:rgba(255,255,255,.25)!important}

/* Tema "Blanco Minimalista" — todo blanco, texto negro, sin color */
html.theme-violet{
  --mac-bg:         #FFFFFF;
  --mac-surface:    #FFFFFF;
  --mac-surface2:   #FAFAFA;
  --mac-surface3:   #F5F5F5;
  --mac-rim:        rgba(0,0,0,.08);
  --mac-rim2:       rgba(0,0,0,.05);
  --mac-ink:        #000000;
  --mac-ink2:       #111111;
  --mac-ink3:       #555555;
  --mac-ink4:       #999999;
  --mac-ink5:       #CCCCCC;
  --mac-blue:       #000000;
  --mac-blue-light: #F5F5F5;
}
html.theme-violet body{background:#FFFFFF}
html.theme-violet aside{
  background:#1A1A1A!important;
  border-right:none!important;
}
html.theme-violet .sidebar-link{color:rgba(255,255,255,.5)!important}
html.theme-violet .sidebar-link:hover{background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.85)!important}
html.theme-violet .sidebar-link.active{background:rgba(255,255,255,.12)!important;color:#fff!important;font-weight:600!important;box-shadow:none!important}
html.theme-violet .sidebar-group{color:rgba(255,255,255,.25)!important}
html.theme-violet .glass-topbar{background:rgba(255,255,255,.97)!important;border-bottom:1px solid rgba(0,0,0,.08)!important;backdrop-filter:blur(20px)!important}
html.theme-violet .btn-primary{background:#000!important;color:#fff!important;border-color:transparent!important}
html.theme-violet .btn-primary:hover:not(:disabled){background:#222!important}
html.theme-violet input,html.theme-violet select,html.theme-violet textarea{background:#F5F5F5!important;color:#000!important}
html.theme-violet label{color:#555!important}
html.theme-violet .btn-ghost{background:#fff!important;border:1px solid rgba(0,0,0,.12)!important;color:#333!important}
html.theme-violet .btn-ghost:hover{background:#F5F5F5!important;color:#000!important}
html.theme-violet .modal{background:#fff!important;border:1px solid rgba(0,0,0,.1)!important;box-shadow:0 8px 32px rgba(0,0,0,.1)!important}
html.theme-violet .modal-bg{background:rgba(0,0,0,.2)!important}
html.theme-violet .card{background:#fff!important;border:1px solid rgba(0,0,0,.08)!important;box-shadow:none!important}
html.theme-violet .glass-card{background:#fff!important;border:1px solid rgba(0,0,0,.08)!important;box-shadow:none!important}
html.theme-violet .order-row{border-bottom-color:rgba(0,0,0,.06)!important}
html.theme-violet .order-row>div{color:#000!important}
html.theme-violet .order-row:hover{background:#FAFAFA!important}
html.theme-violet .order-row.sel{background:#F5F5F5!important}
html.theme-violet .tbl-row{border-bottom-color:rgba(0,0,0,.06)!important}
html.theme-violet .tbl-row>div{color:#000!important}
html.theme-violet .tbl-row:hover{background:#FAFAFA!important}
html.theme-violet .th{background:#FAFAFA!important;color:#555!important;border-bottom-color:rgba(0,0,0,.08)!important}
html.theme-violet .tbl-hdr{background:#FAFAFA!important;border-bottom-color:rgba(0,0,0,.08)!important}
html.theme-violet .tbl-hdr>div{color:#555!important}
html.theme-violet .empty-state{color:#999!important}
html.theme-violet .slide-in{background:#fff!important}
html.theme-violet .bottom-nav{background:#fff!important;border-color:rgba(0,0,0,.08)!important}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.18);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.3)}
html.dark-mode ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2)}

select,input,textarea{font-family:inherit}
.mono{font-family:'SF Mono','JetBrains Mono',monospace;font-size:.88em}

/* ══ LABELS ═══════════════════════════════════════════════════════════ */
label{
  font-size:11px;font-weight:600;color:var(--mac-ink3);
  display:block;margin-bottom:4px;letter-spacing:.03em;
}

/* ══ INPUTS ═══════════════════════════════════════════════════════════ */
input[type=text],input[type=number],input[type=tel],
input[type=email],input[type=date],select,textarea{
  font-family:inherit;
  background:#F0F0F0;
  border:1px solid transparent;
  border-radius:99px!important;
  padding:6px 14px;
  font-size:13px;
  color:var(--mac-ink);
  outline:none;
  width:100%;
  min-height:30px;
  height:30px;
  box-shadow:none;
  transition:background .12s,box-shadow .12s;
  line-height:1.4;
}
textarea{
  border-radius:12px!important;
  padding:9px 14px!important;
  resize:vertical;
  min-height:72px;
  height:auto!important;
  background:#F0F0F0;
}
select{
  border-radius:99px!important;
  padding:6px 14px!important;
  height:30px!important;
  background:#F0F0F0;
}
input:focus,select:focus,textarea:focus{
  background:#F8F8F8;
  border:1px solid rgba(10,122,255,.45)!important;
  box-shadow:
    0 0 0 3px rgba(10,122,255,.12),
    0 0 8px rgba(10,122,255,.15),
    0 2px 6px rgba(10,122,255,.08);
  outline:none;
}
::placeholder{color:#AEAEB2;font-size:13px}
html.dark-mode input,html.dark-mode select,html.dark-mode textarea{
  background:rgba(255,255,255,.1);
  border:1px solid transparent;
  box-shadow:none;color:var(--mac-ink);
}
html.dark-mode input:focus,html.dark-mode select:focus,html.dark-mode textarea:focus{
  background:rgba(255,255,255,.15);
  border:1px solid rgba(10,132,255,.5)!important;
  box-shadow:
    0 0 0 3px rgba(10,132,255,.15),
    0 0 10px rgba(10,132,255,.2)!important;
}
/* ── GLOBAL PILL OVERRIDE — tamaño y forma estándar ── */
input:not([type=range]):not([type=checkbox]):not([type=radio]):not([type=submit]):not([type=file]){
  border-radius:99px!important;
  border:1px solid transparent!important;
  background:#F0F0F0!important;
  box-shadow:none!important;
  padding:6px 14px!important;
  height:30px!important;
  min-height:30px!important;
  font-size:13px!important;
  line-height:1.4!important;
}
select{
  border-radius:99px!important;
  border:1px solid transparent!important;
  background:#F0F0F0!important;
  box-shadow:none!important;
  padding:6px 14px!important;
  height:30px!important;
  min-height:30px!important;
  font-size:13px!important;
}
textarea{
  border-radius:12px!important;
  border:1px solid transparent!important;
  background:#F0F0F0!important;
  box-shadow:none!important;
  padding:9px 14px!important;
  height:auto!important;
  min-height:72px!important;
  font-size:13px!important;
}
/* Focus override — glow azul suave */
input:not([type=range]):not([type=checkbox]):not([type=radio]):not([type=submit]):not([type=file]):focus,
select:focus,
textarea:focus{
  background:#F8F8F8!important;
  border:1px solid rgba(10,122,255,.45)!important;
  box-shadow:
    0 0 0 3px rgba(10,122,255,.12),
    0 0 8px rgba(10,122,255,.15),
    0 2px 6px rgba(10,122,255,.08)!important;
  outline:none!important;
}
html.dark-mode input:not([type=range]):not([type=checkbox]):not([type=radio]):not([type=submit]):not([type=file]),
html.dark-mode select,
html.dark-mode textarea{
  background:rgba(255,255,255,.1)!important;
  border:1px solid transparent!important;
}


/* ══ BUTTONS ══════════════════════════════════════════════════════════ */
.btn{
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  font-weight:500;
  border-radius:var(--r);
  padding:5px 14px;
  transition:all .1s ease;
  display:inline-flex;align-items:center;gap:5px;
  min-height:30px;white-space:nowrap;
  letter-spacing:-.01em;
}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-sm{padding:3px 10px;font-size:12px;min-height:24px;border-radius:5px;gap:4px}

.btn-primary{
  background:var(--mac-blue);
  color:#fff;
  border:.5px solid rgba(0,0,0,.12);
  box-shadow:0 1px 2px rgba(10,122,255,.3),inset 0 1px 0 rgba(255,255,255,.2);
}
.btn-primary:hover:not(:disabled){
  background:#1A8AFF;
  box-shadow:0 2px 6px rgba(10,122,255,.4),inset 0 1px 0 rgba(255,255,255,.2);
  transform:translateY(-.5px);
}
.btn-primary:active{transform:none;box-shadow:0 0 0 rgba(10,122,255,.3)}

.btn-ghost{
  background:var(--mac-surface);
  color:var(--mac-ink2);
  border:.5px solid rgba(0,0,0,.14);
  box-shadow:0 1px 2px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.7);
}
.btn-ghost:hover{background:var(--mac-surface2);color:var(--mac-ink)}
html.dark-mode .btn-ghost{background:var(--mac-surface2);border-color:rgba(255,255,255,.1);box-shadow:none;color:var(--mac-ink2)}
html.dark-mode .btn-ghost:hover{background:var(--mac-surface3);color:var(--mac-ink)}

.btn-danger{background:transparent;color:var(--mac-red);border:.5px solid rgba(255,59,48,.3)}
.btn-danger:hover{background:rgba(255,59,48,.06)}
.btn-success{background:transparent;color:#1A8A3C;border:.5px solid rgba(48,209,88,.35)}
.btn-success:hover{background:rgba(48,209,88,.06)}

/* ══ CARD ═════════════════════════════════════════════════════════════ */
.card{
  background:var(--mac-surface);
  border-radius:var(--r3);
  border:.5px solid var(--mac-rim);
  box-shadow:var(--shadow-sm);
}

/* ══ STATUS PILLS ═════════════════════════════════════════════════════ */
.status-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:99px;
  font-size:11px;font-weight:600;white-space:nowrap;
}

/* ══ MODALS — macOS window style ══════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.35);
  z-index:100;
  display:flex;align-items:center;justify-content:center;padding:24px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:macFadeIn .15s ease both;
}
.modal{
  background:var(--mac-surface);
  border-radius:var(--r4);
  width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-window);
  border:.5px solid rgba(255,255,255,.7);
  animation:macSlideIn .22s cubic-bezier(.16,1,.3,1) both;
}
html.dark-mode .modal{
  background:#2C2C2E;
  border-color:rgba(255,255,255,.08);
}
/* Traffic lights on modals */
.modal-traffic-lights{
  display:flex;gap:8px;align-items:center;padding:14px 16px 0;
}
.tl{
  width:12px;height:12px;border-radius:50%;cursor:pointer;
  transition:filter .1s;
  box-shadow:inset 0 0 0 .5px rgba(0,0,0,.15);
}
.tl-red{background:var(--tl-red)}
.tl-yellow{background:var(--tl-yellow)}
.tl-green{background:var(--tl-green)}
.tl:hover{filter:brightness(.85)}

}

html.theme-violet .sidebar-link.active,

html.theme-violet .sidebar-group,

}

.glass-topbar{
  background:rgba(236,236,236,.72)!important;

.order-row{
  display:grid;
  grid-template-columns:90px 1fr 140px 110px 110px 90px 90px;
  align-items:center;border-bottom:.5px solid rgba(0,0,0,.06);
  transition:background .08s;cursor:pointer;
}

  border-bottom:.5px solid rgba(0,0,0,.08);
  position:sticky;top:0;z-index:1;

}
.kcol.over{background:rgba(10,122,255,.08)!important;border-color:var(--mac-blue)!important}

.tbl-row>div{padding:10px 16px;font-size:13px;color:var(--mac-ink)}

  background:rgba(0,0,0,.025);
  border-bottom:.5px solid rgba(0,0,0,.08);
  position:sticky;top:0;z-index:1;
}
.tbl-hdr>div{
  padding:8px 16px;font-size:10px;font-weight:600;color:var(--mac-ink3);
  text-transform:uppercase;letter-spacing:.06em;

}

  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);

/* ══ ANIMATIONS ═══════════════════════════════════════════════════════ */
@keyframes macFadeIn  {from{opacity:0}to{opacity:1}}
@keyframes macSlideIn {from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
@keyframes macSlideUp {from{transform:translateY(100%)}to{transform:none}}
@keyframes reveal     {from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes spin       {to{transform:rotate(360deg)}}
@keyframes pulse      {0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1)}}
@keyframes glassIn    {from{opacity:0;transform:scale(.97)}to{opacity:1;transform:none}}

.fade-in {animation:reveal .2s cubic-bezier(.16,1,.3,1) both}
.slide-in{animation:reveal .2s cubic-bezier(.16,1,.3,1) both}
.modal   {animation:macSlideIn .22s cubic-bezier(.16,1,.3,1) both}

/* Stagger rows */
.tbl-row{animation:reveal .16s cubic-bezier(.16,1,.3,1) both}
.tbl-row:nth-child(2){animation-delay:.02s}
.tbl-row:nth-child(3){animation-delay:.04s}
.tbl-row:nth-child(4){animation-delay:.06s}
.tbl-row:nth-child(5){animation-delay:.08s}
.tbl-row:nth-child(n+6){animation-delay:.1s}

/* Theme transitions */
body,aside,.modal,.card{transition:background-color .2s ease,border-color .2s ease}
.btn{transition:all .1s ease!important}
input,select,textarea{transition:border-color .1s,box-shadow .1s!important}

@media(max-width:768px){

  .modal{border-radius:20px 20px 0 0;max-height:96vh;animation:macSlideUp .25s cubic-bezier(.16,1,.3,1) both}
  .order-hdr{display:none}
  .order-row{display:flex;flex-direction:column;align-items:flex-start;padding:12px 14px;gap:4px}
  .order-row>div{padding:0;font-size:13px}
  .tbl-hdr{display:none}
  .tbl-row{display:flex!important;flex-wrap:wrap;padding:10px 14px;gap:4px}

  .tbl-row.inv-row>div,.tbl-row>div{padding:2px 5px;font-size:12px}
  .section-header{flex-direction:column;align-items:flex-start}
  .search-bar{max-width:100%;width:100%}
  .btn{min-height:38px;padding:8px 14px}

  label{font-size:12px}
}

function fmtTelWA(tel){
  // Strip non-digits, prepend Mexico country code 52 if not present
  let d=tel.replace(/\D/g,"");
  if(d.length===10) d="52"+d;
  else if(d.startsWith("1")&&d.length===11) d="52"+d.slice(1);
  return d;
}
function buildWAMsg(ord,cli,bud,tec){
  const cv=bud?calc(bud.items):{s:0,iv:0,tot:0};
  const lines=[];
  lines.push(`🔧 *REDCOM — Redes · Cómputo · Videovigilancia*`);
  lines.push(`─────────────────────`);
  lines.push(`📋 *Orden:* ${ord.id}`);
  lines.push(`👤 *Cliente:* ${cli.nombre}`);
  lines.push(`💻 *Equipo:* ${ord.equipo}`);
  if(ord.serie&&ord.serie!=="N/A") lines.push(`🔢 *Serie:* ${ord.serie}`);
  lines.push(`📝 *Problema:* ${ord.prob}`);
  lines.push(``);
  lines.push(`💰 *PRESUPUESTO ${bud.id}*`);
  lines.push(`─────────────────────`);
  (bud.items||[]).forEach(it=>{
    if(it.t==="r") lines.push(`• ${it.n} × ${it.q} — ${mxn(it.q*it.p)}`);
    else           lines.push(`• ${it.n} (${it.h}h) — ${mxn(it.h*it.ph)}`);
  });
  lines.push(``);
  lines.push(`Subtotal: ${mxn(cv.s)}`);
  lines.push(`IVA (16%): ${mxn(cv.iv)}`);
  lines.push(`*TOTAL: ${mxn(cv.tot)}*`);
  lines.push(``);
  if(ord.ent) lines.push(`📅 *Entrega estimada:* ${fmtD(ord.ent)}`);
  if(tec?.nombre&&tec.nombre!=="Sin asignar") lines.push(`👨‍🔧 *Técnico:* ${tec.nombre}`);
  lines.push(``);
  lines.push(`Para *aceptar o rechazar* este presupuesto, responda este mensaje.`);
  lines.push(`¡Gracias por confiar en Redcom! 🙏`);
  return lines.join("\n");
}

/* ══ WHATSAPP UTILS ═══════════════════════════════════════════════════ */
function fmtTelWA(tel){
  let d=tel.replace(/\D/g,"");
  if(d.length===10) d="52"+d;
  return d;
}
function buildWAMsg(ord,cli,bud,tec){
  const cv=bud?calc(bud.items):{s:0,iv:0,tot:0};
  const L=[];
  L.push("\uD83D\uDD27 *REDCOM \u2014 Servicio T\u00E9cnico en C\u00F3mputo*");
  L.push("\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500");
  L.push("\uD83D\uDCCB *Orden:* "+ord.id);
  L.push("\uD83D\uDC64 *Cliente:* "+cli.nombre);
  L.push("\uD83D\uDCBB *Equipo:* "+ord.equipo);
  if(ord.serie&&ord.serie!=="N/A") L.push("\uD83D\uDD22 *Serie:* "+ord.serie);
  L.push("\uD83D\uDCDD *Falla:* "+ord.prob);
  L.push("");
  L.push("\uD83D\uDCB0 *PRESUPUESTO "+bud.id+"*");
  L.push("\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500");
  (bud.items||[]).forEach(it=>{
    if(it.t==="r") L.push("\u2022 "+it.n+" \u00D7 "+it.q+" \u2014 "+mxn(it.q*it.p));
    else if(it.t==="s") L.push("\u2022 "+it.n+" ("+it.q+" serv.) \u2014 "+mxn(it.q*it.p));
    else           L.push("\u2022 "+it.n+" ("+it.h+" serv.) \u2014 "+mxn(it.h*it.ph));
  });
  L.push("");
  L.push("Subtotal: "+mxn(cv.s));
  L.push("IVA (16%): "+mxn(cv.iv));
  L.push("*TOTAL: "+mxn(cv.tot)+"*");
  L.push("");
  if(ord.ent) L.push("\uD83D\uDCC5 *Entrega estimada:* "+fmtD(ord.ent));
  if(tec&&tec.nombre&&tec.nombre!=="Sin asignar") L.push("\uD83D\uDC68\u200D\uD83D\uDD27 *T\u00E9cnico:* "+tec.nombre);
  L.push("");
  L.push("Para *aceptar o rechazar* este presupuesto, responde este mensaje.");
  L.push("\uD83D\uDE4F \u00A1Gracias por confiar en Redcom!");
  return L.join("\n");
}

function WAModal({ord,cli,bud,tec,onClose}){
  const msg=buildWAMsg(ord,cli,bud,tec);
  const tel=fmtTelWA(cli.tel||"");
  const hasTel=tel.length>=10;
  function send(){
    const url=`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`;
    window.open(url,"_blank");
    onClose();
  }
  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:520}} onClick=${e=>e.stopPropagation()}>
      <div style=${{padding:"18px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style=${{display:"flex",alignItems:"center",gap:10}}>
          <div style=${{width:38,height:38,borderRadius:99,background:"#dcfce7",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <${Ic} n="wa" z=${20} s="#16a34a"/>
          </div>
          <div>
            <h2 style=${{fontSize:16,fontWeight:700}}>Enviar presupuesto por WhatsApp</h2>
            <div style=${{fontSize:12,color:"#64748b",marginTop:1}}>${cli.nombre} · ${cli.tel||"Sin teléfono registrado"}</div>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
      </div>
      <div style=${{padding:"18px 24px"}}>
        <div style=${{fontSize:12,fontWeight:600,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>Vista previa del mensaje</div>
        <div style=${{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:"14px 16px",position:"relative",maxHeight:300,overflowY:"auto"}}>
          <div style=${{position:"absolute",top:10,right:12,width:8,height:8,borderRadius:"50%",background:"#16a34a"}}/>
          <pre style=${{fontSize:12,color:"#1e293b",lineHeight:1.65,whiteSpace:"pre-wrap",fontFamily:"inherit",margin:0}}>${msg}</pre>
        </div>
        ${!hasTel&&html`<div style=${{marginTop:10,background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 12px",display:"flex",gap:8,alignItems:"center"}}>
          <${Ic} n="warn" z=${16} s="#dc2626"/>
          <span style=${{fontSize:12,color:"#dc2626"}}>El cliente no tiene teléfono registrado. Agrégalo en la sección Clientes.</span>
        </div>`}
      </div>
      <div style=${{padding:"16px 24px",borderTop:"1px solid #e2e8f0",background:"#f8fafc",borderRadius:"0 0 12px 12px"}}>
        <div style=${{fontSize:13,color:"#475569",marginBottom:14,textAlign:"center",fontWeight:500}}>
          ¿Deseas enviar este presupuesto a <b>${cli.nombre}</b> vía WhatsApp?
        </div>
        <div style=${{display:"flex",gap:8,justifyContent:"center"}}>
          <button class="btn btn-ghost" onClick=${onClose} style=${{minWidth:110}}>Cancelar</button>
          <button onClick=${send} disabled=${!hasTel} style=${{
            minWidth:190,padding:"9px 18px",borderRadius:8,border:"none",
            cursor:hasTel?"pointer":"not-allowed",
            background:hasTel?"#16a34a":"#94a3b8",color:"#fff",
            fontFamily:"inherit",fontSize:14,fontWeight:700,
            display:"inline-flex",alignItems:"center",justifyContent:"center",
            gap:8,opacity:hasTel?1:.6,transition:"background .15s"}}>
            <${Ic} n="wa" z=${17} s="#fff"/>
            Sí, proceder y enviar
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ══ MODAL INVENTARIO ══════════════════════════════════════════════════ */
function InvModal({edit,onSave,onClose}){
  const [f,setF]=useState(edit||{nombre:"",cat:CATS[0],unidad:"Pieza",precio:"",costo:"",margen:"",stock:"",puntoReorden:"",notas:""});
  const s=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  // Auto-calc precio from costo+margen or margen from costo+precio
  function onCostoChange(e){
    const costo=Number(e.target.value)||0;
    const margen=Number(f.margen)||0;
    const precio=margen>0?+(costo*(1+margen/100)).toFixed(2):(Number(f.precio)||0);
    setF(p=>({...p,costo:e.target.value,precio:margen>0?precio:p.precio}));
  }
  function onMargenChange(e){
    const margen=Number(e.target.value)||0;
    const costo=Number(f.costo)||0;
    const precio=costo>0?+(costo*(1+margen/100)).toFixed(2):(Number(f.precio)||0);
    setF(p=>({...p,margen:e.target.value,precio:costo>0?precio:p.precio}));
  }
  function onPrecioChange(e){
    const precio=Number(e.target.value)||0;
    const costo=Number(f.costo)||0;
    const margen=costo>0?+((precio/costo-1)*100).toFixed(1):Number(f.margen)||0;
    setF(p=>({...p,precio:e.target.value,margen:costo>0?margen:p.margen}));
  }
  const utilidad=(Number(f.precio)||0)-(Number(f.costo)||0);
  function save(){
    if(!f.nombre.trim()||!f.precio){alert("Nombre y precio son obligatorios.");return;}
    onSave({...f,precio:Number(f.precio),costo:Number(f.costo)||0,margen:Number(f.margen)||0,stock:Number(f.stock)||0,puntoReorden:Number(f.puntoReorden)||0,unidad:f.unidad||"Pieza",notas:f.notas||"",id:edit?.id||`P${++INVSEQ}`});
  }
  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:480}} onClick=${e=>e.stopPropagation()}>
      <div style=${{padding:"18px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style=${{fontSize:17,fontWeight:700}}>${edit?"Editar artículo":"Nuevo artículo"}</h2>
        <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
      </div>
      <div style=${{padding:"20px 24px",display:"grid",gap:12}}>
        <div><label>Nombre / Descripción *</label><input value=${f.nombre} onChange=${s("nombre")} placeholder='ej. Jack Keystone Cat6 Panduit'/></div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
          <div><label>Categoría</label>
            <select value=${f.cat} onChange=${s("cat")}>
              ${CATS.map(c=>html`<option key=${c} value=${c}>${c}</option>`)}
            </select>
          </div>
          <div><label>Unidad de venta</label>
            <select value=${f.unidad||"Pieza"} onChange=${s("unidad")}>
              ${UNIDADES.map(u=>html`<option key=${u} value=${u}>${u}</option>`)}
            </select>
          </div>
          <div><label>ID / SKU</label><input value=${f.id||""} disabled style=${{background:"#f8fafc",color:"#94a3b8"}} placeholder="Auto-generado"/></div>
        </div>
        <!-- Costo, margen y precio -->
        <div style=${{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"12px 14px"}}>
          <div style=${{fontWeight:600,fontSize:12,color:"#065f46",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="tag" z=${13} s="#059669"/> Precios (solo visible para administrador)
          </div>
          <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            <div>
              <label>Precio costo ($MXN)</label>
              <input type="number" min="0" step="0.01" value=${f.costo} onChange=${onCostoChange} placeholder="0.00"/>
            </div>
            <div>
              <label>% Ganancia</label>
              <input type="number" min="0" step="1" value=${f.margen} onChange=${onMargenChange} placeholder="0"/>
            </div>
            <div>
              <label>Precio venta * </label>
              <input type="number" min="0" step="0.01" value=${f.precio} onChange=${onPrecioChange} placeholder="0.00"/>
            </div>
          </div>
          ${Number(f.costo)>0&&Number(f.precio)>0&&html`
            <div style=${{marginTop:8,padding:"6px 10px",background:"#dcfce7",borderRadius:7,fontSize:11,display:"flex",gap:16,flexWrap:"wrap"}}>
              <span style=${{color:"#065f46"}}>Utilidad por pieza: <b>${mxn(utilidad)}</b></span>
              <span style=${{color:"#065f46"}}>Margen: <b>${Number(f.margen)||0}%</b></span>
              <span style=${{color:utilidad<0?"#dc2626":"#059669",fontWeight:700}}>${utilidad<0?"⚠️ Precio menor al costo":"✓ Rentable"}</span>
            </div>`}
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Stock disponible</label><input type="number" min="0" value=${f.stock} onChange=${s("stock")} placeholder="0"/></div>
          <div><label>Punto de reorden</label><input type="number" min="0" value=${f.puntoReorden} onChange=${s("puntoReorden")} placeholder="ej. 3"/></div>
        </div>
        <div><label>Notas internas (proveedor, referencia, etc.)</label><input value=${f.notas||""} onChange=${s("notas")} placeholder="ej. Comprar en Syscom, código DAH-IPC2849"/></div>
      </div>
      <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"flex-end",gap:8}}>
        <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
        <button class="btn btn-primary" onClick=${save}><${Ic} n="ok" z=${14} s="#fff"/> ${edit?"Guardar cambios":"Agregar artículo"}</button>
      </div>
    </div>
  </div>`;
}

/* ══ IMPRIMIR COTIZACIÓN ════════════════════════════════════════════════ */
function printTicketPOS(items, total, metodo, recibido, cambio, config, folio){

function buildCotWAMsg(cot, cli, tec){
  const sub=cot.items.reduce((a,i)=>a+(i.qty*i.precio),0);
  const tot=cot.iva?+(sub*1.16).toFixed(2):sub;
  let msg=`*REDCOM* — Redes · Cómputo · Videovigilancia\n`;
  msg+=`_Los Mochis, Sinaloa_\n\n`;
  msg+=`📋 *Cotización ${cot.id}*\n`;
  msg+=`📅 Fecha: ${fmtD(cot.fecha)}\n`;
  if(tec) msg+=`👤 Asesor: ${tec.nombre}\n`;
  msg+=`\nEstimado/a *${cli.nombre}*,\nAdjuntamos la cotización solicitada:\n\n`;
  cot.items.forEach(it=>{
    msg+=`• ${it.nombre} × ${it.qty} — ${mxn(it.qty*it.precio)}\n`;
  });
  msg+=`\n`;
  if(cot.iva) msg+=`Subtotal: ${mxn(sub)}\nIVA 16%: ${mxn(+(sub*0.16).toFixed(2))}\n`;
  msg+=`*TOTAL: ${mxn(tot)}*\n\n`;
  msg+=`⏳ Válida por ${cot.validez||15} días.\n`;
  msg+=`\nQuedamos a sus órdenes para cualquier duda. 😊`;
  return msg;
}

            <div style=${{fontSize:11,fontWeight:600,color:sv.activo?"#059669":"#94a3b8"}}>${sv.activo?"Activo":"Inactivo"}</div>
            <div style=${{display:"flex",gap:3,padding:"6px 4px",justifyContent:"flex-end"}}>
              <button class="btn btn-ghost btn-sm" onClick=${()=>onEdit(sv)}><${Ic} n="edit" z=${12}/></button>
              <button class="btn btn-danger btn-sm" onClick=${()=>setConfirm(sv)}><${Ic} n="trash" z=${12} s="#dc2626"/></button>
            </div>
          </div>`;
        })}`}
    </div>
    ${confirm&&html`<${Confirm}
      msg=${"Se eliminará el servicio <b>"+confirm.nombre+"</b>."}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}

function BudModal({ord,cli,invItems,svcItems,exist,tarifaMO,onSave,onClose}){
  const [items,setIt]=useState(exist?.items||[]);
  const [est,setEst]=useState(exist?.est||"Borrador");
  const [selP,setSP]=useState("");
  const [qty,setQty]=useState(1);
  const [selSV,setSV]=useState("");
  const [qtySV,setQSV]=useState(1);
  const [svcs,setSvcs]=useState(1);
  const [ln,setLn]=useState("Diagnóstico y reparación");
  const [tarifa,setTarifa]=useState(tarifaMO||200);
  const cv=calc(items);
  const SC={Borrador:["#f1f5f9","#64748b"],Aceptado:["#f0fdf4","#059669"],Rechazado:["#fef2f2","#dc2626"]};

  function addP(){
    const p=invItems.find(x=>x.id===selP);
    if(!p)return;
    setIt(prev=>{
      const ex=prev.find(i=>i.t==="r"&&i.ref===p.id);
      return ex?prev.map(i=>i.ref===p.id?{...i,q:i.q+Number(qty)}:i)
               :[...prev,{t:"r",ref:p.id,n:p.nombre,q:Number(qty),p:p.precio}];
    });
    setSP("");setQty(1);
  }
  function addSV(){
    const sv=svcItems.find(x=>x.id===selSV);
    if(!sv)return;
    setIt(prev=>{
      const ex=prev.find(i=>i.t==="s"&&i.ref===sv.id);
      return ex?prev.map(i=>i.ref===sv.id?{...i,q:i.q+Number(qtySV)}:i)
               :[...prev,{t:"s",ref:sv.id,n:sv.nombre,cat:sv.cat,q:Number(qtySV),p:sv.precio}];
    });
    setSV("");setQSV(1);
  }
  function addL(){
    if(!ln.trim())return;
    setIt(prev=>[...prev,{t:"m",n:ln,h:Number(svcs),ph:Number(tarifa)}]);
    setLn("Diagnóstico y reparación");setSvcs(1);
  }
  function save(){
    const id=exist?.id||`B${String(++PRES).padStart(1,"0")}${Date.now().toString().slice(-3)}`;
    onSave({id,oid:ord.id,items,est,...cv});
  }

  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:700}} onClick=${e=>e.stopPropagation()}>

      <!-- Header -->
      <div style=${{padding:"18px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>

          <h2 style=${{fontSize:17,fontWeight:700}}>Presupuesto — ${ord.id}</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:1}}>${cli.nombre} · ${ord.equipo}</div>
        </div>
        <div style=${{display:"flex",gap:6,alignItems:"center"}}>
          ${["Borrador","Aceptado","Rechazado"].map(x=>html`<button key=${x} onClick=${()=>setEst(x)} style=${{
            padding:"3px 12px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",border:"1.5px solid",
            borderColor:est===x?SC[x][1]:"#e2e8f0",background:est===x?SC[x][0]:"#fff",color:SC[x][1]}}>${x}</button>`)}
          <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
        </div>
      </div>

      <div style=${{padding:"20px 24px",display:"grid",gap:16}}>

        <!-- Sección: Repuestos -->
        <div style=${{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px"}}>
          <div style=${{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="box" z=${15} s="#1d4ed8"/> Agregar repuesto / refacción
          </div>
          <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style=${{flex:1}}>
              <label>Artículo</label>
              <select value=${selP} onChange=${e=>setSP(e.target.value)}>
                <option value="">— Seleccionar del inventario —</option>
                ${invItems.map(p=>html`<option key=${p.id} value=${p.id}>[${p.cat}] ${p.nombre} — ${mxn(p.precio)}</option>`)}
              </select>
            </div>
            <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
            <button class="btn btn-primary" onClick=${addP} disabled=${!selP}>+ Agregar</button>
          </div>
        </div>

        <!-- Sección: Catálogo de Servicios -->
        <div style=${{background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:10,padding:"14px 16px"}}>
          <div style=${{fontWeight:700,fontSize:13,color:"#6b21a8",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="tag" z=${15} s="#9333ea"/> Agregar del catálogo de servicios
          </div>
          <div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style=${{flex:1,minWidth:200}}>
              <label>Servicio</label>
              <select value=${selSV} onChange=${e=>setSV(e.target.value)}>
                <option value="">— Seleccionar servicio —</option>
                ${(svcItems||[]).filter(s=>s.activo).map(s=>html`<option key=${s.id} value=${s.id}>[${s.cat}] ${s.nombre} — ${mxn(s.precio)}</option>`)}
              </select>
            </div>
            <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qtySV} onChange=${e=>setQSV(e.target.value)}/></div>
            ${selSV&&html`<div style=${{minWidth:80,textAlign:"right"}}>
              <label style=${{textAlign:"right"}}>Importe</label>
              <div style=${{height:36,display:"flex",alignItems:"center",justifyContent:"flex-end",fontWeight:700,fontSize:14,color:"#9333ea"}}>
                ${mxn(Number(qtySV)*(svcItems.find(s=>s.id===selSV)?.precio||0))}
              </div>
            </div>`}
            <button class="btn btn-sm" onClick=${addSV} disabled=${!selSV} style=${{background:"#9333ea",color:"#fff",border:"none",whiteSpace:"nowrap"}}>+ Agregar</button>
          </div>
        </div>

        <!-- Sección: Mano de obra -->
        <div style=${{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"14px 16px"}}>
          <div style=${{fontWeight:700,fontSize:13,color:"#065f46",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="techs" z=${15} s="#059669"/> Agregar servicio de mano de obra
          </div>

          <!-- Tarifa configurable -->
          <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:12,background:"#dcfce7",border:"1px solid #86efac",borderRadius:8,padding:"8px 12px"}}>
            <${Ic} n="tag" z=${14} s="#059669"/>
            <span style=${{fontSize:12,fontWeight:600,color:"#065f46",whiteSpace:"nowrap"}}>Tarifa por servicio:</span>
            <div style=${{display:"flex",alignItems:"center",gap:4,flex:1,maxWidth:160}}>
              <span style=${{fontSize:13,fontWeight:700,color:"#065f46"}}>$</span>
              <input type="number" min="0" step="50" value=${tarifa}
                onChange=${e=>setTarifa(Number(e.target.value))}
                style=${{background:"#fff",border:"1px solid #86efac",borderRadius:6,padding:"5px 8px",
                         fontSize:14,fontWeight:700,color:"#065f46",width:90,textAlign:"right"}}/>
              <span style=${{fontSize:12,color:"#059669",whiteSpace:"nowrap"}}>MXN / servicio</span>
            </div>
          </div>

          <!-- Campos -->
          <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style=${{flex:1}}>
              <label>Descripción del servicio</label>
              <input value=${ln} onChange=${e=>setLn(e.target.value)} placeholder="ej. Diagnóstico y limpieza profunda"/>
            </div>
            <div style=${{width:90}}>
              <label>Servicios</label>
              <input type="number" min="1" step="1" value=${svcs} onChange=${e=>setSvcs(e.target.value)}/>
            </div>
            <div style=${{width:100,textAlign:"right"}}>
              <label style=${{textAlign:"right"}}>Importe</label>
              <div style=${{height:36,display:"flex",alignItems:"center",justifyContent:"flex-end",
                           fontWeight:700,fontSize:14,color:"#059669"}}>${mxn(Number(svcs)*Number(tarifa))}</div>
            </div>
            <button class="btn btn-success" onClick=${addL} disabled=${!ln.trim()}>+ Agregar</button>
          </div>
        </div>

        <!-- Desglose de ítems -->
        ${items.length>0?html`
          <div>
            <div style=${{fontWeight:600,fontSize:13,color:"#1e293b",marginBottom:8}}>Desglose del presupuesto</div>
            <div style=${{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
              <div style=${{display:"grid",gridTemplateColumns:"1fr 80px 110px 90px",background:"#f8fafc",padding:"7px 12px",gap:8}}>
                ${["Descripción","Cant.","Precio u.","Total"].map(h=>html`<div key=${h} style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:"#94a3b8"}}>${h}</div>`)}
              </div>
              ${items.map((it,i)=>html`
                <div key=${i} style=${{display:"grid",gridTemplateColumns:"1fr 80px 110px 90px",padding:"9px 12px",gap:8,borderTop:"1px solid #f1f5f9",alignItems:"center"}}>
                  <div>

                    <div style=${{fontSize:10,color:"#94a3b8"}}>${it.t==="r"?"Refacción":it.t==="s"?"Servicio (catálogo)":"Mano de obra"}</div>

                    <span style=${{fontSize:12,fontWeight:700,color:it.t==="r"?"#1e293b":it.t==="s"?"#9333ea":"#059669"}}>
                      ${it.t==="r"?mxn(it.q*it.p):it.t==="s"?mxn(it.q*it.p):mxn(it.h*it.ph)}
                    </span>
                    <button onClick=${()=>setIt(p=>p.filter((_,j)=>j!==i))}
                      style=${{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:18,lineHeight:1,padding:"0 2px"}}>×</button>
                  </div>

              <div style=${{background:"#f8fafc",padding:"10px 14px",borderTop:"2px solid #e2e8f0",display:"flex",justifyContent:"flex-end"}}>

        :html`<div style=${{textAlign:"center",padding:28,color:"#94a3b8",background:"#f8fafc",borderRadius:8,border:"1px dashed #e2e8f0"}}>
          <${Ic} n="box" z=${28} s="#cbd5e1"/>

        </div>`}

        <div style=${{fontSize:11,color:"#94a3b8"}}>${items.length} concepto${items.length!==1?"s":""} agregado${items.length!==1?"s":""}</div>
        <div style=${{display:"flex",gap:8}}>
          <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
          <button class="btn btn-primary" onClick=${save} disabled=${items.length===0}>
            <${Ic} n="ok" z=${14} s="#fff"/> Guardar presupuesto
          </button>
        </div>
      </div>

    </div>
  </div>`;
}

// Touch drag state (global para el componente)

                  <button onClick=${e=>{e.stopPropagation();const r=e.currentTarget.getBoundingClientRect();setStPicker(stPicker?.ordId===o.id?null:{ordId:o.id,curEst:o.est,x:r.left,y:r.bottom+4});}}

}
function CliDetalle({cl,ords,pagos,gars,onEdit,onClose}){

                onMouseOver=${e=>e.currentTarget.style.background="var(--mac-surface)"}

                <div style=${{width:34,height:34,borderRadius:8,background:mc[0],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>

            const color=dias>15?"#059669":dias>0?"#d97706":"#dc2626";
            const label=dias>0?dias+"d restantes":"Vencida";
            return html`<div key=${g.id} style=${{padding:"12px 16px",borderBottom:"1px solid var(--mac-rim)"}}
              onMouseOver=${e=>e.currentTarget.style.background="var(--mac-surface)"}
              onMouseOut=${e=>e.currentTarget.style.background=""}>
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style=${{fontSize:12,fontWeight:700,color:"var(--mac-ink)",fontFamily:"monospace"}}>${g.id}</div>
                  <div style=${{fontSize:11,color:"var(--mac-ink4)",marginTop:2}}>Orden ${g.ordId} · Hasta ${fmtD(g.hasta)}</div>
                  ${g.desc&&html`<div style=${{fontSize:11,color:"var(--mac-ink3)",marginTop:3}}>${g.desc}</div>`}
                </div>
                <span style=${{background:color+"15",color,fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99,border:"1.5px solid "+color+"44"}}>${label}</span>
              </div>
            </div>`;
          })}
      </div>`}

    </div>
  </div>`;
}

/* ══ SECCIÓN CLIENTES ════════════════════════════════════════════════════ */
function ClientsSection({cls,ords,pagos,gars,onAdd,onEdit,onDel}){
  const [q,setQ]=useState("");
  const [selId,setSelId]=useState(null);
  const [confirm,setConfirm]=useState(null);

  const filt=cls.filter(cl=>!q||[cl.nombre,cl.empresa,cl.tel,cl.email].some(x=>x?.toLowerCase().includes(q.toLowerCase())));
  const selCl=cls.find(x=>x.id===selId);

  // Sort by most orders
  const ordsCount=id=>ords.filter(o=>o.cid===id).length;
  const sorted=[...filt].sort((a,b)=>ordsCount(b.id)-ordsCount(a.id));

  const isMob=window.innerWidth<=768;

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>

    <!-- Lista — siempre full width -->
    <div style=${{height:"100%",display:"flex",flexDirection:"column",background:"var(--mac-bg)",overflow:"hidden"}}>

      <!-- Toolbar -->
      <div style=${{padding:"12px 16px",borderBottom:"1px solid var(--mac-rim)",background:"var(--mac-bg)",flexShrink:0}}>
        <div style=${{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <h2 style=${{fontSize:16,fontWeight:700,flex:1}}>Clientes</h2>
          <span style=${{fontSize:11,color:"var(--mac-ink4)"}}>${cls.length} reg.</span>
          <button class="btn btn-primary btn-sm" onClick=${onAdd}><${Ic} n="plus" z=${13} s="#fff"/> Nuevo</button>
        </div>
        <div style=${{position:"relative"}}>
          
          <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar…" style=${{fontSize:12}}/>
        </div>
      </div>

      <!-- Lista -->
      <div style=${{flex:1,overflowY:"auto"}}>
        ${sorted.length===0
          ?html`<div class="empty-state"><${Ic} n="clients" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
          :sorted.map(cl=>{
            const n=ordsCount(cl.id);
            const activas=ords.filter(o=>o.cid===cl.id&&o.est!=="Entregado").length;
            const esFrecuente=n>=3;
            const isSelected=selId===cl.id;
            return html`<div key=${cl.id}
              style=${{padding:"11px 14px",borderBottom:"1px solid var(--mac-rim)",cursor:"pointer",
                background:isSelected?"#eff6ff":"var(--mac-bg)",
                borderLeft:isSelected?"3px solid #1d4ed8":"3px solid transparent",
                transition:"background .1s"}}>
              <div style=${{display:"flex",gap:10,alignItems:"center"}}>
                <div style=${{width:36,height:36,borderRadius:10,background:isSelected?"#1d4ed8":"var(--mac-surface2)",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:14,fontWeight:800,color:isSelected?"#fff":"var(--mac-ink4)",flexShrink:0}}
                  onClick=${()=>setSelId(isSelected?null:cl.id)}>
                  ${cl.nombre.charAt(0).toUpperCase()}
                </div>
                <div style=${{flex:1,minWidth:0}} onClick=${()=>setSelId(isSelected?null:cl.id)}>
                  <div style=${{display:"flex",alignItems:"center",gap:5}}>
                    <div style=${{fontSize:13,fontWeight:600,color:isSelected?"#1d4ed8":"var(--mac-ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${cl.nombre}</div>
                    ${esFrecuente&&html`<span style=${{fontSize:8,background:"#fef3c7",color:"#92400e",padding:"1px 5px",borderRadius:99,fontWeight:800,flexShrink:0}}>⭐</span>`}
                  </div>
                  <div style=${{fontSize:10,color:"var(--mac-ink4)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    ${cl.empresa?cl.empresa+" · ":""}${cl.tel||cl.email||"Sin contacto"}
                  </div>
                </div>
                <div style=${{display:"flex",gap:4,alignItems:"center",flexShrink:0}}>
                  <div style=${{textAlign:"right",marginRight:4}}>
                    <div style=${{fontSize:12,fontWeight:700,color:isSelected?"#1d4ed8":"var(--mac-ink3)"}}>${n}</div>
                    ${activas>0&&html`<div style=${{fontSize:9,color:"#d97706",fontWeight:700}}>${activas} act.</div>`}
                  </div>
                  <button class="btn btn-ghost btn-sm" onClick=${e=>{e.stopPropagation();onEdit(cl);}} title="Editar"><${Ic} n="edit" z=${11}/></button>
                  <button class="btn btn-danger btn-sm" onClick=${e=>{e.stopPropagation();setConfirm(cl);}} title="Eliminar"><${Ic} n="trash" z=${11} s="#dc2626"/></button>
                </div>
              </div>
            </div>`;
          })}
      </div>
    </div>

    <!-- Drawer overlay — desliza desde la derecha sin encoger la lista -->
    ${selCl&&html`
      <!-- Sombra de fondo -->
      <div onClick=${()=>setSelId(null)}
        style=${{position:"absolute",inset:0,background:"rgba(15,23,42,.35)",zIndex:10,backdropFilter:"blur(1px)"}}/>
      <!-- Panel -->
      <div style=${{
        position:"absolute",top:0,right:0,bottom:0,
        width:"min(520px,85%)",
        background:"var(--mac-bg)",zIndex:11,
        boxShadow:"-8px 0 32px rgba(0,0,0,.18)",
        display:"flex",flexDirection:"column",
        animation:"si .2s ease"}}>
        <${CliDetalle} cl=${selCl} ords=${ords} pagos=${pagos} gars=${gars}
          onEdit=${onEdit}
          onClose=${()=>setSelId(null)}/>
      </div>`}

    ${confirm&&html`<${Confirm}
      msg=${"¿Eliminar a <b>"+confirm.nombre+"</b>? Se perderán sus datos."}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);setSelId(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}


/* ══ SECCIÓN INVENTARIO ═════════════════════════════════════════════════ */
function InvSection({inv,provs,ocs,onAdd,onEdit,onDel,onSaveOC,session}){
  const [q,setQ]=useState("");
  const [catF,setCatF]=useState("Todas");
  const [filtro,setFiltro]=useState("todos"); // todos|bajo|ok
  const [confirm,setConfirm]=useState(null);
  const [showOCConfirm,setShowOCConfirm]=useState(false);
  const isAdmin=session?.rol==="admin";
  // Columnas: con o sin columnas de costo (solo admin)
  const cols=isAdmin
    ?"50px 1fr 100px 88px 80px 70px 60px 70px 64px"
    :"50px 1fr 100px 88px 70px 70px 60px";

  const cats=["Todas",...new Set(inv.map(i=>i.cat))];

  // Items bajo punto de reorden
  const bajoPR = inv.filter(i=>{
    const pr = Number(i.puntoReorden)||0;
    return pr>0 && i.stock<=pr;
  });
  const sinPR = inv.filter(i=>!Number(i.puntoReorden));

  const filt = inv.filter(i=>{
    const matchQ = !q||i.nombre.toLowerCase().includes(q.toLowerCase())||i.id.toLowerCase().includes(q.toLowerCase());
    const matchCat = catF==="Todas"||i.cat===catF;
    const matchFiltro = filtro==="todos"||
      (filtro==="bajo"&&bajoPR.includes(i))||
      (filtro==="ok"&&!bajoPR.includes(i));
    return matchQ&&matchCat&&matchFiltro;
  });

  function generarOCBorrador(){
    // Group by first proveedor or unassigned
    const itemsOC = bajoPR.map(i=>({
      invId:i.id,
      nom:i.nombre,
      qty: Math.max(1,(Number(i.puntoReorden)||0)*2 - i.stock), // suggest qty to reach 2x reorder
      precio: Number(i.costo)||0,
    }));
    const newOC = {
      id:"OC-"+String(++OCMPSEQ).padStart(4,"0"),
      prvId: provs[0]?.id||"",
      fecha: new Date().toISOString().slice(0,10),
      est: "Borrador",
      notas: "Generada automáticamente por alerta de reorden",
      items: itemsOC,
    };
    onSaveOC(newOC);
    setShowOCConfirm(false);
    alert("✅ OC "+newOC.id+" creada como Borrador en Órdenes de Compra.");
  }

  const stockColor = i => {
    const pr = Number(i.puntoReorden)||0;
    if(pr>0 && i.stock<=pr)   return "#dc2626";
    if(pr>0 && i.stock<=pr*2) return "#d97706";
    return "#1e293b";
  };
  const stockBg = i => {
    const pr = Number(i.puntoReorden)||0;
    if(pr>0 && i.stock<=pr)   return "#fef2f2";
    if(pr>0 && i.stock<=pr*2) return "#fffbeb";
    return "transparent";
  };

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>

    <!-- Toolbar -->
    <div style=${{padding:"14px 20px",borderBottom:"1px solid var(--mac-rim)",background:"var(--mac-bg)",flexShrink:0}}>
      <div class="section-header" style=${{marginBottom:bajoPR.length>0?12:0}}>
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Inventario de Refacciones</h2>
          <div style=${{fontSize:12,color:"var(--mac-ink4)",marginTop:2}}>${inv.length} artículos</div>
        </div>
        <div style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div class="search-bar">
            
            <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar artículo..."/>
          </div>
          <select value=${catF} onChange=${e=>setCatF(e.target.value)} style=${{width:"auto",minWidth:130}}>
            ${cats.map(ct=>html`<option key=${ct} value=${ct}>${ct}</option>`)}
          </select>
          <button class="btn btn-primary" onClick=${onAdd}><${Ic} n="plus" z=${14} s="#fff"/> Nuevo</button>
        </div>
      </div>

      <!-- Filtros rápidos -->
      <div style=${{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        ${[["todos","📦","Todos",inv.length],["bajo","🔴","Bajo reorden",bajoPR.length],["ok","✅","Stock OK",inv.length-bajoPR.length]].map(([k,ic,lbl,n])=>html`
          <button key=${k} onClick=${()=>setFiltro(k)} style=${{
            padding:"4px 12px",borderRadius:99,border:"1.5px solid",fontFamily:"inherit",
            fontSize:11,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5,
            borderColor:filtro===k?"#1d4ed8":"var(--mac-rim)",
            background:filtro===k?"#eff6ff":"var(--mac-surface)",
            color:filtro===k?"#1d4ed8":"var(--mac-ink4)"}}>
            ${ic} ${lbl}
            <span style=${{background:filtro===k?"#1d4ed8":"var(--mac-rim)",color:filtro===k?"#fff":"var(--mac-ink4)",fontSize:9,padding:"0 5px",borderRadius:99}}>${n}</span>
          </button>`)}
        ${sinPR.length>0&&html`<span style=${{fontSize:10,color:"var(--mac-ink4)",marginLeft:4}}>· ${sinPR.length} sin punto de reorden configurado</span>`}
      </div>
    </div>

    <!-- Banner alerta reorden -->
    ${bajoPR.length>0&&html`
      <div style=${{background:"#fffbeb",borderBottom:"2px solid #fde68a",padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"}}>
        <div style=${{fontSize:18}}>⚠️</div>
        <div style=${{flex:1,minWidth:200}}>
          <div style=${{fontSize:13,fontWeight:700,color:"#92400e"}}>
            ${bajoPR.length} artículo${bajoPR.length!==1?"s":""} bajo su punto de reorden
          </div>
          <div style=${{fontSize:11,color:"#a16207",marginTop:1}}>
            ${bajoPR.slice(0,3).map(i=>i.nombre).join(", ")}${bajoPR.length>3?" y "+(bajoPR.length-3)+" más":""}
          </div>
        </div>
        <button onClick=${()=>setShowOCConfirm(true)} style=${{
          padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",
          background:"#d97706",color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:700,
          display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
          <${Ic} n="plus" z=${13} s="#fff"/> Generar OC Borrador
        </button>
      </div>`}

    <!-- Tabla -->
    <div style=${{flex:1,overflowY:"auto"}}>
      <div class="tbl-hdr inv-hdr" style=${{display:"grid",gridTemplateColumns:cols}}>
        <div>SKU</div>
        <div>Artículo</div>
        <div>Categoría</div>
        <div>Precio venta</div>
        ${isAdmin&&html`<div style=${{color:"#7c3aed"}}>Costo</div>`}
        ${isAdmin&&html`<div style=${{color:"#059669"}}>Utilidad / %</div>`}
        <div>Stock</div>
        <div>Pto. Reorden</div>
        <div></div>
      </div>
      ${filt.length===0
        ?html`<div class="empty-state"><${Ic} n="box" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
        :filt.map(p=>{
          const pr=Number(p.puntoReorden)||0;
          const bajo=pr>0&&p.stock<=pr;
          const cerca=pr>0&&p.stock>pr&&p.stock<=pr*2;
          const costo=Number(p.costo)||0;
          const precio=Number(p.precio)||0;
          const utilidad=precio-costo;
          const margen=Number(p.margen)||( costo>0?+((precio/costo-1)*100).toFixed(1):0 );
          return html`<div key=${p.id} class="tbl-row inv-row" style=${{display:"grid",gridTemplateColumns:cols,background:bajo?"#fffbeb":""}}>
            <div style=${{fontFamily:"monospace",fontSize:11,color:"var(--mac-ink4)"}}>${p.id}</div>
            <div>
              <div style=${{fontWeight:500,fontSize:13,color:"var(--mac-ink)"}}>${p.nombre}</div>
              ${p.unidad&&p.unidad!=="Pieza"&&html`<div style=${{fontSize:10,color:"#7c3aed",fontWeight:600,marginTop:1}}>por ${p.unidad}</div>`}
              ${bajo&&html`<div style=${{fontSize:9,color:"#dc2626",fontWeight:700,marginTop:1}}>⚠️ BAJO REORDEN</div>`}
              ${cerca&&html`<div style=${{fontSize:9,color:"#d97706",fontWeight:700,marginTop:1}}>⚡ CERCA DEL LÍMITE</div>`}
            </div>
            <div><span style=${{background:"var(--mac-surface2)",color:"var(--mac-ink3)",padding:"2px 8px",borderRadius:99,fontSize:11}}>${p.cat}</span></div>
            <div style=${{fontWeight:600,color:"#059669",fontSize:13}}>${mxn(precio)}</div>
            ${isAdmin&&html`<div style=${{fontSize:13,color:costo>0?"#7c3aed":"#cbd5e1",fontWeight:500}}>${costo>0?mxn(costo):"—"}</div>`}
            ${isAdmin&&html`<div style=${{lineHeight:1.3}}>
              ${costo>0?html`
                <div style=${{fontSize:11,fontWeight:700,color:utilidad>=0?"#059669":"#dc2626"}}>${(utilidad>=0?"+":"")+mxn(utilidad)}</div>
                <span style=${{display:"inline-flex",padding:"1px 6px",borderRadius:99,fontSize:10,fontWeight:700,
                  background:margen>=30?"#f0fdf4":margen>=15?"#fffbeb":"#fef2f2",
                  color:margen>=30?"#059669":margen>=15?"#d97706":"#dc2626"}}>
                  ${margen}%
                </span>`
              :html`<span style=${{color:"#cbd5e1",fontSize:12}}>—</span>`}
            </div>`}
            <div style=${{background:stockBg(p),borderRadius:6,padding:"2px 6px",display:"inline-flex",alignItems:"center",gap:4}}>
              <span style=${{fontWeight:700,fontSize:13,color:stockColor(p)}}>${p.stock}</span>
              ${bajo&&html`<span style=${{fontSize:9,color:"#dc2626"}}>▼</span>`}
            </div>
            <div style=${{fontSize:12,color:pr>0?"var(--mac-ink)":"var(--mac-ink4)",fontStyle:pr>0?"normal":"italic"}}>
              ${pr>0?pr:"—"}
            </div>
            <div style=${{display:"flex",gap:3,padding:"6px 4px",justifyContent:"flex-end"}}>
              <button class="btn btn-ghost btn-sm" onClick=${()=>onEdit(p)}><${Ic} n="edit" z=${12}/></button>
              <button class="btn btn-danger btn-sm" onClick=${()=>setConfirm(p)}><${Ic} n="trash" z=${12} s="#dc2626"/></button>
            </div>
          </div>`;
        })}
    </div>

    <!-- Modal confirmar generar OC -->
    ${showOCConfirm&&html`<div class="modal-bg" onClick=${()=>setShowOCConfirm(false)}>
      <div class="modal fade-in" style=${{maxWidth:480}} onClick=${e=>e.stopPropagation()}>
        <div style=${{padding:"18px 22px",borderBottom:"1px solid var(--mac-rim)"}}>
          <div style=${{fontSize:16,fontWeight:700}}>Generar OC Borrador</div>
          <div style=${{fontSize:12,color:"var(--mac-ink4)",marginTop:2}}>Se creará una Orden de Compra con los siguientes artículos</div>
        </div>
        <div style=${{padding:"14px 22px",maxHeight:300,overflowY:"auto"}}>
          ${bajoPR.map(i=>{
            const pr=Number(i.puntoReorden)||0;
            const sugerido=Math.max(1,pr*2-i.stock);
            return html`<div key=${i.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--mac-rim)"}}>
              <div>
                <div style=${{fontSize:12,fontWeight:600,color:"var(--mac-ink)"}}>${i.nombre}</div>
                <div style=${{fontSize:10,color:"var(--mac-ink4)"}}>Stock: ${i.stock} · Reorden: ${pr}</div>
              </div>
              <div style=${{textAlign:"right"}}>
                <div style=${{fontSize:12,fontWeight:700,color:"#1d4ed8"}}>× ${sugerido} uds.</div>
                <div style=${{fontSize:10,color:"var(--mac-ink4)"}}>${mxn(i.costo*sugerido)}</div>
              </div>
            </div>`;
          })}
        </div>
        <div style=${{padding:"10px 22px",background:"var(--mac-surface)",borderTop:"1px solid var(--mac-rim)",borderRadius:"0 0 12px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style=${{fontSize:11,color:"var(--mac-ink4)"}}>
            Se creará como <b>Borrador</b> en Órdenes de Compra
          </div>
          <div style=${{display:"flex",gap:8}}>
            <button class="btn btn-ghost btn-sm" onClick=${()=>setShowOCConfirm(false)}>Cancelar</button>
            <button class="btn btn-primary btn-sm" onClick=${generarOCBorrador}>
              <${Ic} n="plus" z=${13} s="#fff"/> Crear OC
            </button>
          </div>
        </div>
      </div>
    </div>`}

    ${confirm&&html`<${Confirm}
      msg=${"¿Eliminar <b>"+confirm.nombre+"</b> del inventario?"}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}

/* ══ SECCIÓN TÉCNICOS ═══════════════════════════════════════════════════ */
function TecSection({tecs,ords,onAdd,onEdit,onDel,onToggle}){

  const [confirm,setConfirm]=useState(null);
  const filt=tecs.filter(t=>!q||[t.nombre,t.especialidad,t.rol].some(x=>x.toLowerCase().includes(q.toLowerCase())));

    <div style=${{padding:"16px 24px",borderBottom:"1px solid rgba(0,0,0,.06)",backdropFilter:"blur(20px) saturate(180%)",WebkitBackdropFilter:"blur(20px) saturate(180%)",background:"rgba(255,255,255,.75)",flexShrink:0,position:"relative",zIndex:1}}>
      <div class="section-header">
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Técnicos</h2>

    </div>
    <div style=${{flex:1,overflowY:"auto"}}>
      <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"1fr 160px 150px 90px 60px 90px"}}>
        ${["Técnico","Especialidad","Contacto","Rol","Estado",""].map(h=>html`<div key=${h}>${h}</div>`)}
      </div>
      ${filt.length===0?html`<div class="empty-state"><${Ic} n="techs" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
      :filt.map(t=>{
        const nOrds=ords.filter(o=>o.tec===t.id&&o.est!=="Entregado").length;

            </div>
          </div>
          <div style=${{fontSize:12,color:"#475569"}}>${t.especialidad||"—"}</div>

  </div>`;
}

function DashKPIs({ords,pagos,notas,cls}){
  const hoy   = new Date().toISOString().slice(0,10);
  const mes   = hoy.slice(0,7);
  const ayer  = new Date(Date.now()-86400000).toISOString().slice(0,10);

  const ingresosHoy = pagos.filter(p=>p.fecha===hoy).reduce((s,p)=>s+p.monto,0);
  const ingresosMes = pagos.filter(p=>p.fecha.startsWith(mes)).reduce((s,p)=>s+p.monto,0);
  const ingresosAyer= pagos.filter(p=>p.fecha===ayer).reduce((s,p)=>s+p.monto,0);
  const deltaHoy    = ingresosHoy - ingresosAyer;

  const ordsActivas = ords.filter(o=>o.est!=="Entregado").length;
  const ordsHoy     = ords.filter(o=>o.fecha===hoy).length;
  const urgentes    = ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado").length;

  // Tiempo promedio de reparación (días, órdenes entregadas)
  const entregadas = ords.filter(o=>o.est==="Entregado"&&o.fechaEntrega&&o.fecha);
  const avgDias = entregadas.length
    ? (entregadas.reduce((s,o)=>s+Math.max(0,(new Date(o.fechaEntrega)-new Date(o.fecha))/(1000*60*60*24)),0)/entregadas.length).toFixed(1)
    : "—";

  const clisNuevos = cls.filter(cl=>{
    const primerOrd = ords.filter(o=>o.cid===cl.id).sort((a,b)=>a.fecha.localeCompare(b.fecha))[0];
    return primerOrd?.fecha?.startsWith(mes);
  }).length;

  const KPIS=[
    {lbl:"Ingresos hoy",     val:mxn(ingresosHoy), sub:deltaHoy>=0?"▲ "+mxn(Math.abs(deltaHoy))+" vs ayer":"▼ "+mxn(Math.abs(deltaHoy))+" vs ayer", subCol:deltaHoy>=0?"#059669":"#dc2626", col:"#1d4ed8", bg:"#eff6ff", icon:"💰"},
    {lbl:"Ingresos del mes", val:mxn(ingresosMes), sub:pagos.filter(p=>p.fecha.startsWith(mes)).length+" cobros",    subCol:"#64748b",  col:"#059669", bg:"#f0fdf4", icon:"📈"},
    {lbl:"Órdenes activas",  val:ordsActivas,      sub:ordsHoy+" nuevas hoy",   subCol:"#64748b",  col:"#7c3aed", bg:"#f5f3ff", icon:"🔧"},
    {lbl:"Urgentes",         val:urgentes,          sub:"sin entregar",          subCol:urgentes>0?"#dc2626":"#059669", col:"#dc2626", bg:"#fef2f2", icon:"🚨"},
    {lbl:"Tiempo promedio",  val:avgDias==="—"?"—":avgDias+"d", sub:"días por reparación", subCol:"#64748b", col:"#d97706", bg:"#fffbeb", icon:"⏱️"},
    {lbl:"Clientes nuevos",  val:clisNuevos,        sub:"este mes",             subCol:"#64748b",  col:"#0891b2", bg:"#ecfeff", icon:"👤"},
  ];

  return html`<div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:20}}>
    ${KPIS.map(k=>html`
      <div key=${k.lbl} class="glass-card" style=${{background:k.bg,border:"1px solid",borderColor:k.col+"33",borderRadius:12,padding:"12px",display:"flex",gap:8,alignItems:"flex-start"}}>
        <div style=${{fontSize:20,lineHeight:1,flexShrink:0}}>${k.icon}</div>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:k.col,opacity:.7,marginBottom:2}}>${k.lbl}</div>
          <div style=${{fontSize:18,fontWeight:800,color:k.col,lineHeight:1,marginBottom:2}}>${k.val}</div>
          <div style=${{fontSize:10,fontWeight:600,color:k.subCol}}>${k.sub}</div>
        </div>
      </div>`)}
  </div>`;
}

function DashBarChart({pagos}){
  const [rango,setRango]=useState(30); // 7 o 30
  const days=[];
  for(let i=rango-1;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    const key=d.toISOString().slice(0,10);
    const label=rango===7
      ? ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()]
      : d.getDate()+"/"+(d.getMonth()+1);
    const val=pagos.filter(p=>p.fecha===key).reduce((s,p)=>s+p.monto,0);
    days.push({key,label,val,isToday:i===0,isWeekend:d.getDay()===0||d.getDay()===6});
  }
  const maxVal=Math.max(...days.map(d=>d.val),1);
  const total=days.reduce((s,d)=>s+d.val,0);
  const avg=total/rango;

  return html`<div class="glass-card" style=${{border:"1px solid var(--mac-rim)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <div style=${{fontSize:13,fontWeight:700,color:"var(--mac-ink)"}}>📊 Ingresos — últimos ${rango} días</div>
        <div style=${{fontSize:11,color:"var(--mac-ink4)",marginTop:2}}>Total: ${mxn(total)} · Promedio: ${mxn(avg)}/día</div>
      </div>
      <div style=${{display:"flex",gap:4}}>
        ${[7,30].map(r=>html`
          <button key=${r} onClick=${()=>setRango(r)} style=${{
            padding:"3px 10px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"inherit",
            fontSize:11,fontWeight:600,
            background:rango===r?"#1d4ed8":"var(--mac-surface2)",
            color:rango===r?"#fff":"var(--mac-ink4)"}}>
            ${r===7?"Semana":"30 días"}
          </button>`)}
      </div>
    </div>
    <div style=${{display:"flex",alignItems:"flex-end",gap:rango===7?8:3,height:110,paddingBottom:22,position:"relative"}}>
      <div style=${{position:"absolute",left:0,right:0,bottom:22+((avg/maxVal)*88-0.5),height:1,borderTop:"1px dashed var(--mac-ink5)",pointerEvents:"none",zIndex:1}}/>
      ${days.map(d=>html`
        <div key=${d.key} title=${d.label+": "+mxn(d.val)}
          style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end",position:"relative"}}>
          <div style=${{
            width:"100%",
            height:d.val>0?Math.max(3,(d.val/maxVal)*88)+"%":"3px",
            background:d.isToday?"#1d4ed8":d.isWeekend?"#94a3b8":"#93c5fd",
            borderRadius:"3px 3px 0 0",transition:"opacity .15s",opacity:.9}}
            onMouseOver=${e=>{e.currentTarget.style.opacity="1";e.currentTarget.style.background="#1d4ed8";}}
            onMouseOut=${e=>{e.currentTarget.style.opacity=".9";e.currentTarget.style.background=d.isToday?"#1d4ed8":d.isWeekend?"#94a3b8":"#93c5fd";}}/>
          <div style=${{position:"absolute",bottom:0,fontSize:rango===7?9:8,color:d.isToday?"#1d4ed8":"var(--mac-ink4)",whiteSpace:"nowrap",fontWeight:d.isToday?700:400}}>
            ${rango===7||d.isToday||days.indexOf(d)%5===0?d.label:""}
          </div>
        </div>`)}
    </div>
    ${rango===7&&html`
      <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginTop:4}}>
        ${days.map(d=>html`
          <div key=${d.key} style=${{textAlign:"center",fontSize:10,fontWeight:600,color:d.isToday?"#1d4ed8":d.val>0?"#059669":"var(--mac-ink4)"}}>
            ${d.val>0?mxn(d.val):"—"}
          </div>`)}
      </div>`}
  </div>`;
}

function DashTopServicios({buds,svcs}){
  // Contar los servicios y refacciones más usados en presupuestos aceptados
  const freq={};
  Object.values(buds||{}).filter(b=>b.est==="Aceptado").forEach(b=>{
    (b.items||[]).forEach(it=>{
      const key=it.n||it.nombre||"—";
      if(!freq[key]) freq[key]={nombre:key,tipo:it.t==="r"?"refacción":it.t==="s"?"servicio":"MO",qty:0,total:0};
      const q=it.t==="m"?it.h:it.q;
      const p=it.t==="m"?it.ph:it.p;
      freq[key].qty+=q;
      freq[key].total+=q*p;
    });

  const top=Object.values(freq).sort((a,b)=>b.qty-a.qty).slice(0,7);
  const maxQ=Math.max(...top.map(t=>t.qty),1);
  const TIPO_C={refacción:["#eff6ff","#1d4ed8"],servicio:["#f0fdf4","#059669"],MO:["#fdf4ff","#7c3aed"]};

  return html`<div class="glass-card" style=${{border:"1px solid var(--mac-rim)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{fontSize:13,fontWeight:700,color:"var(--mac-ink)",marginBottom:14}}>🔩 Top servicios y refacciones</div>
    ${top.length===0
      ?html`<div style=${{fontSize:12,color:"var(--mac-ink4)",textAlign:"center",padding:"20px 0"}}>Acepta presupuestos para ver estadísticas</div>`
      :html`<div style=${{display:"grid",gap:9}}>

                <div style=${{display:"flex",gap:5,flexShrink:0,alignItems:"center"}}>
                  <span style=${{background:bg,color:col,fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:99}}>${s.tipo}</span>

              </div>
            </div>
            <div style=${{fontSize:10,color:"#059669",fontWeight:600,flexShrink:0,width:70,textAlign:"right"}}>${mxn(s.total)}</div>
          </div>`;
        })}
      </div>`}
  </div>`;
}

function DashDonut({ords}){
  const total=ords.length||1;
  const datos=STS.map(s=>({...s,n:ords.filter(o=>o.est===s.k).length})).filter(s=>s.n>0);
  // Simple SVG donut
  let offset=0;
  const R=42,CX=60,CY=60,STROKE=18;
  const CIRC=2*Math.PI*R;
  const slices=datos.map(s=>{
    const pct=s.n/total;
    const dash=pct*CIRC;
    const slice={...s,dash,offset,pct};
    offset+=dash;
    return slice;
  });

  return html`<div class="glass-card" style=${{border:"1px solid var(--mac-rim)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{fontSize:13,fontWeight:700,color:"var(--mac-ink)",marginBottom:14}}>🍩 Órdenes por estado</div>
    <div style=${{display:"flex",gap:16,alignItems:"center"}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx=${CX} cy=${CY} r=${R} fill="none" stroke="var(--mac-rim)" strokeWidth=${STROKE}/>
        ${slices.map(s=>html`
          <circle key=${s.k} cx=${CX} cy=${CY} r=${R} fill="none"
            stroke=${s.c} strokeWidth=${STROKE}
            strokeDasharray=${s.dash+" "+(CIRC-s.dash)}
            strokeDashoffset=${-s.offset}
            transform="rotate(-90 60 60)"
            style=${{transition:"stroke-dasharray .5s"}}/>`)}
        <text x=${CX} y=${CY-4} textAnchor="middle" fontSize="18" fontWeight="800" fill="var(--mac-ink)">${ords.length}</text>
        <text x=${CX} y=${CY+12} textAnchor="middle" fontSize="9" fill="var(--mac-ink4)">órdenes</text>
      </svg>
      <div style=${{flex:1,display:"grid",gap:6}}>
        ${datos.map(s=>html`
          <div key=${s.k} style=${{display:"flex",alignItems:"center",gap:7}}>
            <div style=${{width:10,height:10,borderRadius:3,background:s.c,flexShrink:0}}/>
            <div style=${{fontSize:11,color:"var(--mac-ink2)",flex:1}}>${s.k}</div>
            <div style=${{fontSize:12,fontWeight:700,color:s.c}}>${s.n}</div>
            <div style=${{fontSize:9,color:"var(--mac-ink4)",width:28,textAlign:"right"}}>${Math.round(s.n/total*100)}%</div>
          </div>`)}
      </div>
    </div>
  </div>`;
}

function DashTopTecs({ords,tecs,pagos}){
  const mes=new Date().toISOString().slice(0,7);
  const ranking=tecs.filter(t=>t.activo&&t.rol!=="Sistema").map(t=>{
    const cerradas=ords.filter(o=>o.tec===t.id&&o.est==="Entregado").length;
    const activas =ords.filter(o=>o.tec===t.id&&o.est!=="Entregado").length;
    const ingrMes =pagos.filter(p=>{
      const ord=ords.find(o=>o.id===p.ordId);
      return ord&&ord.tec===t.id&&p.fecha.startsWith(mes);
    }).reduce((s,p)=>s+p.monto,0);
    return{...t,cerradas,activas,ingrMes};

  const maxC=Math.max(...ranking.map(t=>t.cerradas),1);

  return html`<div class="glass-card" style=${{border:"1px solid var(--mac-rim)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{fontSize:13,fontWeight:700,color:"var(--mac-ink)",marginBottom:14}}>🏆 Top técnicos del mes</div>

/* ══ GOOGLE DRIVE — SOLO PARA ASISTENTE IA ═══════════════════════════ */
/* Drive ya NO guarda la base de datos. Firebase es la fuente de verdad. */
/* Drive/GAS se usa únicamente para enviar contexto al Asistente IA.     */
const GAS_KEY = "redcom_gas_url";
let gasUrl = "";
try{ gasUrl = localStorage.getItem(GAS_KEY)||""; }catch(e){}

async function pushToDrive(data){
  // Mantenida solo para compatibilidad con el Asistente IA
  if(!gasUrl) return;
  try{
    window._syncStatus && window._syncStatus("saving");
    const res = await fetch(gasUrl, {
      method:"POST",
      body: JSON.stringify(data),
      headers:{"Content-Type":"text/plain"}
    });
    const json = await res.json();
    window._syncStatus && window._syncStatus(json.ok?"ok":"error");
  }catch(e){
    window._syncStatus && window._syncStatus("error");
  }
}
