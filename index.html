.card{background:#fff;border-radius:10px;border:1px solid #e2e8f0}
.btn{cursor:pointer;border:none;font-family:inherit;font-size:13px;font-weight:500;border-radius:6px;padding:7px 14px;transition:all .15s;display:inline-flex;align-items:center;gap:5px}

.btn-primary{background:#1d4ed8;color:#fff}.btn-primary:hover:not(:disabled){background:#1e40af}

.status-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}

.slide-in{animation:si .2s ease}

@media(max-width:768px){

  aside{display:none!important}

  /* Main takes full width, add bottom padding for nav */

html.dark-mode body,
html.dark-mode #root              { background:var(--bg)!important; color:var(--text)!important }

/* Sidebar */
/* aside uses blue gradient always — dark mode keeps it */ html.dark-mode aside.dark-aside { background:var(--sidebar)!important; }
/* sidebar-link stays white on blue bg always */



/* Main & sections */

html.dark-mode .btn-ghost:hover   { background:var(--tbl-hover)!important; color:var(--text)!important }

/* Modals */
html.dark-mode .modal-bg          { background:var(--overlay)!important }

html.dark-mode span[style*="color:#64748b"]     { color:var(--text3)!important }
html.dark-mode span[style*="color:#94a3b8"]     { color:var(--text4)!important }
html.dark-mode h2,html.dark-mode h3             { color:var(--text)!important }

/* Scrollbars */
html.dark-mode ::-webkit-scrollbar            { width:6px; height:6px }

function fbSet(key, val){
  if(!window.fbDb) return;

async function fbLoad(key){
  if(!window.fbDb) return null;

/* ══ UTILS ═════════════════════════════════════════════════════════════ */
function fmtD(d){if(!d)return"—";const[y,m,dd]=d.split("-");return`${dd}/${m}/${y}`}
function mxn(n){return"$"+Number(n).toLocaleString("es-MX",{minimumFractionDigits:2})}
function calc(items){const s=items.reduce((a,i)=>a+(i.t==="m"?i.h*i.ph:i.q*i.p),0);return{s:+s.toFixed(2),iv:+(s*.16).toFixed(2),tot:+(s*1.16).toFixed(2)}}
function gst(k){return STS.find(x=>x.k===k)||STS[0]}
function gur(k){return URGS.find(x=>x.k===k)||URGS[0]}
function gcl(cls,id){return cls.find(c=>c.id===id)||{nombre:"—",empresa:"",tel:""}}
function gtec(tecs,id){return tecs.find(t=>t.id===id)||{nombre:"Sin asignar"}}
function today(){return new Date().toISOString().slice(0,10)}

function fmtTelWA(tel){
  // Strip non-digits, prepend Mexico country code 52 if not present
  let d=tel.replace(/\D/g,"");
  if(d.length===10) d="52"+d;
  else if(d.startsWith("1")&&d.length===11) d="52"+d.slice(1);
  return d;
}
function buildWAMsg(ord,cli,bud,tec){

  lines.push(`👤 *Cliente:* ${cli.nombre}`);

/* ══ WHATSAPP COTIZACIÓN ════════════════════════════════════════════════ */
function buildCotWAMsg(cot, cli, tec){
  const sub=cot.items.reduce((a,i)=>a+(i.qty*i.precio),0);
  const tot=cot.iva?+(sub*1.16).toFixed(2):sub;
  let msg=`*REDCOM* — Servicio Técnico en Cómputo\n`;
  msg+=`_Los Mochis, Sinaloa_\n\n`;
  msg+=`📋 *Cotización ${cot.id}*\n`;
  msg+=`📅 Fecha: ${fmtD(cot.fecha)}\n`;
  if(tec) msg+=`👤 Asesor: ${tec.nombre}\n`;
  msg+=`\nEstimado/a *${cli.nombre}*,\nAdjuntamos la cotización solicitada:\n\n`;
  cot.items.forEach(it=>{
    msg+=`• ${it.nombre} × ${it.qty} — ${mxn(it.qty*it.precio)}\n`;
  });
  msg+=`\n`;
  if(cot.iva) msg+=`Subtotal: ${mxn(sub)}\nIVA 16%: ${mxn(+(sub*0.16).toFixed(2))}\n`;
  msg+=`*TOTAL: ${mxn(tot)}*\n\n`;
  msg+=`⏳ Válida por ${cot.validez||15} días.\n`;
  msg+=`\nQuedamos a sus órdenes para cualquier duda. 😊`;
  return msg;
}

function ServiciosSection({svcs,onAdd,onEdit,onDel}){
  const [q,setQ]=useState("");
  const [catF,setCatF]=useState("Todos");
  const [confirm,setConfirm]=useState(null);
  const CATS=["Todos","Cómputo","Impresoras","Redes","Software","Otro"];
  const CAT_COLOR={Cómputo:["#eff6ff","#1d4ed8"],Impresoras:["#fdf4ff","#9333ea"],Redes:["#fff7ed","#ea580c"],Software:["#f0fdf4","#059669"],Otro:["#f8fafc","#64748b"]};
  const filt=svcs.filter(s=>{
    const mq=!q||s.nombre.toLowerCase().includes(q.toLowerCase())||s.desc.toLowerCase().includes(q.toLowerCase());
    const mc=catF==="Todos"||s.cat===catF;
    return mq&&mc;
  });
  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}>
      <div class="section-header">
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Catálogo de Servicios</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:2}}>${svcs.filter(s=>s.activo).length} servicios activos · ${svcs.length} total</div>
        </div>
        <button class="btn btn-primary" onClick=${onAdd}><${Ic} n="plus" z=${14} s="#fff"/> Nuevo servicio</button>
      </div>
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div class="search-bar" style=${{maxWidth:280}}>
          <span class="search-icon"><${Ic} n="search" z=${14} s="#94a3b8"/></span>
          <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar servicio..."/>
        </div>
        <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
          ${CATS.map(x=>html`<button key=${x} onClick=${()=>setCatF(x)} class="btn btn-sm" style=${{
            background:catF===x?"#1d4ed8":"#f8fafc",color:catF===x?"#fff":"#475569",
            border:`1px solid ${catF===x?"#1d4ed8":"#e2e8f0"}`}}>${x}</button>`)}
        </div>
      </div>
    </div>
    <div style=${{flex:1,overflowY:"auto"}}>
      ${filt.length===0?html`<div class="empty-state"><${Ic} n="tag" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
      :html`
        <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"48px 1fr 110px 120px 100px 90px"}}>
          ${["ID","Servicio / Descripción","Categoría","Precio","Estado",""].map(h=>html`<div key=${h}>${h}</div>`)}
        </div>
        ${filt.map(sv=>{
          const cc=CAT_COLOR[sv.cat]||CAT_COLOR["Otro"];
          return html`<div key=${sv.id} class="tbl-row" style=${{display:"grid",gridTemplateColumns:"48px 1fr 110px 120px 100px 90px",opacity:sv.activo?1:.5}}>
            <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:"#94a3b8",fontWeight:500}}>${sv.id}</div>
            <div>
              <div style=${{fontWeight:600,fontSize:13}}>${sv.nombre}</div>
              <div style=${{fontSize:11,color:"#94a3b8",marginTop:1}}>${sv.desc}</div>
            </div>
            <div><span style=${{background:cc[0],color:cc[1],padding:"2px 9px",borderRadius:99,fontSize:11,fontWeight:700}}>${sv.cat}</span></div>
            <div style=${{fontWeight:700,fontSize:14,color:"#1e293b"}}>${mxn(sv.precio)}</div>
            <div style=${{fontSize:11,fontWeight:600,color:sv.activo?"#059669":"#94a3b8"}}>${sv.activo?"Activo":"Inactivo"}</div>
            <div style=${{display:"flex",gap:4,padding:"9px 8px",justifyContent:"flex-end"}}>
              <button class="btn btn-ghost btn-sm" onClick=${()=>onEdit(sv)}><${Ic} n="edit" z=${12}/></button>
              <button class="btn btn-danger btn-sm" onClick=${()=>setConfirm(sv)}><${Ic} n="trash" z=${12} s="#dc2626"/></button>
            </div>
          </div>`;
        })}`}
    </div>
    ${confirm&&html`<${Confirm}
      msg=${"Se eliminará el servicio <b>"+confirm.nombre+"</b>."}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}

function BudModal({ord,cli,invItems,svcItems,exist,tarifaMO,onSave,onClose}){
  const [items,setIt]=useState(exist?.items||[]);
  const [est,setEst]=useState(exist?.est||"Borrador");
  const [selP,setSP]=useState("");
  const [qty,setQty]=useState(1);
  const [selSV,setSV]=useState("");
  const [qtySV,setQSV]=useState(1);
  const [svcs,setSvcs]=useState(1);
  const [ln,setLn]=useState("Diagnóstico y reparación");
  const [tarifa,setTarifa]=useState(tarifaMO||200);
  const cv=calc(items);
  const SC={Borrador:["#f1f5f9","#64748b"],Aceptado:["#f0fdf4","#059669"],Rechazado:["#fef2f2","#dc2626"]};

  function addP(){
    const p=invItems.find(x=>x.id===selP);
    if(!p)return;
    setIt(prev=>{
      const ex=prev.find(i=>i.t==="r"&&i.ref===p.id);
      return ex?prev.map(i=>i.ref===p.id?{...i,q:i.q+Number(qty)}:i)
               :[...prev,{t:"r",ref:p.id,n:p.nombre,q:Number(qty),p:p.precio}];
    });
    setSP("");setQty(1);
  }
  function addSV(){
    const sv=svcItems.find(x=>x.id===selSV);
    if(!sv)return;
    setIt(prev=>{
      const ex=prev.find(i=>i.t==="s"&&i.ref===sv.id);
      return ex?prev.map(i=>i.ref===sv.id?{...i,q:i.q+Number(qtySV)}:i)
               :[...prev,{t:"s",ref:sv.id,n:sv.nombre,cat:sv.cat,q:Number(qtySV),p:sv.precio}];
    });
    setSV("");setQSV(1);
  }
  function addL(){
    if(!ln.trim())return;
    setIt(prev=>[...prev,{t:"m",n:ln,h:Number(svcs),ph:Number(tarifa)}]);
    setLn("Diagnóstico y reparación");setSvcs(1);
  }
  function save(){
    const id=exist?.id||`B${String(++PRES).padStart(1,"0")}${Date.now().toString().slice(-3)}`;
    onSave({id,oid:ord.id,items,est,...cv});
  }

  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:700}} onClick=${e=>e.stopPropagation()}>

      <!-- Header -->
      <div style=${{padding:"18px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style=${{fontSize:17,fontWeight:700}}>Presupuesto — ${ord.id}</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:1}}>${cli.nombre} · ${ord.equipo}</div>
        </div>
        <div style=${{display:"flex",gap:6,alignItems:"center"}}>
          ${["Borrador","Aceptado","Rechazado"].map(x=>html`<button key=${x} onClick=${()=>setEst(x)} style=${{
            padding:"3px 12px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",border:"1.5px solid",
            borderColor:est===x?SC[x][1]:"#e2e8f0",background:est===x?SC[x][0]:"#fff",color:SC[x][1]}}>${x}</button>`)}
          <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
        </div>
      </div>

      <div style=${{padding:"20px 24px",display:"grid",gap:16}}>

        <!-- Sección: Repuestos -->
        <div style=${{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px"}}>
          <div style=${{fontWeight:700,fontSize:13,color:"#1e293b",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="box" z=${15} s="#1d4ed8"/> Agregar repuesto / refacción
          </div>
          <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style=${{flex:1}}>
              <label>Artículo</label>
              <select value=${selP} onChange=${e=>setSP(e.target.value)}>
                <option value="">— Seleccionar del inventario —</option>
                ${invItems.map(p=>html`<option key=${p.id} value=${p.id}>[${p.cat}] ${p.nombre} — ${mxn(p.precio)}</option>`)}
              </select>
            </div>
            <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
            <button class="btn btn-primary" onClick=${addP} disabled=${!selP}>+ Agregar</button>
          </div>
        </div>

        <!-- Sección: Catálogo de Servicios -->
        <div style=${{background:"#fdf4ff",border:"1px solid #e9d5ff",borderRadius:10,padding:"14px 16px"}}>
          <div style=${{fontWeight:700,fontSize:13,color:"#6b21a8",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="tag" z=${15} s="#9333ea"/> Agregar del catálogo de servicios
          </div>
          <div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
            <div style=${{flex:1,minWidth:200}}>
              <label>Servicio</label>
              <select value=${selSV} onChange=${e=>setSV(e.target.value)}>
                <option value="">— Seleccionar servicio —</option>
                ${(svcItems||[]).filter(s=>s.activo).map(s=>html`<option key=${s.id} value=${s.id}>[${s.cat}] ${s.nombre} — ${mxn(s.precio)}</option>`)}
              </select>
            </div>
            <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qtySV} onChange=${e=>setQSV(e.target.value)}/></div>
            ${selSV&&html`<div style=${{minWidth:80,textAlign:"right"}}>
              <label style=${{textAlign:"right"}}>Importe</label>
              <div style=${{height:36,display:"flex",alignItems:"center",justifyContent:"flex-end",fontWeight:700,fontSize:14,color:"#9333ea"}}>
                ${mxn(Number(qtySV)*(svcItems.find(s=>s.id===selSV)?.precio||0))}
              </div>
            </div>`}
            <button class="btn btn-sm" onClick=${addSV} disabled=${!selSV} style=${{background:"#9333ea",color:"#fff",border:"none",whiteSpace:"nowrap"}}>+ Agregar</button>
          </div>
        </div>

        <!-- Sección: Mano de obra -->
        <div style=${{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:"14px 16px"}}>
          <div style=${{fontWeight:700,fontSize:13,color:"#065f46",marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
            <${Ic} n="techs" z=${15} s="#059669"/> Agregar servicio de mano de obra
          </div>

          <!-- Tarifa configurable -->
          <div style=${{display:"flex",alignItems:"center",gap:10,marginBottom:12,background:"#dcfce7",border:"1px solid #86efac",borderRadius:8,padding:"8px 12px"}}>
            <${Ic} n="tag" z=${14} s="#059669"/>
            <span style=${{fontSize:12,fontWeight:600,color:"#065f46",whiteSpace:"nowrap"}}>Tarifa por servicio:</span>
            <div style=${{display:"flex",alignItems:"center",gap:4,flex:1,maxWidth:160}}>
              <span style=${{fontSize:13,fontWeight:700,color:"#065f46"}}>$</span>
              <input type="number" min="0" step="50" value=${tarifa}
                onChange=${e=>setTarifa(Number(e.target.value))}
                style=${{background:"#fff",border:"1px solid #86efac",borderRadius:6,padding:"5px 8px",
                         fontSize:14,fontWeight:700,color:"#065f46",width:90,textAlign:"right"}}/>
              <span style=${{fontSize:12,color:"#059669",whiteSpace:"nowrap"}}>MXN / servicio</span>
            </div>
          </div>

          <!-- Campos -->
          <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style=${{flex:1}}>
              <label>Descripción del servicio</label>
              <input value=${ln} onChange=${e=>setLn(e.target.value)} placeholder="ej. Diagnóstico y limpieza profunda"/>
            </div>
            <div style=${{width:90}}>
              <label>Servicios</label>
              <input type="number" min="1" step="1" value=${svcs} onChange=${e=>setSvcs(e.target.value)}/>
            </div>
            <div style=${{width:100,textAlign:"right"}}>
              <label style=${{textAlign:"right"}}>Importe</label>
              <div style=${{height:36,display:"flex",alignItems:"center",justifyContent:"flex-end",
                           fontWeight:700,fontSize:14,color:"#059669"}}>${mxn(Number(svcs)*Number(tarifa))}</div>
            </div>
            <button class="btn btn-success" onClick=${addL} disabled=${!ln.trim()}>+ Agregar</button>
          </div>
        </div>

        <!-- Desglose de ítems -->
        ${items.length>0?html`
          <div>
            <div style=${{fontWeight:600,fontSize:13,color:"#1e293b",marginBottom:8}}>Desglose del presupuesto</div>
            <div style=${{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
              <div style=${{display:"grid",gridTemplateColumns:"1fr 80px 110px 90px",background:"#f8fafc",padding:"7px 12px",gap:8}}>
                ${["Descripción","Cant.","Precio u.","Total"].map(h=>html`<div key=${h} style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:"#94a3b8"}}>${h}</div>`)}
              </div>
              ${items.map((it,i)=>html`
                <div key=${i} style=${{display:"grid",gridTemplateColumns:"1fr 80px 110px 90px",padding:"9px 12px",gap:8,borderTop:"1px solid #f1f5f9",alignItems:"center"}}>
                  <div>
                    <div style=${{fontSize:13,fontWeight:500}}>${it.n}</div>
                    <div style=${{fontSize:10,color:"#94a3b8"}}>${it.t==="r"?"Refacción":it.t==="s"?"Servicio (catálogo)":"Mano de obra"}</div>
                  </div>
                  <div style=${{fontSize:12,color:"#475569",textAlign:"center"}}>
                    ${it.t==="r"?it.q:it.t==="s"?it.q+" serv.":it.h+" serv."}
                  </div>
                  <div style=${{fontSize:12,color:"#475569"}}>${it.t==="r"?mxn(it.p):it.t==="s"?mxn(it.p)+"/serv.":mxn(it.ph)+"/serv."}</div>
                  <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style=${{fontSize:12,fontWeight:700,color:it.t==="r"?"#1e293b":it.t==="s"?"#9333ea":"#059669"}}>
                      ${it.t==="r"?mxn(it.q*it.p):it.t==="s"?mxn(it.q*it.p):mxn(it.h*it.ph)}
                    </span>
                    <button onClick=${()=>setIt(p=>p.filter((_,j)=>j!==i))}
                      style=${{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:18,lineHeight:1,padding:"0 2px"}}>×</button>
                  </div>
                </div>`)}
              <div style=${{background:"#f8fafc",padding:"10px 14px",borderTop:"2px solid #e2e8f0",display:"flex",justifyContent:"flex-end"}}>
                <div style=${{textAlign:"right"}}>
                  <div style=${{fontSize:11,color:"#94a3b8",marginBottom:4}}>
                    Subtotal: <b>${mxn(cv.s)}</b> &nbsp;·&nbsp; IVA 16%: <b>${mxn(cv.iv)}</b>
                  </div>
                  <div style=${{fontSize:19,fontWeight:800,color:"#1d4ed8"}}>TOTAL: ${mxn(cv.tot)}</div>
                </div>
              </div>
            </div>
          </div>`
        :html`<div style=${{textAlign:"center",padding:28,color:"#94a3b8",background:"#f8fafc",borderRadius:8,border:"1px dashed #e2e8f0"}}>
          <${Ic} n="box" z=${28} s="#cbd5e1"/>
          <div style=${{marginTop:8,fontSize:13}}>Agrega repuestos y/o servicios para crear el presupuesto</div>
        </div>`}
      </div>

      <!-- Footer -->
      <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style=${{fontSize:11,color:"#94a3b8"}}>${items.length} concepto${items.length!==1?"s":""} agregado${items.length!==1?"s":""}</div>
        <div style=${{display:"flex",gap:8}}>
          <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
          <button class="btn btn-primary" onClick=${save} disabled=${items.length===0}>
            <${Ic} n="ok" z=${14} s="#fff"/> Guardar presupuesto
          </button>
        </div>
      </div>

    </div>
  </div>`;
}

            </div>`

      </div>
      <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        ${[["Técnico",tec?.nombre||"—"],["Urgencia",null,html`<${UPill} u=${ord.urg}/>`],["Ingreso",fmtD(ord.fecha)],["Entrega est.",fmtD(ord.ent)]].map(([k,v,c])=>html`
          <div key=${k} style=${{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:6,padding:"7px 10px"}}>
            <div style=${{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:"#94a3b8",marginBottom:2}}>${k}</div>
            ${c||html`<div style=${{fontSize:12,fontWeight:600}}>${v}</div>`}
          </div>`)}
      </div>
      ${ord.notas&&html`<div style=${{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 12px"}}>
        <div style=${{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:1,color:"#94a3b8",marginBottom:4}}>Notas internas</div>
        <div style=${{fontSize:12,color:"#64748b",lineHeight:1.5}}>${ord.notas}</div>
      </div>`}
      <div>
        ${ord.est==="Entregado"
          ?html`<button onClick=${onNotaVenta} style=${{
              width:"100%",padding:"12px 0",borderRadius:10,border:"none",cursor:"pointer",

              fontFamily:"inherit",fontSize:14,fontWeight:700,
              display:"flex",alignItems:"center",justifyContent:"center",gap:8,

              onMouseOut=${e=>e.currentTarget.style.opacity="1"}>
              <${Ic} n="receipt" z=${17} s="#fff"/> Generar Nota de Venta
            </button>`
          :html`<div>
            <div style=${{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:"#94a3b8",marginBottom:6}}>Presupuesto</div>
            ${cv?html`
              <div style=${{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
                <div style=${{padding:"8px 12px",background:"#f8fafc",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                  <span style=${{fontWeight:600}}>${it.t==="r"?mxn(it.q*it.p):it.t==="s"?mxn(it.q*it.p):mxn(it.h*it.ph)}</span>

                  <span style=${{fontSize:10,color:"#94a3b8"}}>Sub ${mxn(cv.s)} · IVA ${mxn(cv.iv)}</span>
                  <span style=${{fontSize:14,fontWeight:700,color:"#1d4ed8"}}>TOTAL ${mxn(cv.tot)}</span>
                </div>
              </div>
              <button class="btn btn-ghost btn-sm" style=${{marginTop:6,width:"100%",justifyContent:"center"}} onClick=${()=>onBud(ord)}><${Ic} n="edit" z=${13}/> Editar presupuesto</button>
              <button onClick=${()=>setWA(true)} style=${{
                marginTop:6,width:"100%",padding:"7px 0",borderRadius:8,border:"1px solid #bbf7d0",
                background:"#f0fdf4",color:"#16a34a",fontFamily:"inherit",fontSize:13,fontWeight:600,
                display:"flex",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",transition:"background .15s"}}

          </div>`}
      </div>
    </div>
  </div>
  ${showWA&&bud&&html`<${WAModal} ord=${ord} cli=${cli} bud=${bud} tec=${tec} onClose=${()=>setWA(false)}/>`}
  `;
}

/* ══ KANBAN ═════════════════════════════════════════════════════════════ */
function Kanban({ords,cls,tecs,buds,sel,onSel,onMv}){
  return html`<div style=${{display:"flex",gap:10,height:"100%",overflowX:"auto",padding:"0 4px 8px"}}>
    ${STS.map(st=>{
      const col=ords.filter(o=>o.est===st.k);
      return html`<div key=${st.k} class="kcol" style=${{minWidth:200,flex:"1 1 0",background:"#f8fafc",borderRadius:10,border:"1px solid #e2e8f0",display:"flex",flexDirection:"column"}}
        onDragOver=${e=>{e.preventDefault();e.currentTarget.classList.add("over")}}
        onDragLeave=${e=>e.currentTarget.classList.remove("over")}
        onDrop=${e=>{e.preventDefault();e.currentTarget.classList.remove("over");const id=e.dataTransfer.getData("oid");if(id)onMv(id,st.k);}}>
        <div style=${{padding:"9px 12px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style=${{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,color:st.c}}>${st.k}</span>
          <span style=${{fontSize:11,fontWeight:600,color:"#94a3b8",background:"#e2e8f0",borderRadius:99,padding:"0 7px"}}>${col.length}</span>
        </div>
        <div style=${{flex:1,overflow:"auto",padding:8,display:"flex",flexDirection:"column",gap:7}}>
          ${col.map(o=>{
            const c=gcl(cls,o.cid),t=gtec(tecs,o.tec),bud=Object.values(buds).find(b=>b.oid===o.id),cv=bud?calc(bud.items):null;
            return html`<div key=${o.id} draggable onDragStart=${e=>e.dataTransfer.setData("oid",o.id)} onClick=${()=>onSel(o.id)}
              style=${{background:"#fff",border:`1.5px solid ${sel===o.id?"#1d4ed8":"#e2e8f0"}`,borderRadius:8,padding:"9px 11px",cursor:"grab",boxShadow:sel===o.id?"0 0 0 3px #bfdbfe":undefined,transition:"all .15s"}}>
              <div style=${{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style=${{fontSize:9,fontFamily:"'IBM Plex Mono',monospace",color:"#94a3b8"}}>${o.id}</span>
                <${UPill} u=${o.urg}/>
              </div>
              <div style=${{fontSize:13,fontWeight:600}}>${c.nombre}</div>
              <div style=${{fontSize:11,color:"#1d4ed8",marginTop:1}}>${o.equipo}</div>
              <div style=${{fontSize:10,color:"#94a3b8",marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${o.prob}</div>
              <div style=${{display:"flex",justifyContent:"space-between",marginTop:5,paddingTop:5,borderTop:"1px solid #f1f5f9"}}>
                <span style=${{fontSize:9,color:"#94a3b8"}}>${t.nombre}</span>
                ${cv&&html`<span style=${{fontSize:10,fontWeight:700,color:"#059669"}}>${mxn(cv.tot)}</span>`}
              </div>
            </div>`;
          })}
        </div>
      </div>`;
    })}
  </div>`;
}

/* ══ FICHA DE CLIENTE ═══════════════════════════════════════════════════ */
function CliDetalle({cl,ords,pagos,gars,onEdit,onClose}){
  const clOrd = ords.filter(o=>o.cid===cl.id).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const clPag = pagos.filter(p=>clOrd.some(o=>o.id===p.ordId)).sort((a,b)=>(b.fecha+b.hora).localeCompare(a.fecha+a.hora));
  const clGar = gars.filter(g=>clOrd.some(o=>o.id===g.ordId));
  const totalGastado = clPag.reduce((s,p)=>s+p.monto,0);
  const activas = clOrd.filter(o=>o.est!=="Entregado").length;
  const esFrecuente = clOrd.length >= 3;
  const [tab,setTab] = useState("ordenes");

  const TABS = [
    ["ordenes","🔧","Órdenes",clOrd.length],
    ["pagos","💰","Pagos",clPag.length],
    ["gars","🛡️","Garantías",clGar.length],
  ];

  const EC={Ingreso:["#eff6ff","#1d4ed8"],"En reparación":["#fffbeb","#d97706"],Listo:["#f0fdf4","#059669"],Entregado:["#f1f5f9","#64748b"],Diagnóstico:["#fdf4ff","#9333ea"],Cancelado:["#fef2f2","#dc2626"]};
  const MBADGE={efectivo:["#f0fdf4","#059669"],transferencia:["#eff6ff","#1d4ed8"],tarjeta:["#fdf4ff","#9333ea"]};

  return html`<div class="slide-in" style=${{height:"100%",display:"flex",flexDirection:"column",background:"var(--bg)",overflow:"hidden"}}>

    <!-- Header -->
    <div style=${{background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",padding:"18px 20px",flexShrink:0,position:"relative"}}>
      <button class="btn btn-ghost btn-sm" onClick=${onClose}
        style=${{position:"absolute",top:12,right:12,color:"rgba(255,255,255,.7)",background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)"}}>
        ✕
      </button>
      <div style=${{display:"flex",gap:14,alignItems:"center"}}>
        <div style=${{width:52,height:52,borderRadius:14,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,color:"#fff",flexShrink:0}}>
          ${cl.nombre.charAt(0).toUpperCase()}
        </div>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style=${{fontSize:18,fontWeight:800,color:"#fff"}}>${cl.nombre}</div>
            ${esFrecuente&&html`<span style=${{background:"#fbbf24",color:"#78350f",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:99,letterSpacing:.5}}>⭐ FRECUENTE</span>`}
          </div>
          ${cl.empresa&&html`<div style=${{fontSize:12,color:"rgba(255,255,255,.7)",marginTop:1}}>${cl.empresa}</div>`}
          <div style=${{display:"flex",gap:12,marginTop:6,flexWrap:"wrap"}}>
            ${cl.tel&&html`<span style=${{fontSize:11,color:"rgba(255,255,255,.8)"}}>📱 ${cl.tel}</span>`}
            ${cl.email&&html`<span style=${{fontSize:11,color:"rgba(255,255,255,.8)"}}>✉️ ${cl.email}</span>`}
          </div>
        </div>
      </div>

      <!-- KPIs rápidos -->
      <div style=${{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginTop:14}}>
        ${[
          ["Órdenes",clOrd.length,"#fff"],
          ["Activas",activas,"#fbbf24"],
          ["Total gastado",mxn(totalGastado),"#86efac"],
          ["Garantías",clGar.length,"#c4b5fd"],
        ].map(([l,v,col])=>html`
          <div key=${l} style=${{background:"rgba(255,255,255,.1)",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
            <div style=${{fontSize:9,color:"rgba(255,255,255,.55)",textTransform:"uppercase",letterSpacing:.8,marginBottom:3}}>${l}</div>
            <div style=${{fontSize:15,fontWeight:800,color:col}}>${v}</div>
          </div>`)}
      </div>
    </div>

    <!-- Info rápida -->
    <div style=${{padding:"10px 16px",background:"var(--bg2)",borderBottom:"1px solid var(--border)",display:"flex",gap:8,flexWrap:"wrap",flexShrink:0}}>
      ${cl.dir&&html`<span style=${{fontSize:11,color:"var(--text4)"}}>📍 ${cl.dir}</span>`}
      ${cl.rfc&&html`<span style=${{fontSize:11,color:"var(--text4)",fontFamily:"monospace"}}>🧾 ${cl.rfc}</span>`}
      <button class="btn btn-ghost btn-sm" style=${{marginLeft:"auto",fontSize:11}} onClick=${()=>onEdit(cl)}>
        <${Ic} n="edit" z=${12}/> Editar
      </button>
    </div>

    <!-- Tabs -->
    <div style=${{background:"var(--bg)",borderBottom:"1px solid var(--border)",display:"flex",padding:"0 16px",flexShrink:0}}>
      ${TABS.map(([k,ic,lbl,cnt])=>html`
        <button key=${k} onClick=${()=>setTab(k)} style=${{
          padding:"9px 14px",border:"none",cursor:"pointer",fontFamily:"inherit",
          fontSize:12,fontWeight:700,background:"transparent",display:"flex",alignItems:"center",gap:5,
          color:tab===k?"#1d4ed8":"#64748b",
          borderBottom:tab===k?"2px solid #1d4ed8":"2px solid transparent"}}>
          ${ic} ${lbl}
          ${cnt>0&&html`<span style=${{background:tab===k?"#eff6ff":"var(--bg3)",color:tab===k?"#1d4ed8":"var(--text4)",fontSize:9,fontWeight:700,padding:"1px 5px",borderRadius:99}}>${cnt}</span>`}
        </button>`)}
    </div>

    <!-- Tab content -->
    <div style=${{flex:1,overflowY:"auto"}}>

      ${tab==="ordenes"&&html`<div>
        ${clOrd.length===0
          ?html`<div class="empty-state"><div style=${{fontSize:32,marginBottom:8}}>🔧</div><div>Sin órdenes</div></div>`
          :clOrd.map(o=>{
            const ec=EC[o.est]||["#f1f5f9","#64748b"];
            const bud_tot=o.total||0;
            return html`<div key=${o.id} style=${{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",gap:12,alignItems:"center"}}
              onMouseOver=${e=>e.currentTarget.style.background="var(--bg2)"}
              onMouseOut=${e=>e.currentTarget.style.background=""}>
              <div style=${{width:36,height:36,borderRadius:8,background:ec[0],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <${Ic} n="pc" z=${16} s=${ec[1]}/>
              </div>
              <div style=${{flex:1,minWidth:0}}>
                <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style=${{fontSize:12,fontWeight:700,color:"var(--text)",display:"flex",alignItems:"center",gap:6}}>
                      <span style=${{fontFamily:"monospace",color:"#1d4ed8"}}>${o.id}</span>
                      <span>${o.equipo}</span>
                    </div>
                    <div style=${{fontSize:10,color:"var(--text4)",marginTop:2}}>${fmtD(o.fecha)}${o.ent?" · Entrega: "+fmtD(o.ent):""}</div>
                  </div>
                  <span style=${{background:ec[0],color:ec[1],fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,flexShrink:0}}>${o.est}</span>
                </div>
                <div style=${{fontSize:11,color:"var(--text3)",marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${o.prob}</div>
                ${bud_tot>0&&html`<div style=${{fontSize:11,fontWeight:700,color:"#059669",marginTop:2}}>Total: ${mxn(bud_tot)}</div>`}
              </div>
            </div>`;
          })}
      </div>`}

      ${tab==="pagos"&&html`<div>
        ${clPag.length===0
          ?html`<div class="empty-state"><div style=${{fontSize:32,marginBottom:8}}>💰</div><div>Sin pagos registrados</div></div>`

            <div style=${{padding:"10px 16px",background:"var(--bg2)",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style=${{fontSize:11,color:"var(--text4)"}}>${clPag.length} cobros</div>
              <div style=${{fontSize:14,fontWeight:800,color:"#059669"}}>${mxn(totalGastado)} total</div>
            </div>
            ${clPag.map(p=>{
              const mc=MBADGE[p.metodo]||["#f8fafc","#64748b"];
              return html`<div key=${p.id} style=${{padding:"10px 16px",borderBottom:"1px solid var(--border)",display:"flex",gap:10,alignItems:"center"}}
                onMouseOver=${e=>e.currentTarget.style.background="var(--bg2)"}
                onMouseOut=${e=>e.currentTarget.style.background=""}>
                <div style=${{width:34,height:34,borderRadius:8,background:mc[0],display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:16}}>
                  ${{efectivo:"💵",transferencia:"🏦",tarjeta:"💳"}[p.metodo]||"💰"}
                </div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontSize:12,fontWeight:600,color:"var(--text)"}}>${p.concepto}</div>
                  <div style=${{fontSize:10,color:"var(--text4)",marginTop:1}}>${fmtD(p.fecha)} ${p.hora||""} · ${p.user||""}</div>
                </div>
                <div style=${{textAlign:"right"}}>
                  <div style=${{fontSize:14,fontWeight:800,color:"#059669"}}>${mxn(p.monto)}</div>
                  <span style=${{fontSize:9,fontWeight:700,background:mc[0],color:mc[1],padding:"1px 6px",borderRadius:99,textTransform:"capitalize"}}>${p.metodo}</span>
                </div>
              </div>`;
            })}
          </div>`}
      </div>`}

      ${tab==="gars"&&html`<div>
        ${clGar.length===0
          ?html`<div class="empty-state"><div style=${{fontSize:32,marginBottom:8}}>🛡️</div><div>Sin garantías</div></div>`

            const hoy=new Date().toISOString().slice(0,10);

                  ${g.desc&&html`<div style=${{fontSize:11,color:"var(--text3)",marginTop:3}}>${g.desc}</div>`}

                <span style=${{background:color+"15",color,fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:99,border:"1.5px solid "+color+"44"}}>${label}</span>

      </div>`}

    </div>
  </div>`;
}

/* ══ SECCIÓN INVENTARIO ═════════════════════════════════════════════════ */
function InvSection({inv,provs,ocs,onAdd,onEdit,onDel,onSaveOC,session}){
  const [q,setQ]=useState("");
  const [catF,setCatF]=useState("Todas");
  const [filtro,setFiltro]=useState("todos"); // todos|bajo|ok
  const [confirm,setConfirm]=useState(null);
  const [showOCConfirm,setShowOCConfirm]=useState(false);

  const cats=["Todas",...new Set(inv.map(i=>i.cat))];

  // Items bajo punto de reorden
  const bajoPR = inv.filter(i=>{
    const pr = Number(i.puntoReorden)||0;
    return pr>0 && i.stock<=pr;
  });
  const sinPR = inv.filter(i=>!Number(i.puntoReorden));

  const filt = inv.filter(i=>{
    const matchQ = !q||i.nombre.toLowerCase().includes(q.toLowerCase())||i.id.toLowerCase().includes(q.toLowerCase());
    const matchCat = catF==="Todas"||i.cat===catF;
    const matchFiltro = filtro==="todos"||
      (filtro==="bajo"&&bajoPR.includes(i))||
      (filtro==="ok"&&!bajoPR.includes(i));
    return matchQ&&matchCat&&matchFiltro;
  });

  function generarOCBorrador(){
    // Group by first proveedor or unassigned
    const itemsOC = bajoPR.map(i=>({
      invId:i.id,
      nom:i.nombre,
      qty: Math.max(1,(Number(i.puntoReorden)||0)*2 - i.stock), // suggest qty to reach 2x reorder
      precio: Number(i.costo)||0,
    }));
    const newOC = {
      id:"OC-"+String(++OCMPSEQ).padStart(4,"0"),
      prvId: provs[0]?.id||"",
      fecha: new Date().toISOString().slice(0,10),
      est: "Borrador",
      notas: "Generada automáticamente por alerta de reorden",
      items: itemsOC,
    };
    onSaveOC(newOC);
    setShowOCConfirm(false);
    alert("✅ OC "+newOC.id+" creada como Borrador en Órdenes de Compra.");
  }

  const stockColor = i => {
    const pr = Number(i.puntoReorden)||0;
    if(pr>0 && i.stock<=pr)   return "#dc2626";
    if(pr>0 && i.stock<=pr*2) return "#d97706";
    return "#1e293b";
  };
  const stockBg = i => {
    const pr = Number(i.puntoReorden)||0;
    if(pr>0 && i.stock<=pr)   return "#fef2f2";
    if(pr>0 && i.stock<=pr*2) return "#fffbeb";
    return "transparent";
  };

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>

    <!-- Toolbar -->
    <div style=${{padding:"14px 20px",borderBottom:"1px solid var(--border)",background:"var(--bg)",flexShrink:0}}>
      <div class="section-header" style=${{marginBottom:bajoPR.length>0?12:0}}>
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Inventario de Refacciones</h2>
          <div style=${{fontSize:12,color:"var(--text4)",marginTop:2}}>${inv.length} artículos</div>
        </div>
        <div style=${{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div class="search-bar">
            <span class="search-icon"><${Ic} n="search" z=${14} s="#94a3b8"/></span>
            <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar artículo..."/>
          </div>
          <select value=${catF} onChange=${e=>setCatF(e.target.value)} style=${{width:"auto",minWidth:130}}>
            ${cats.map(ct=>html`<option key=${ct} value=${ct}>${ct}</option>`)}
          </select>
          <button class="btn btn-primary" onClick=${onAdd}><${Ic} n="plus" z=${14} s="#fff"/> Nuevo</button>
        </div>
      </div>

      <!-- Filtros rápidos -->
      <div style=${{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        ${[["todos","📦","Todos",inv.length],["bajo","🔴","Bajo reorden",bajoPR.length],["ok","✅","Stock OK",inv.length-bajoPR.length]].map(([k,ic,lbl,n])=>html`
          <button key=${k} onClick=${()=>setFiltro(k)} style=${{
            padding:"4px 12px",borderRadius:99,border:"1.5px solid",fontFamily:"inherit",
            fontSize:11,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:5,
            borderColor:filtro===k?"#1d4ed8":"var(--border)",
            background:filtro===k?"#eff6ff":"var(--bg2)",
            color:filtro===k?"#1d4ed8":"var(--text4)"}}>
            ${ic} ${lbl}
            <span style=${{background:filtro===k?"#1d4ed8":"var(--border)",color:filtro===k?"#fff":"var(--text4)",fontSize:9,padding:"0 5px",borderRadius:99}}>${n}</span>
          </button>`)}
        ${sinPR.length>0&&html`<span style=${{fontSize:10,color:"var(--text4)",marginLeft:4}}>· ${sinPR.length} sin punto de reorden configurado</span>`}
      </div>
    </div>

    <!-- Banner alerta reorden -->
    ${bajoPR.length>0&&html`
      <div style=${{background:"#fffbeb",borderBottom:"2px solid #fde68a",padding:"10px 20px",display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"}}>
        <div style=${{fontSize:18}}>⚠️</div>
        <div style=${{flex:1,minWidth:200}}>
          <div style=${{fontSize:13,fontWeight:700,color:"#92400e"}}>

        </div>
        <button onClick=${()=>setShowOCConfirm(true)} style=${{
          padding:"7px 14px",borderRadius:8,border:"none",cursor:"pointer",
          background:"#d97706",color:"#fff",fontFamily:"inherit",fontSize:12,fontWeight:700,
          display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
          <${Ic} n="plus" z=${13} s="#fff"/> Generar OC Borrador
        </button>
      </div>`}

    <!-- Tabla -->
    <div style=${{flex:1,overflowY:"auto"}}>
      <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"70px 1fr 120px 100px 90px 100px 90px"}}>
        ${["SKU","Artículo","Categoría","Precio","Stock","Pto. Reorden",""].map(h=>html`<div key=${h}>${h}</div>`)}
      </div>
      ${filt.length===0
        ?html`<div class="empty-state"><${Ic} n="box" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
        :filt.map(p=>{
          const pr=Number(p.puntoReorden)||0;
          const bajo=pr>0&&p.stock<=pr;
          const cerca=pr>0&&p.stock>pr&&p.stock<=pr*2;
          return html`<div key=${p.id} class="tbl-row" style=${{display:"grid",gridTemplateColumns:"70px 1fr 120px 100px 90px 100px 90px",background:bajo?"#fffbeb":""}}>
            <div style=${{fontFamily:"monospace",fontSize:11,color:"var(--text4)"}}>${p.id}</div>
            <div>
              <div style=${{fontWeight:500,fontSize:13,color:"var(--text)"}}>${p.nombre}</div>
              ${bajo&&html`<div style=${{fontSize:9,color:"#dc2626",fontWeight:700,marginTop:1}}>⚠️ BAJO REORDEN</div>`}
              ${cerca&&html`<div style=${{fontSize:9,color:"#d97706",fontWeight:700,marginTop:1}}>⚡ CERCA DEL LÍMITE</div>`}
            </div>
            <div><span style=${{background:"var(--bg3)",color:"var(--text3)",padding:"2px 8px",borderRadius:99,fontSize:11}}>${p.cat}</span></div>

            <div style=${{background:stockBg(p),borderRadius:6,padding:"2px 6px",display:"inline-flex",alignItems:"center",gap:4}}>
              <span style=${{fontWeight:700,fontSize:13,color:stockColor(p)}}>${p.stock}</span>
              ${bajo&&html`<span style=${{fontSize:9,color:"#dc2626"}}>▼</span>`}
            </div>
            <div style=${{fontSize:12,color:pr>0?"var(--text)":"var(--text4)",fontStyle:pr>0?"normal":"italic"}}>
              ${pr>0?pr:"—"}
            </div>
            <div style=${{display:"flex",gap:4,padding:"9px 8px",justifyContent:"flex-end"}}>
              <button class="btn btn-ghost btn-sm" onClick=${()=>onEdit(p)}><${Ic} n="edit" z=${12}/></button>
              <button class="btn btn-danger btn-sm" onClick=${()=>setConfirm(p)}><${Ic} n="trash" z=${12} s="#dc2626"/></button>

    <!-- Modal confirmar generar OC -->
    ${showOCConfirm&&html`<div class="modal-bg" onClick=${()=>setShowOCConfirm(false)}>
      <div class="modal fade-in" style=${{maxWidth:480}} onClick=${e=>e.stopPropagation()}>
        <div style=${{padding:"18px 22px",borderBottom:"1px solid var(--border)"}}>
          <div style=${{fontSize:16,fontWeight:700}}>Generar OC Borrador</div>
          <div style=${{fontSize:12,color:"var(--text4)",marginTop:2}}>Se creará una Orden de Compra con los siguientes artículos</div>
        </div>
        <div style=${{padding:"14px 22px",maxHeight:300,overflowY:"auto"}}>
          ${bajoPR.map(i=>{
            const pr=Number(i.puntoReorden)||0;
            const sugerido=Math.max(1,pr*2-i.stock);
            return html`<div key=${i.id} style=${{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
              <div>
                <div style=${{fontSize:12,fontWeight:600,color:"var(--text)"}}>${i.nombre}</div>
                <div style=${{fontSize:10,color:"var(--text4)"}}>Stock: ${i.stock} · Reorden: ${pr}</div>

          <div style=${{display:"flex",gap:8}}>

            <button class="btn btn-primary btn-sm" onClick=${generarOCBorrador}>
              <${Ic} n="plus" z=${13} s="#fff"/> Crear OC
            </button>
          </div>
        </div>
      </div>
    </div>`}

    ${confirm&&html`<${Confirm}
      msg=${"¿Eliminar <b>"+confirm.nombre+"</b> del inventario?"}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}

function DashKPIs({ords,pagos,notas,cls}){
  const hoy   = new Date().toISOString().slice(0,10);
  const mes   = hoy.slice(0,7);
  const ayer  = new Date(Date.now()-86400000).toISOString().slice(0,10);

  const ingresosHoy = pagos.filter(p=>p.fecha===hoy).reduce((s,p)=>s+p.monto,0);
  const ingresosMes = pagos.filter(p=>p.fecha.startsWith(mes)).reduce((s,p)=>s+p.monto,0);
  const ingresosAyer= pagos.filter(p=>p.fecha===ayer).reduce((s,p)=>s+p.monto,0);
  const deltaHoy    = ingresosHoy - ingresosAyer;

  const ordsActivas = ords.filter(o=>o.est!=="Entregado").length;
  const ordsHoy     = ords.filter(o=>o.fecha===hoy).length;
  const urgentes    = ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado").length;

  // Tiempo promedio de reparación (días, órdenes entregadas)
  const entregadas = ords.filter(o=>o.est==="Entregado"&&o.fechaEntrega&&o.fecha);
  const avgDias = entregadas.length
    ? (entregadas.reduce((s,o)=>s+Math.max(0,(new Date(o.fechaEntrega)-new Date(o.fecha))/(1000*60*60*24)),0)/entregadas.length).toFixed(1)
    : "—";

  const clisNuevos = cls.filter(cl=>{
    const primerOrd = ords.filter(o=>o.cid===cl.id).sort((a,b)=>a.fecha.localeCompare(b.fecha))[0];
    return primerOrd?.fecha?.startsWith(mes);
  }).length;

  const KPIS=[
    {lbl:"Ingresos hoy",     val:mxn(ingresosHoy), sub:deltaHoy>=0?"▲ "+mxn(Math.abs(deltaHoy))+" vs ayer":"▼ "+mxn(Math.abs(deltaHoy))+" vs ayer", subCol:deltaHoy>=0?"#059669":"#dc2626", col:"#1d4ed8", bg:"#eff6ff", icon:"💰"},
    {lbl:"Ingresos del mes", val:mxn(ingresosMes), sub:pagos.filter(p=>p.fecha.startsWith(mes)).length+" cobros",    subCol:"#64748b",  col:"#059669", bg:"#f0fdf4", icon:"📈"},
    {lbl:"Órdenes activas",  val:ordsActivas,      sub:ordsHoy+" nuevas hoy",   subCol:"#64748b",  col:"#7c3aed", bg:"#f5f3ff", icon:"🔧"},
    {lbl:"Urgentes",         val:urgentes,          sub:"sin entregar",          subCol:urgentes>0?"#dc2626":"#059669", col:"#dc2626", bg:"#fef2f2", icon:"🚨"},
    {lbl:"Tiempo promedio",  val:avgDias==="—"?"—":avgDias+"d", sub:"días por reparación", subCol:"#64748b", col:"#d97706", bg:"#fffbeb", icon:"⏱️"},
    {lbl:"Clientes nuevos",  val:clisNuevos,        sub:"este mes",             subCol:"#64748b",  col:"#0891b2", bg:"#ecfeff", icon:"👤"},
  ];

  return html`<div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
    ${KPIS.map(k=>html`
      <div key=${k.lbl} style=${{background:k.bg,border:"1px solid",borderColor:k.col+"33",borderRadius:12,padding:"14px 16px",display:"flex",gap:12,alignItems:"flex-start"}}>
        <div style=${{fontSize:24,lineHeight:1}}>${k.icon}</div>
        <div style=${{flex:1,minWidth:0}}>
          <div style=${{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:k.col,opacity:.7,marginBottom:3}}>${k.lbl}</div>
          <div style=${{fontSize:22,fontWeight:800,color:k.col,lineHeight:1,marginBottom:3}}>${k.val}</div>
          <div style=${{fontSize:10,fontWeight:600,color:k.subCol}}>${k.sub}</div>
        </div>
      </div>`)}
  </div>`;
}

function DashBarChart({pagos}){
  // Last 30 days revenue bar chart — pure CSS
  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    const key=d.toISOString().slice(0,10);
    const label=d.getDate()+"/"+(d.getMonth()+1);
    const val=pagos.filter(p=>p.fecha===key).reduce((s,p)=>s+p.monto,0);
    days.push({key,label,val,isToday:i===0,isWeekend:d.getDay()===0||d.getDay()===6});
  }
  const maxVal=Math.max(...days.map(d=>d.val),1);
  const total30=days.reduce((s,d)=>s+d.val,0);
  const avg=total30/30;

  return html`<div style=${{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>

        <div style=${{fontSize:11,color:"var(--text4)",marginTop:2}}>Total: ${mxn(total30)} · Promedio: ${mxn(avg)}/día</div>
      </div>
    </div>
    <div style=${{display:"flex",alignItems:"flex-end",gap:3,height:100,paddingBottom:20,position:"relative"}}>
      <!-- Avg line -->
      <div style=${{position:"absolute",left:0,right:0,bottom:20+((avg/maxVal)*100-0.5),height:1,borderTop:"1px dashed #94a3b8",pointerEvents:"none",zIndex:1}}/>
      ${days.map(d=>html`
        <div key=${d.key} title=${d.label+": "+mxn(d.val)}
          style=${{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%",justifyContent:"flex-end",cursor:"default",position:"relative"}}>
          <div style=${{
            width:"100%",
            height:d.val>0?Math.max(3,(d.val/maxVal)*100)+"%":"3px",
            background:d.isToday?"#1d4ed8":d.isWeekend?"#94a3b8":"#93c5fd",

            onMouseOver=${e=>e.currentTarget.style.opacity="1"}
            onMouseOut=${e=>e.currentTarget.style.opacity=".9"}/>
          ${(d.isToday||days.indexOf(d)%5===0)&&html`
            <div style=${{position:"absolute",bottom:0,fontSize:8,color:"var(--text4)",whiteSpace:"nowrap",fontFamily:"monospace"}}>${d.label}</div>`}
        </div>`)}
    </div>
    <div style=${{display:"flex",gap:12,marginTop:6}}>
      ${[["#1d4ed8","Hoy"],["#93c5fd","Días entre semana"],["#94a3b8","Fines de semana"],["-- #94a3b8","Promedio"]].map(([col,lbl])=>html`
        <div key=${lbl} style=${{display:"flex",alignItems:"center",gap:4,fontSize:9,color:"var(--text4)"}}>
          <div style=${{width:10,height:10,borderRadius:2,background:col.startsWith("--")?undefined:"var(--"+col.replace("var(--","").replace(")","")+")",background:col.startsWith("--")?"transparent":col,border:col.startsWith("--")?"1px dashed #94a3b8":"none"}}/>
          ${lbl}
        </div>`)}

function DashDonut({ords}){
  const total=ords.length||1;
  const datos=STS.map(s=>({...s,n:ords.filter(o=>o.est===s.k).length})).filter(s=>s.n>0);
  // Simple SVG donut
  let offset=0;
  const R=42,CX=60,CY=60,STROKE=18;
  const CIRC=2*Math.PI*R;
  const slices=datos.map(s=>{
    const pct=s.n/total;
    const dash=pct*CIRC;
    const slice={...s,dash,offset,pct};
    offset+=dash;
    return slice;
  });

  return html`<div style=${{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>🍩 Órdenes por estado</div>
    <div style=${{display:"flex",gap:16,alignItems:"center"}}>
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx=${CX} cy=${CY} r=${R} fill="none" stroke="var(--border)" strokeWidth=${STROKE}/>
        ${slices.map(s=>html`
          <circle key=${s.k} cx=${CX} cy=${CY} r=${R} fill="none"
            stroke=${s.c} strokeWidth=${STROKE}
            strokeDasharray=${s.dash+" "+(CIRC-s.dash)}
            strokeDashoffset=${-s.offset}
            transform="rotate(-90 60 60)"
            style=${{transition:"stroke-dasharray .5s"}}/>`)}
        <text x=${CX} y=${CY-4} textAnchor="middle" fontSize="18" fontWeight="800" fill="var(--text)">${ords.length}</text>
        <text x=${CX} y=${CY+12} textAnchor="middle" fontSize="9" fill="var(--text4)">órdenes</text>
      </svg>
      <div style=${{flex:1,display:"grid",gap:6}}>
        ${datos.map(s=>html`
          <div key=${s.k} style=${{display:"flex",alignItems:"center",gap:7}}>
            <div style=${{width:10,height:10,borderRadius:3,background:s.c,flexShrink:0}}/>
            <div style=${{fontSize:11,color:"var(--text2)",flex:1}}>${s.k}</div>
            <div style=${{fontSize:12,fontWeight:700,color:s.c}}>${s.n}</div>
            <div style=${{fontSize:9,color:"var(--text4)",width:28,textAlign:"right"}}>${Math.round(s.n/total*100)}%</div>
          </div>`)}
      </div>
    </div>
  </div>`;
}

function DashTopTecs({ords,tecs,pagos}){
  const mes=new Date().toISOString().slice(0,7);
  const ranking=tecs.filter(t=>t.activo&&t.rol!=="Sistema").map(t=>{
    const cerradas=ords.filter(o=>o.tec===t.id&&o.est==="Entregado").length;
    const activas =ords.filter(o=>o.tec===t.id&&o.est!=="Entregado").length;
    const ingrMes =pagos.filter(p=>{
      const ord=ords.find(o=>o.id===p.ordId);
      return ord&&ord.tec===t.id&&p.fecha.startsWith(mes);
    }).reduce((s,p)=>s+p.monto,0);
    return{...t,cerradas,activas,ingrMes};
  }).sort((a,b)=>b.cerradas-a.cerradas).slice(0,5);

  const maxC=Math.max(...ranking.map(t=>t.cerradas),1);

  return html`<div style=${{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:12,padding:"16px 20px"}}>
    <div style=${{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>🏆 Top técnicos del mes</div>

            <div style=${{flex:1,minWidth:0}}>
              <div style=${{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <div style=${{fontSize:12,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${t.nombre}</div>
                <div style=${{fontSize:11,fontWeight:700,color:"#059669",flexShrink:0,marginLeft:8}}>${t.cerradas} ent.</div>
              </div>
              <div style=${{height:6,background:"var(--bg3)",borderRadius:99,overflow:"hidden"}}>

/* ══ GOOGLE DRIVE SYNC ══════════════════════════════════════════════════ */
const GAS_KEY = "redcom_gas_url";
let gasUrl = "";
try{ gasUrl = localStorage.getItem(GAS_KEY)||""; }catch(e){}

let syncTimer = null;
let syncCallbacks = [];

function scheduleSave(getData){
  if(!gasUrl) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>pushToDrive(getData()), 1200);
}

async function pushToDrive(data){
  if(!gasUrl) return;
  try{
    window._syncStatus && window._syncStatus("saving");
    const res = await fetch(gasUrl, {
      method:"POST",
      body: JSON.stringify(data),
      headers:{"Content-Type":"text/plain"}
    });
    const json = await res.json();
    window._syncStatus && window._syncStatus(json.ok?"ok":"error");
  }catch(e){
    window._syncStatus && window._syncStatus("error");
  }
}

async function pullFromDrive(){
  if(!gasUrl) return null;
  try{
    const res = await fetch(gasUrl+"?t="+Date.now());
    const json = await res.json();
    if(json.error) return null;
    return json;
  }catch(e){ return null; }
}

/* ══ IA ASISTENTE TÉCNICO ══════════════════════════════════════════════ */
function IASection({inv,svcs,tecs}){
  const [msgs,setMsgs]=useState([
    {role:"assistant",content:"¡Hola! Soy tu asistente técnico con IA. Puedo ayudarte a:\n\n• **Diagnosticar fallas** de computadoras, impresoras y redes\n• **Buscar causas** de errores y síntomas específicos\n• **Recomendar piezas** para reparaciones\n• **Guiarte paso a paso** en procedimientos técnicos\n• **Estimar tiempos** y dificultad de reparaciones\n\n¿Qué problema necesitas resolver hoy?"}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=React.useRef(null);
  const inputRef=React.useRef(null);

  React.useEffect(()=>{
    endRef.current?.scrollIntoView({behavior:"smooth"});
  },[msgs]);

  const SUGERENCIAS=[
    "Laptop no enciende después de mojarme",
    "Impresora Epson L3150 marca error de almohadilla",
    "PC hace pitidos al arrancar",
    "WiFi conecta pero sin internet",
    "Pantalla azul BSOD en Windows 11",
    "Impresora HP no detecta cartucho nuevo",
  ];

  async function send(txt){
    const text=(txt||input).trim();
    if(!text||loading)return;
    setInput("");

    const userMsg={role:"user",content:text};
    const newMsgs=[...msgs,userMsg];
    setMsgs(newMsgs);
    setLoading(true);

    // Build context about shop inventory and services
    const invCtx=inv.slice(0,20).map(i=>`${i.nombre} ($${i.precio} MXN, stock:${i.stock})`).join(", ");
    const svcCtx=svcs.filter(s=>s.activo).slice(0,20).map(s=>`${s.nombre} ($${s.precio})`).join(", ");

    const systemPrompt=`Eres un asistente técnico especializado para un taller de reparación de cómputo llamado "Redcom" ubicado en Los Mochis, Sinaloa, México.

Tu rol:
- Ayudar a los técnicos a diagnosticar fallas de computadoras, laptops, impresoras y redes
- Recomendar refacciones y piezas específicas para reparaciones
- Dar procedimientos técnicos paso a paso
- Estimar costos de reparación en pesos mexicanos (MXN) según precios de Los Mochis
- Ser conciso y práctico — los técnicos están en el taller, no quieren textos largos

Inventario disponible en el taller: ${invCtx}
Servicios del catálogo: ${svcCtx}

Cuando sea relevante, menciona si el taller ya tiene la pieza en inventario o si el servicio ya está en el catálogo. Responde siempre en español. Usa formato con viñetas para pasos o listas. Sé directo y técnico.`;

    // Filtrar solo mensajes reales (excluir el saludo inicial del bot)
    const history=newMsgs
      .filter(m=>!(m.role==="assistant"&&newMsgs.indexOf(m)===0))
      .map(m=>({role:m.role,content:m.content}));

    if(!gasUrl){
      setMsgs(p=>[...p,{role:"assistant",content:"⚠️ Para usar el asistente IA primero conecta Google Drive. Haz clic en **Conectar Drive** (esquina inferior izquierda) y configura tu Apps Script con tu clave de Gemini gratuita."}]);
      setLoading(false);
      return;
    }
    try{
      const res=await fetch(gasUrl,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({
          action:"ai",
          system:systemPrompt,
          messages:history
        })
      });
      const data=await res.json();
      if(!data.ok){
        setMsgs(p=>[...p,{role:"assistant",content:"❌ Error: "+(data.error||"Sin respuesta del servidor")}]);
      } else {
        setMsgs(p=>[...p,{role:"assistant",content:data.reply||"Sin respuesta."}]);
      }
    }catch(e){
      setMsgs(p=>[...p,{role:"assistant",content:"❌ Error de conexión con el servidor. Verifica que tu URL de Apps Script esté configurada correctamente en Conectar Drive."}]);
    }
    setLoading(false);
  }

  function renderContent(text){
    // Simple markdown-like rendering
    const lines=text.split("\n");
    return lines.map((line,i)=>{
      if(line.startsWith("**")&&line.endsWith("**"))
        return html`<div key=${i} style=${{fontWeight:700,marginTop:4}}>${line.slice(2,-2)}</div>`;
      if(line.startsWith("• ")||line.startsWith("- "))
        return html`<div key=${i} style=${{display:"flex",gap:6,marginTop:3}}>
          <span style=${{color:"#1d4ed8",fontWeight:700,flexShrink:0}}>•</span>
          <span>${line.slice(2).replace(/\*\*(.*?)\*\*/g,(_,t)=>t)}</span>
        </div>`;
      if(/^\d+\.\s/.test(line))
        return html`<div key=${i} style=${{display:"flex",gap:6,marginTop:3}}>
          <span style=${{color:"#1d4ed8",fontWeight:700,flexShrink:0,minWidth:18}}>${line.match(/^\d+/)[0]}.</span>
          <span>${line.replace(/^\d+\.\s/,"")}</span>
        </div>`;
      if(line==="")return html`<div key=${i} style=${{height:6}}/>`;
      // Bold inline
      const parts=line.split(/\*\*(.*?)\*\*/g);
      return html`<div key=${i} style=${{marginTop:2,lineHeight:1.5}}>${parts.map((p,j)=>j%2===0?p:html`<b key=${j}>${p}</b>`)}</div>`;
    });
  }

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden",background:"#f8fafc"}}>
    <!-- Header -->
    <div style=${{padding:"14px 24px",borderBottom:"1px solid #e2e8f0",background:"#fff",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style=${{display:"flex",alignItems:"center",gap:12}}>
        <div style=${{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🤖</div>
        <div>
          <div style=${{fontSize:17,fontWeight:700}}>Asistente Técnico IA</div>
          <div style=${{fontSize:11,color:"#059669",fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
            <span style=${{width:6,height:6,borderRadius:99,background:"#059669",display:"inline-block"}}></span>
            En línea · Especialista en cómputo, impresoras y redes
          </div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onClick=${()=>setMsgs([{role:"assistant",content:"Chat reiniciado. ¿En qué te puedo ayudar?"}])}>
        <${Ic} n="x" z=${13}/> Limpiar chat
      </button>
    </div>

    <!-- Messages -->
    <div style=${{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
      ${msgs.map((m,i)=>html`
        <div key=${i} style=${{display:"flex",gap:10,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
          ${m.role==="assistant"&&html`
            <div style=${{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,marginTop:2}}>🤖</div>`}
          <div style=${{
            maxWidth:"78%",padding:"10px 14px",borderRadius:m.role==="user"?"12px 4px 12px 12px":"4px 12px 12px 12px",
            background:m.role==="user"?"#1d4ed8":"#fff",
            color:m.role==="user"?"#fff":"#1e293b",
            border:m.role==="assistant"?"1px solid #e2e8f0":"none",
            fontSize:13,lineHeight:1.5,
            boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
            ${m.role==="user"?m.content:renderContent(m.content)}
          </div>
          ${m.role==="user"&&html`
            <div style=${{width:32,height:32,borderRadius:10,background:"#1d4ed8",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
              <${Ic} n="user" z=${16} s="#fff"/>
            </div>`}
