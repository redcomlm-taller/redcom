}

/* ══ PANEL NOTIFICACIONES ════════════════════════════════════════════════ */
function NotifPanel({ords,inv,gars,cls,onClose,onNavTo}){
  const hoy=new Date();

  // Build notifications
  const notifs=[];

  // 1. Órdenes urgentes sin mover en 2+ días
  ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado"&&o.est!=="Listo").forEach(o=>{
    const dias=Math.floor((hoy-new Date(o.fecha))/(1000*60*60*24));
    if(dias>=2){
      const cli=cls.find(c=>c.id===o.cid);
      notifs.push({id:"u"+o.id,tipo:"urgente",icn:"warn",color:"#dc2626",bg:"#fef2f2",
        titulo:`Orden urgente sin mover — ${o.id}`,
        desc:`${cli?.nombre||"?"} · ${o.equipo} · ${dias} días en "${o.est}"`,nav:"orders"});
    }
  });

  // 2. Órdenes sin movimiento en 5+ días
  ords.filter(o=>o.est!=="Entregado"&&o.est!=="Listo").forEach(o=>{
    const dias=Math.floor((hoy-new Date(o.fecha))/(1000*60*60*24));
    if(dias>=5&&o.urg!=="Urgente"){
      const cli=cls.find(c=>c.id===o.cid);
      notifs.push({id:"s"+o.id,tipo:"sin_movimiento",icn:"warn",color:"#d97706",bg:"#fffbeb",
        titulo:`Orden sin movimiento — ${o.id}`,
        desc:`${cli?.nombre||"?"} · ${o.equipo} · ${dias} días en "${o.est}"`,nav:"orders"});
    }
  });

  // 3. Stock bajo (≤3)
  inv.filter(i=>i.stock<=3).forEach(i=>{
    notifs.push({id:"i"+i.id,tipo:"stock",icn:"box",color:"#ea580c",bg:"#fff7ed",
      titulo:`Stock bajo — ${i.nombre}`,
      desc:`Solo ${i.stock} unidad${i.stock!==1?"es":""} disponible${i.stock!==1?"s":""}`,nav:"inv"});
  });

  // 4. Garantías por vencer en 7 días
  gars.forEach(g=>{
    const vence=new Date(g.fechaVence);
    const dias=Math.ceil((vence-hoy)/(1000*60*60*24));
    if(dias>=0&&dias<=7&&g.estado!=="Reclamada"){
      const cli=cls.find(c=>c.id===g.cliId);
      notifs.push({id:"g"+g.id,tipo:"garantia",icn:"warranty",color:"#7c3aed",bg:"#f5f3ff",
        titulo:`Garantía por vencer — ${g.ordId}`,
        desc:`${cli?.nombre||"?"} · ${g.equipo} · vence en ${dias===0?"hoy":dias+" días"}`,nav:"garantias"});
    }
  });

  return html`<div style=${{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",padding:"60px 16px 16px",background:"rgba(0,0,0,.15)"}} onClick=${onClose}>
    <div class="modal fade-in" style=${{width:380,maxHeight:"80vh",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}} onClick=${e=>e.stopPropagation()}>
      <div style=${{padding:"16px 20px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h3 style=${{fontSize:15,fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
          <${Ic} n="bell" z=${17} s="#1d4ed8"/> Notificaciones
          ${notifs.length>0&&html`<span style=${{background:"#dc2626",color:"#fff",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:99}}>${notifs.length}</span>`}
        </h3>
        <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
      </div>
      <div style=${{overflowY:"auto",maxHeight:"calc(80vh - 56px)"}}>
        ${notifs.length===0
          ?html`<div style=${{padding:"32px 20px",textAlign:"center",color:"#94a3b8"}}>
            <div style=${{fontSize:28,marginBottom:8}}>✓</div>
            <div style=${{fontWeight:600,marginBottom:4}}>Todo en orden</div>
            <div style=${{fontSize:12}}>Sin alertas pendientes</div>
          </div>`
          :notifs.map(n=>html`
            <div key=${n.id} onClick=${()=>{onNavTo(n.nav);onClose();}} style=${{
              padding:"12px 18px",borderBottom:"1px solid #f1f5f9",cursor:"pointer",
              display:"flex",gap:10,alignItems:"flex-start",background:"#fff",
              transition:"background .1s"}}
              onMouseOver=${e=>e.currentTarget.style.background=n.bg}
              onMouseOut=${e=>e.currentTarget.style.background="#fff"}>
              <div style=${{width:32,height:32,borderRadius:8,background:n.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <${Ic} n=${n.icn} z=${16} s=${n.color}/>
              </div>
              <div>
                <div style=${{fontWeight:600,fontSize:12,color:n.color}}>${n.titulo}</div>
                <div style=${{fontSize:11,color:"#64748b",marginTop:2}}>${n.desc}</div>
              </div>
            </div>`)}
      </div>
    </div>
  </div>`;
}

/* ══ BÚSQUEDA GLOBAL (Ctrl+K) ═══════════════════════════════════════════ */
function GlobalSearch({ords,cls,inv,cots,onNav,onClose}){
  const [q,setQ]=useState("");
  const inputRef=React.useRef();

  React.useEffect(()=>{
    inputRef.current?.focus();
  },[]);

  const results=React.useMemo(()=>{
    const t=q.trim().toLowerCase();
    if(t.length<2) return [];
    const out=[];

    // Órdenes
    ords.forEach(o=>{
      const cl=cls.find(x=>x.id===o.cid);
      const hay=[o.id,o.equipo,o.serie,o.falla,cl?.nombre,cl?.tel,cl?.email].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"orden", icon:"🔧", color:"#7c3aed",
        titulo:o.id+" — "+o.equipo,
        sub:(cl?.nombre||"?")+" · "+o.est,
        nav:"orders", id:o.id
      });
    });

    // Clientes
    cls.forEach(cl=>{
      const hay=[cl.nombre,cl.tel,cl.email,cl.empresa].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"cliente", icon:"👤", color:"#0891b2",
        titulo:cl.nombre,
        sub:[cl.empresa,cl.tel,cl.email].filter(Boolean).join(" · "),
        nav:"clients", id:cl.id
      });
    });

    // Inventario
    inv.forEach(i=>{
      const hay=[i.nombre,i.sku,i.marca,i.categoria].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"inventario", icon:"📦", color:"#d97706",
        titulo:i.nombre,
        sub:(i.marca?i.marca+" · ":"")+"Stock: "+i.stock+(i.stock<=3?" ⚠️":""),
        nav:"inv", id:i.id
      });
    });

    // Cotizaciones
    cots.forEach(ct=>{
      const cl=cls.find(x=>x.id===ct.cliId);
      const hay=[ct.id,cl?.nombre,ct.equipo].filter(Boolean).join(" ").toLowerCase();
      if(hay.includes(t)) out.push({
        tipo:"cotización", icon:"📋", color:"#059669",
        titulo:ct.id+" — "+(cl?.nombre||"?"),
        sub:(ct.equipo||"")+" · "+mxn(ct.total||0),
        nav:"cots", id:ct.id
      });
    });

    return out.slice(0,12);
  },[q,ords,cls,inv,cots]);

  const TIPO_ORDER=["orden","cliente","inventario","cotización"];
  const grouped=TIPO_ORDER.map(t=>({tipo:t,items:results.filter(r=>r.tipo===t)})).filter(g=>g.items.length>0);

  const [sel,setSel]=useState(0);
  const flat=results;

  function handleKey(e){
    if(e.key==="ArrowDown"){e.preventDefault();setSel(p=>Math.min(p+1,flat.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setSel(p=>Math.max(p-1,0));}
    else if(e.key==="Enter"&&flat[sel]){onNav(flat[sel].nav);onClose();}
    else if(e.key==="Escape") onClose();
  }

  return html`<div style=${{position:"fixed",inset:0,zIndex:500,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80}} onClick=${onClose}>
    <div style=${{width:"100%",maxWidth:580,background:"var(--bg)",borderRadius:14,boxShadow:"0 24px 64px rgba(0,0,0,.3)",overflow:"hidden"}} onClick=${e=>e.stopPropagation()}>

      <!-- Input -->
      <div style=${{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:"1px solid var(--border)"}}>
        <span style=${{fontSize:18}}>🔍</span>
        <input ref=${inputRef} value=${q} onChange=${e=>{setQ(e.target.value);setSel(0);}}
          onKeyDown=${handleKey}
          placeholder="Buscar órdenes, clientes, inventario, cotizaciones…"
          style=${{flex:1,border:"none",outline:"none",fontSize:15,background:"transparent",color:"var(--text)",fontFamily:"inherit"}}/>
        ${q&&html`<button onClick=${()=>setQ("")} style=${{background:"none",border:"none",cursor:"pointer",color:"var(--text4)",fontSize:18,lineHeight:1,padding:"0 4px"}}>✕</button>`}
        <kbd style=${{fontSize:10,padding:"2px 6px",borderRadius:5,background:"var(--bg3)",border:"1px solid var(--border)",color:"var(--text4)",fontFamily:"monospace"}}>ESC</kbd>
      </div>

      <!-- Results -->
      <div style=${{maxHeight:420,overflowY:"auto"}}>
        ${q.trim().length<2&&html`
          <div style=${{padding:"28px 20px",textAlign:"center"}}>
            <div style=${{fontSize:28,marginBottom:8}}>⌨️</div>
            <div style=${{fontSize:13,fontWeight:600,color:"var(--text2)"}}>Escribe para buscar</div>
            <div style=${{fontSize:11,color:"var(--text4)",marginTop:4}}>Órdenes · Clientes · Inventario · Cotizaciones</div>
            <div style=${{display:"flex",gap:8,justifyContent:"center",marginTop:14,flexWrap:"wrap"}}>
              ${[["🔧","Órdenes","orders"],["👤","Clientes","clients"],["📦","Inventario","inv"],["📋","Cotizaciones","cots"]].map(([ic,lbl,nav])=>html`
                <button key=${nav} onClick=${()=>{onNav(nav);onClose();}} style=${{
                  padding:"6px 12px",borderRadius:8,border:"1px solid var(--border)",
                  background:"var(--bg2)",cursor:"pointer",fontFamily:"inherit",
                  fontSize:11,fontWeight:600,color:"var(--text3)",display:"flex",alignItems:"center",gap:5}}>
                  ${ic} ${lbl}
                </button>`)}
            </div>
          </div>`}

        ${q.trim().length>=2&&results.length===0&&html`
          <div style=${{padding:"32px 20px",textAlign:"center"}}>
            <div style=${{fontSize:28,marginBottom:8}}>🕵️</div>
            <div style=${{fontSize:13,fontWeight:600,color:"var(--text2)"}}>Sin resultados para "${q}"</div>
            <div style=${{fontSize:11,color:"var(--text4)",marginTop:4}}>Intenta con otro término</div>
          </div>`}

        ${grouped.map(g=>html`
          <div key=${g.tipo}>
            <div style=${{padding:"8px 16px 4px",fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"var(--text4)",background:"var(--bg2)"}}>${g.tipo}s — ${g.items.length}</div>
            ${g.items.map(r=>{
              const idx=flat.indexOf(r);
              return html`<div key=${r.id+r.tipo}
                onClick=${()=>{onNav(r.nav);onClose();}}
                onMouseEnter=${()=>setSel(idx)}
                style=${{
                  padding:"10px 16px",cursor:"pointer",display:"flex",gap:12,alignItems:"center",
                  background:sel===idx?"var(--bg2)":"var(--bg)",
                  borderBottom:"1px solid var(--border)",transition:"background .1s"}}>
                <div style=${{width:34,height:34,borderRadius:9,background:r.color+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>${r.icon}</div>
                <div style=${{flex:1,minWidth:0}}>
                  <div style=${{fontSize:13,fontWeight:600,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${r.titulo}</div>
                  <div style=${{fontSize:11,color:"var(--text4)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>${r.sub}</div>
                </div>
                <div style=${{fontSize:10,color:"var(--text4)"}}>↵</div>
              </div>`;
            })}
          </div>`)}
      </div>

      <!-- Footer -->
      <div style=${{padding:"8px 16px",borderTop:"1px solid var(--border)",display:"flex",gap:12,alignItems:"center",background:"var(--bg2)"}}>
        <div style=${{fontSize:10,color:"var(--text4)",display:"flex",gap:10}}>
          <span><kbd style=${{fontFamily:"monospace",background:"var(--bg3)",border:"1px solid var(--border)",padding:"1px 5px",borderRadius:4}}>↑↓</kbd> navegar</span>
          <span><kbd style=${{fontFamily:"monospace",background:"var(--bg3)",border:"1px solid var(--border)",padding:"1px 5px",borderRadius:4}}>↵</kbd> abrir</span>
          <span><kbd style=${{fontFamily:"monospace",background:"var(--bg3)",border:"1px solid var(--border)",padding:"1px 5px",borderRadius:4}}>ESC</kbd> cerrar</span>
        </div>
        <div style=${{marginLeft:"auto",fontSize:10,color:"var(--text4)"}}>${results.length} resultado${results.length!==1?"s":""}</div>
      </div>
    </div>
  </div>`;
}

/* ── Panel lateral de eventos del día ───────────────────────────────────── */
function CalDayPanel({fecha,eventos,cls,ords,tecs,onAddCita,onAddRec,onEditCita,onEditRec,onDelCita,onDelRec,onSyncGCal,onClose}){
  const [syncing,setSyncing]=useState({});

  async function handleSync(ev){
    setSyncing(p=>({...p,[ev.id]:true}));
    const gasUrl=localStorage.getItem("redcom_gas_url");
    if(!gasUrl){alert("Configura la URL del GAS en Preferencias → Google Drive.");setSyncing(p=>({...p,[ev.id]:false}));return;}
    const res=await onSyncGCal("calendar_create",{
      title:ev.titulo||(EV_TIPOS[ev.tipo]?.icon+" "+ev.tipo),
      date:ev.fecha,
      time:ev.hora||"09:00",
      description:ev.notas||"",
      tipo:ev.tipo,
    });
    setSyncing(p=>({...p,[ev.id]:false}));
    if(res?.ok){alert("✅ Evento sincronizado con Google Calendar");}
    else{alert("❌ Error al sincronizar: "+(res?.error||"Sin respuesta del GAS"));}
  }

  const fmtFecha=f=>{try{const [y,m,d]=f.split("-");const names=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return d+" "+names[parseInt(m)-1]+" "+y;}catch{return f;}};

  return html`<div style=${{width:320,flexShrink:0,background:"var(--bg)",borderLeft:"1px solid var(--border)",display:"flex",flexDirection:"column",height:"100%"}}>
    <div style=${{padding:"14px 16px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--bg2)"}}>
      <div>
        <div style=${{fontSize:14,fontWeight:800,color:"var(--text)"}}>${fmtFecha(fecha)}</div>
        <div style=${{fontSize:11,color:"var(--text4)",marginTop:1}}>${eventos.length} evento${eventos.length!==1?"s":""}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${13}/></button>
    </div>

    <div style=${{display:"flex",gap:6,padding:"10px 12px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
      <button class="btn btn-primary btn-sm" style=${{flex:1,justifyContent:"center",fontSize:11}} onClick=${onAddCita}>
        📅 Cita
      </button>
      <button class="btn btn-sm" style=${{flex:1,justifyContent:"center",fontSize:11,background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}} onClick=${onAddRec}>
        🔔 Recordatorio
      </button>
    </div>

    <div style=${{flex:1,overflowY:"auto",padding:10,display:"flex",flexDirection:"column",gap:8}}>
      ${eventos.length===0
        ?html`<div style=${{textAlign:"center",padding:"30px 0",color:"var(--text4)"}}>
            <div style=${{fontSize:28,marginBottom:8}}>📭</div>
            <div style=${{fontSize:12}}>Sin eventos este día</div>
          </div>`
        :eventos.map(ev=>{
          const tp=EV_TIPOS[ev.tipo]||EV_TIPOS.cita;
          const ord=ev.ordId?ords.find(o=>o.id===ev.ordId):null;
          const cl=ev.cliId?cls.find(x=>x.id===ev.cliId):ord?cls.find(x=>x.id===ord.cid):null;
          const tec=ev.tecId?tecs.find(t=>t.id===ev.tecId):null;
          const isSyncing=syncing[ev.id];
          return html`<div key=${ev.id} style=${{background:tp.bg,border:"1.5px solid",borderColor:tp.color+"44",borderRadius:10,padding:"10px 12px"}}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style=${{display:"flex",alignItems:"center",gap:6}}>
                <span style=${{fontSize:14}}>${tp.icon}</span>
                <div style=${{fontSize:12,fontWeight:700,color:tp.color}}>${ev.titulo||tp.label}</div>
              </div>
              <div style=${{fontSize:11,fontFamily:"monospace",color:tp.color,flexShrink:0,marginLeft:8}}>${ev.hora||""}</div>
            </div>
            ${ev.notas&&html`<div style=${{fontSize:11,color:"var(--text3)",marginBottom:4,fontStyle:"italic"}}>${ev.notas}</div>`}
            ${cl&&html`<div style=${{fontSize:10,color:"var(--text4)"}}>👤 ${cl.nombre}</div>`}
            ${ord&&html`<div style=${{fontSize:10,color:"var(--text4)"}}>🔧 ${ord.id} · ${ord.equipo}</div>`}
            ${tec&&html`<div style=${{fontSize:10,color:"var(--text4)"}}>👷 ${tec.nombre}</div>`}
            <div style=${{display:"flex",gap:5,marginTop:8,justifyContent:"flex-end"}}>
              ${ev.gcEventId
                ?html`<span style=${{fontSize:9,color:"#059669",fontWeight:700}}>✓ Google Cal</span>`
                :html`<button class="btn btn-ghost btn-sm" style=${{fontSize:10,padding:"3px 8px"}}
                    onClick=${()=>handleSync(ev)} disabled=${isSyncing}>
                    ${isSyncing?"⏳":"📅"} ${isSyncing?"Sincronizando…":"Sync GCal"}
                  </button>`}
              ${ev._tipo==="cita"&&html`
                <button class="btn btn-ghost btn-sm" style=${{padding:"3px 6px"}} onClick=${()=>onEditCita(ev)}><${Ic} n="edit" z=${11}/></button>
                <button class="btn btn-danger btn-sm" style=${{padding:"3px 6px"}} onClick=${()=>onDelCita(ev.id)}><${Ic} n="trash" z=${11} s="#dc2626"/></button>`}
              ${ev._tipo==="rec"&&html`
                <button class="btn btn-ghost btn-sm" style=${{padding:"3px 6px"}} onClick=${()=>onEditRec(ev)}><${Ic} n="edit" z=${11}/></button>
                <button class="btn btn-danger btn-sm" style=${{padding:"3px 6px"}} onClick=${()=>onDelRec(ev.id)}><${Ic} n="trash" z=${11} s="#dc2626"/></button>`}
            </div>
          </div>`;
        })}
    </div>
  </div>`;
}

/* ══ CALENDARIO SECTION ══════════════════════════════════════════════════ */
function CalendarioSection({ords,cls,tecs,citas,recs,session,config,onSaveCita,onDelCita,onSaveRec,onDelRec,onSyncGCal}){
  const hoy = new Date().toISOString().slice(0,10);
  const [cur,setCur]   = useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [selDay,setSelDay] = useState(null);
  const [showCitaModal,setShowCitaModal] = useState(false);
  const [showRecModal,setShowRecModal]   = useState(false);
  const [editCita,setEditCita] = useState(null);
  const [editRec,setEditRec]   = useState(null);
  const [syncingAll,setSyncingAll] = useState(false);

  const {y,m} = cur;
  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DIAS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  // Build all events for this month
  function buildEventos(fecha){
    const ev=[];
    // Entregas de órdenes
    ords.filter(o=>o.ent===fecha&&o.est!=="Entregado").forEach(o=>{
      const cl=cls.find(x=>x.id===o.cid);
      ev.push({id:"ent-"+o.id,tipo:"entrega",_tipo:"ord",titulo:"Entrega: "+o.equipo+(cl?" · "+cl.nombre:""),hora:"",ordId:o.id,cliId:o.cid,fecha,notas:o.notas||"",gcEventId:null});
    });
    // Urgentes activas
    ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado"&&o.fecha===fecha).forEach(o=>{
      const cl=cls.find(x=>x.id===o.cid);
      ev.push({id:"urg-"+o.id,tipo:"urgente",_tipo:"ord",titulo:"🚨 URGENTE: "+o.equipo+(cl?" · "+cl.nombre:""),hora:"",ordId:o.id,cliId:o.cid,fecha,notas:o.prob||"",gcEventId:null});
    });
    // Citas
    citas.filter(c=>c.fecha===fecha).forEach(c=>{
      ev.push({...c,tipo:c.tipo||"cita",_tipo:"cita"});
    });
    // Recordatorios
    recs.filter(r=>r.fecha===fecha).forEach(r=>{
      ev.push({...r,tipo:"recordatorio",_tipo:"rec"});
    });
    return ev.sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));
  }

  // Calendar grid
  const firstDay = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const cells=[];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const fmtDate=(d)=>y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

  const selEvs = selDay ? buildEventos(fmtDate(selDay)) : [];

  // Stats for the month
  const mesStr=y+"-"+String(m+1).padStart(2,"0");
  const entregas=ords.filter(o=>o.ent?.startsWith(mesStr)&&o.est!=="Entregado").length;
  const urgentes=ords.filter(o=>o.urg==="Urgente"&&o.est!=="Entregado").length;
  const citasMes=citas.filter(c=>c.fecha.startsWith(mesStr)).length;
  const recsMes=recs.filter(r=>r.fecha.startsWith(mesStr)).length;

  function prevMes(){setCur(p=>{const mm=p.m===0?11:p.m-1;const yy=p.m===0?p.y-1:p.y;return{y:yy,m:mm};});}
  function nextMes(){setCur(p=>{const mm=p.m===11?0:p.m+1;const yy=p.m===11?p.y+1:p.y;return{y:yy,m:mm};});}

  async function syncAllToGCal(){
    const gasUrl=localStorage.getItem("redcom_gas_url");
    if(!gasUrl){alert("Configura la URL del GAS primero en Preferencias.");return;}
    setSyncingAll(true);
    let ok=0,err=0;
    const todos=[...citas,...recs];
    for(const ev of todos){
      if(ev.gcEventId) continue;
      const res=await onSyncGCal("calendar_create",{
        title:ev.titulo||(ev.tipo||"Recordatorio"),
        date:ev.fecha,
        time:ev.hora||"09:00",
        description:ev.notas||"",
        tipo:ev.tipo||"recordatorio",
      });
      if(res?.ok){ok++;}else{err++;}
    }
    setSyncingAll(false);
    alert("Sync completo: "+ok+" eventos enviados"+(err>0?", "+err+" errores":"")+".");
  }

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>

    <!-- Header -->
    <div style=${{background:"var(--bg)",borderBottom:"1px solid var(--border)",padding:"12px 20px",flexShrink:0}}>
      <div style=${{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <!-- Mes nav -->
        <button class="btn btn-ghost btn-sm" onClick=${prevMes}>‹</button>
        <div style=${{fontSize:18,fontWeight:800,color:"var(--text)",minWidth:180,textAlign:"center"}}>${MESES[m]} ${y}</div>
        <button class="btn btn-ghost btn-sm" onClick=${nextMes}>›</button>
        <button class="btn btn-ghost btn-sm" onClick=${()=>setCur({y:new Date().getFullYear(),m:new Date().getMonth()})} style=${{fontSize:11}}>Hoy</button>
        <div style=${{marginLeft:"auto",display:"flex",gap:8}}>
          <button class="btn btn-ghost btn-sm" onClick=${syncAllToGCal} disabled=${syncingAll}
            title="Sincronizar todas las citas y recordatorios con Google Calendar"
            style=${{fontSize:11,display:"flex",alignItems:"center",gap:5,color:"#059669",borderColor:"#bbf7d0"}}>
            ${syncingAll?"⏳ Sincronizando…":"📅 Sync Google Calendar"}
          </button>
          <button class="btn btn-primary btn-sm" onClick=${()=>{setEditCita(null);setShowCitaModal(true);}} style=${{fontSize:11}}>
            📅 Nueva cita
          </button>
          <button class="btn btn-sm" style=${{fontSize:11,background:"#fffbeb",color:"#d97706",border:"1px solid #fde68a"}}
            onClick=${()=>{setEditRec(null);setShowRecModal(true);}}>
            🔔 Recordatorio
          </button>
        </div>
      </div>

      <!-- Stats rápidas -->
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        ${[
          ["📦","Entregas",entregas,"#1d4ed8","#eff6ff"],
          ["🚨","Urgentes",urgentes,"#dc2626","#fef2f2"],
          ["📅","Citas",citasMes,"#7c3aed","#f5f3ff"],
          ["🔔","Recordatorios",recsMes,"#d97706","#fffbeb"],
        ].map(([ic,lbl,n,col,bg])=>html`
          <div key=${lbl} style=${{background:bg,border:"1px solid",borderColor:col+"33",borderRadius:8,padding:"5px 12px",display:"flex",alignItems:"center",gap:6}}>
            <span style=${{fontSize:12}}>${ic}</span>
            <span style=${{fontSize:11,fontWeight:700,color:col}}>${n} ${lbl}</span>
          </div>`)}
        <!-- Leyenda -->
        <div style=${{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
          ${Object.entries(EV_TIPOS).map(([k,v])=>html`
            <div key=${k} style=${{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"var(--text4)"}}>
              <div style=${{width:10,height:10,borderRadius:3,background:v.color}}/>
              ${v.label}
            </div>`)}
        </div>
      </div>
    </div>

    <!-- Calendar + Day panel -->
    <div style=${{flex:1,display:"flex",overflow:"hidden"}}>

      <!-- Calendar grid -->
      <div style=${{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <!-- Day headers -->
        <div style=${{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"var(--bg2)",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          ${DIAS.map(d=>html`<div key=${d} style=${{padding:"7px 0",textAlign:"center",fontSize:11,fontWeight:700,color:"var(--text4)"}}>${d}</div>`)}
        </div>
        <!-- Cells -->
        <div style=${{flex:1,overflowY:"auto",display:"grid",gridTemplateColumns:"repeat(7,1fr)",gridAutoRows:"minmax(90px,1fr)",gap:1,background:"var(--border)"}}>
          ${cells.map((d,i)=>{
            if(!d) return html`<div key=${"e"+i} style=${{background:"var(--bg2)"}}/>`;
            const fecha=fmtDate(d);
            const evs=buildEventos(fecha);
            const isHoy=fecha===hoy;
            const isSel=selDay===d;
            return html`<div key=${d}
              onClick=${()=>setSelDay(isSel?null:d)}
              style=${{
                background:isSel?"#eff6ff":isHoy?"#f0fdf4":"var(--bg)",
                cursor:"pointer",padding:"6px 7px",overflow:"hidden",
                borderLeft:isSel?"2px solid #1d4ed8":isHoy?"2px solid #059669":"2px solid transparent",
                transition:"background .1s"}}
              onMouseOver=${e=>{if(!isSel)e.currentTarget.style.background="var(--bg2)";}}
              onMouseOut=${e=>{if(!isSel)e.currentTarget.style.background=isHoy?"#f0fdf4":"var(--bg)";}}>
              <div style=${{fontSize:12,fontWeight:isHoy||isSel?800:500,
                color:isHoy?"#059669":isSel?"#1d4ed8":"var(--text)",
                marginBottom:3,width:22,height:22,borderRadius:"50%",
                background:isHoy?"#059669":isSel?"#1d4ed8":"transparent",
                color:isHoy||isSel?"#fff":"var(--text)",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                ${d}
              </div>
              ${evs.slice(0,3).map(ev=>{
                const tp=EV_TIPOS[ev.tipo]||EV_TIPOS.cita;
                return html`<div key=${ev.id} style=${{
                  background:tp.color,color:"#fff",borderRadius:4,
                  fontSize:9,fontWeight:700,padding:"1px 5px",marginBottom:2,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  ${tp.icon} ${ev.titulo||tp.label}
                </div>`;
              })}
              ${evs.length>3&&html`<div style=${{fontSize:9,color:"var(--text4)",fontWeight:600}}>+${evs.length-3} más</div>`}
            </div>`;
          })}
        </div>
      </div>

      <!-- Day panel -->
      ${selDay&&html`<${CalDayPanel}
        fecha=${fmtDate(selDay)}
        eventos=${selEvs}
        cls=${cls} ords=${ords} tecs=${tecs}
        onAddCita=${()=>{setEditCita({fecha:fmtDate(selDay)});setShowCitaModal(true);}}
        onAddRec=${()=>{setEditRec({fecha:fmtDate(selDay)});setShowRecModal(true);}}
        onEditCita=${ev=>{setEditCita(ev);setShowCitaModal(true);}}
        onEditRec=${ev=>{setEditRec(ev);setShowRecModal(true);}}
        onDelCita=${id=>{if(confirm("¿Eliminar cita?"))onDelCita(id);}}
        onDelRec=${id=>{if(confirm("¿Eliminar recordatorio?"))onDelRec(id);}}
        onSyncGCal=${onSyncGCal}
        onClose=${()=>setSelDay(null)}/>`}
    </div>

    ${showCitaModal&&html`<${CitaModal}
      cls=${cls} ords=${ords} tecs=${tecs} session=${session}
      edit=${editCita}
      onSave=${c=>{onSaveCita(c);setShowCitaModal(false);setEditCita(null);}}
      onClose=${()=>{setShowCitaModal(false);setEditCita(null);}}/>`}

    ${showRecModal&&html`<${RecModal}
      tecs=${tecs} session=${session}
      edit=${editRec}
      onSave=${r=>{onSaveRec(r);setShowRecModal(false);setEditRec(null);}}
      onClose=${()=>{setShowRecModal(false);setEditRec(null);}}/>`}
  </div>`;
}

  const [showFirma,setShowFirma]=useState(null);   // ordId
  const [portalOrd,setPortalOrd]=useState(null);   // ord object for portal preview
  const [provs,setProvs]=useState(()=>lsGet("redcom_provs",PROVS0));
  const [ocs,setOcs]=useState(()=>lsGet("redcom_ocs",OCMPS0));
  const [citas,setCitas]=useState(()=>lsGet("redcom_citas",[]));
  const [recs,setRecs]=useState(()=>lsGet("redcom_recs",[]));
  const [newProv,setNewProv]=useState(false);
  const [editProv,setEditProv]=useState(null);
  const [newOC,setNewOC]=useState(false);
  const [newOCPrvInit,setNewOCPrvInit]=useState(null);
  const [editOC,setEditOC]=useState(null);
  const [pagos,setPagos]=useState(()=>lsGet("redcom_pagos",PAGOS0));
  const [cortes,setCortes]=useState(()=>lsGet("redcom_cortes",CORTES0));
  const [gars,setGars]=useState(()=>lsGet("redcom_gars",GARS0));
  const [showNotif,setShowNotif]=useState(false);
  const [cots,setCots]=useState(()=>lsGet("redcom_cots",COTS0));
  const [newCot,setNewCot]=useState(false);
  const [editCot,setEditCot]=useState(null);
  const [svcs,setSvcs]=useState(()=>lsGet("redcom_svcs",SERVICIOS0));
  const [newSvc,setNewSvc]=useState(false);
  const [editSvc,setEditSvc]=useState(null);
  const [users,setUsers]=useState(()=>lsGet("redcom_users",USERS0));
  const [session,setSession]=useState(()=>{try{const s=sessionStorage.getItem("redcom_session");return s?JSON.parse(s):null;}catch(e){return null;}});
  const [showNewUser,setNewUser]=useState(false);
  const [editUser,setEditUser]=useState(null);
  const [notas,setNotas]=useState(()=>{
    try{
      const s=localStorage.getItem("redcom_notas");
      return s?JSON.parse(s):[];
    }catch(e){return [];}
  });
  const [gas,setGas]=useState(()=>{try{return localStorage.getItem(GAS_KEY)||"";}catch(e){return "";}});
  const [syncSt,setSyncSt]=useState("idle"); // idle | saving | ok | error | loading
  const [showGasModal,setShowGasModal]=useState(false);
  const [showConfig,setShowConfig]=useState(false);
  const [darkTick,setDarkTick]=useState(0);
  const [showUserMenu,setShowUserMenu]=useState(false);
  const [showSearch,setShowSearch]=useState(false); // forces re-render on theme change
  const [config,setConfig]=useState(()=>lsGet("redcom_config",{
    titulo:"Redcom — Sistema de Reparaciones",
    logo:"",
    empresa:"Redcom Servicio Técnico en Cómputo",
    ciudad:"Los Mochis, Sinaloa",
    tel:"",email:"",web:"",
    calle:"",numExt:"",cp:"",pais:"México",estado:"Sinaloa",
    darkMode:false,
    terminos:`• Los precios no incluyen instalación salvo que se especifique.
• Se requiere el 50% de anticipo para iniciar el proyecto.
• Garantía de 90 días en mano de obra. Garantía de fábrica en equipos.
• Redcom no se hace responsable de daños por mal uso del equipo después de la entrega.`
  }));
  const [fbOk,setFbOk]=React.useState(()=>!!window.fbDb);
  React.useEffect(()=>{
    setFbOk(!!window.fbDb);
    const t=setTimeout(()=>setFbOk(!!window.fbDb),2000);
    return()=>clearTimeout(t);
  },[]);
  const [isMobile,setIsMobile]=useState(()=>window.innerWidth<=768);
  React.useEffect(()=>{
    function hk(e){if((e.ctrlKey||e.metaKey)&&e.key==="k"){e.preventDefault();setShowSearch(p=>!p);}if(e.key==="Escape")setShowSearch(false);}
    window.addEventListener("keydown",hk);
    return()=>window.removeEventListener("keydown",hk);
  },[]);

    React.useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<=768);
    window.addEventListener("resize",fn);
    return()=>window.removeEventListener("resize",fn);
  },[]);

  /* ══ FIRESTORE: sincronización en tiempo real ══════════════════════ */
  React.useEffect(()=>{
    if(!window.fbDb) return;
    // Cargar seqs desde Firestore al inicio (para sincronizar contadores)
    fbLoad("redcom_seqs").then(s=>{
      if(!s) return;
      if(s.OTS>OTS)    OTS=s.OTS;
      if(s.PRES>PRES)  PRES=s.PRES;
      if(s.CLISEQ>CLISEQ) CLISEQ=s.CLISEQ;
      if(s.INVSEQ>INVSEQ) INVSEQ=s.INVSEQ;
      if(s.TECSEQ>TECSEQ) TECSEQ=s.TECSEQ;
      if(s.COTSEQ>COTSEQ) COTSEQ=s.COTSEQ;
      if(s.PAGOQ>PAGOQ)   PAGOQ=s.PAGOQ;
      if(s.GARSEQ>GARSEQ) GARSEQ=s.GARSEQ;
    });

    // Listeners en tiempo real — cada colección actualiza el estado local
    const watch=(key,setter)=>window.fbDb.collection(FB_COL).doc(key)
      .onSnapshot({includeMetadataChanges:false}, snap=>{
        if(!snap.exists) return;
        if(snap.metadata.hasPendingWrites) return; // ignorar escrituras locales
        const val=snap.data().data;
        if(!val) return;
        setter(val);
        try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}
      }, err=>console.warn("onSnapshot["+key+"]:",err));

    const unsubs=[
      watch("redcom_ords",   setOrds),
      watch("redcom_cls",    setCls),
      watch("redcom_inv",    setInv),
      watch("redcom_tecs",   setTecs),
      watch("redcom_buds",   setBuds),
      watch("redcom_pagos",  setPagos),
      watch("redcom_cots",   setCots),
      watch("redcom_gars",   setGars),
      watch("redcom_provs",  setProvs),
      watch("redcom_ocs",    setOcs),
      watch("redcom_svcs",   setSvcs),
      watch("redcom_citas",  setCitas),
      watch("redcom_recs",   setRecs),
      watch("redcom_cortes", setCortes),
      watch("redcom_users",  setUsers),
      watch("redcom_config", setConfig),
      watch("redcom_notas",  setNotas),
    ];
    window._fbSyncOk=true;
    return()=>{ unsubs.forEach(u=>u()); window._fbSyncOk=false; };
  },[]); // solo al montar
  React.useEffect(()=>{
    window._syncStatus=setSyncSt;
    if(gas){
      setSyncSt("loading");
      pullFromDrive().then(data=>{

    </aside>

    <!-- MAIN -->
    <main style=${{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
      <!-- GLOBAL TOPBAR — always visible -->
      <div style=${{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 20px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:12}}>
        <div style=${{display:"flex",alignItems:"center",gap:12}}>
          <div style=${{fontWeight:700,fontSize:15,color:"#1e293b"}}>
            ${{"orders":"Órdenes de Trabajo","cal":"Calendario","clients":"Clientes","inv":"Inventario","techs":"Técnicos","cots":"Cotizaciones","caja":"Caja","garantias":"Garantías","dash":"Dashboard","ia":"Asistente IA","servicios":"Servicios","users":"Usuarios","provs":"Proveedores","ocs":"Órdenes de Compra","reportes":"Reportes"}[sec]||""}
          </div>
          <button onClick=${()=>setShowSearch(true)} style=${{
            display:"flex",alignItems:"center",gap:8,padding:"6px 12px",
            borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",
            cursor:"pointer",fontFamily:"inherit",color:"#94a3b8",fontSize:12,
            minWidth:180,transition:"all .15s"}}
            onMouseOver=${e=>{e.currentTarget.style.borderColor="#bfdbfe";e.currentTarget.style.background="#eff6ff";e.currentTarget.style.color="#1d4ed8";}}
            onMouseOut=${e=>{e.currentTarget.style.borderColor="#e2e8f0";e.currentTarget.style.background="#f8fafc";e.currentTarget.style.color="#94a3b8";}}>
            <span style=${{fontSize:13}}>🔍</span>
            <span style=${{flex:1,textAlign:"left"}}>Buscar…</span>
            <kbd style=${{fontSize:9,padding:"1px 5px",borderRadius:4,background:"#e2e8f0",border:"1px solid #cbd5e1",fontFamily:"monospace",color:"#64748b"}}>Ctrl K</kbd>
          </button>
        </div>
        <div style=${{display:"flex",alignItems:"center",gap:8}}>
          <!-- Firebase sync indicator -->
          <div title="Sincronización Firebase" style=${{
            display:"flex",alignItems:"center",gap:4,padding:"4px 8px",
            borderRadius:6,background:fbOk?"#f0fdf4":"#fef2f2",
            border:"1px solid",borderColor:fbOk?"#bbf7d0":"#fca5a5",
            fontSize:10,fontWeight:700,color:fbOk?"#059669":"#dc2626"}}>
            <span style=${{fontSize:11}}>${fbOk?"☁️":"⚠️"}</span>
            <span>${fbOk?"Nube":"Sin nube"}</span>
          </div>
          <!-- Bell -->
          <button onClick=${()=>setShowNotif(p=>!p)} style=${{position:"relative",background:"transparent",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
            <${Ic} n="bell" z=${18} s=${notifCount>0?"#dc2626":"#94a3b8"}/>
            ${notifCount>0&&React.createElement("span",{style:{position:"absolute",top:-4,right:-4,background:"#dc2626",color:"#fff",fontSize:9,fontWeight:800,width:16,height:16,borderRadius:99,display:"flex",alignItems:"center",justifyContent:"center"}},notifCount>9?"9+":notifCount)}
          </button>
          <div style=${{width:1,height:24,background:"#e2e8f0"}}/>
          <!-- User + logout -->
          <div style=${{display:"flex",alignItems:"center",gap:8,padding:"4px 8px",borderRadius:8,background:"#f8fafc",border:"1px solid #e2e8f0"}}>
            <div style=${{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center"}}>
              <${Ic} n="user" z=${13} s="#fff"/>
            </div>
            <div style=${{lineHeight:1.2}}>
              <div style=${{fontSize:11,fontWeight:700,color:"#1e293b"}}>${session.nombre}</div>
              <div style=${{fontSize:9,color:"#94a3b8"}}>${session.rol==="admin"?"Admin":"Técnico"}</div>
            </div>
            <button onClick=${logout} title="Cerrar sesión" style=${{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,padding:"5px 7px",cursor:"pointer",display:"flex",alignItems:"center",marginLeft:4}}>
              <${Ic} n="logout" z=${13} s="#dc2626"/>
            </button>
          </div>
        </div>
      </div>
            ${sec==="orders"&&html`
        <div style=${{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"10px 18px",display:"flex",gap:8,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
          <div style=${{position:"relative",flex:1,minWidth:180,maxWidth:360}}>
            <span style=${{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)"}}><${Ic} n="search" z=${14} s="#94a3b8"/></span>
            <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar folio, cliente, equipo..." style=${{paddingLeft:30}}/>
          </div>
          <select value=${fst} onChange=${e=>setFst(e.target.value)} style=${{width:"auto",minWidth:140}}>
            <option value="Todos">Todos los estados</option>
            ${STS.map(x=>html`<option key=${x.k} value=${x.k}>${x.k}</option>`)}
          </select>
          <div style=${{display:"flex",gap:3,background:"#f1f5f9",borderRadius:7,padding:3}}>
            ${[["list","list"],["kanban","kanban"]].map(([v,ic])=>html`
              <button key=${v} onClick=${()=>setView(v)} style=${{padding:"4px 9px",borderRadius:5,border:"none",cursor:"pointer",
                background:view===v?"#fff":"transparent",boxShadow:view===v?"0 1px 3px rgba(0,0,0,.08)":undefined,
                color:view===v?"#1d4ed8":"#94a3b8",transition:"all .15s"}}>
                <${Ic} n=${ic} z=${15} s=${view===v?"#1d4ed8":"#94a3b8"}/>
              </button>`)}
          </div>
          <button class="btn btn-primary" onClick=${()=>setNewOrd(true)}><${Ic} n="plus" z=${14} s="#fff"/> Nueva Orden</button>
          
        </div>
        <div style=${{flex:1,overflow:"hidden",display:"flex",minHeight:0}}>
          <div style=${{flex:1,overflow:"auto",padding:view==="kanban"?"14px 16px":"0",minWidth:0}}>
            ${view==="list"?html`
              <div>
                <div class="order-hdr">${["Folio","Cliente / Equipo","Estado","Urgencia","Técnico","Ingreso","Total"].map(h=>html`<div key=${h} class="th">${h}</div>`)}</div>
                ${filt.length===0?html`<div class="empty-state"><${Ic} n="search" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin resultados</div></div>`
                :filt.map(o=>{
                  const c=gcl(cls,o.cid),t=tecs.find(x=>x.id===o.tec),bud=Object.values(buds).find(b=>b.oid===o.id),cv=bud?calc(bud.items):null;
                  return html`<div key=${o.id} class=${"order-row"+(sel===o.id?" sel":"")} onClick=${()=>setSel(sel===o.id?null:o.id)}>
                    <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"#1d4ed8",fontWeight:500}}>${o.id}</div>
                    <div><div style=${{fontWeight:600,fontSize:13}}>${c.nombre}</div><div style=${{fontSize:11,color:"#64748b",marginTop:1}}>${o.equipo}</div></div>
                    <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <${SPill} st=${o.est}/>
                      <${UPill} u=${o.urg}/>
                    </div>
                    <div style=${{fontSize:12,color:"#475569"}}>${t?.nombre||"—"}</div>
                    <div style=${{fontSize:11,color:"#94a3b8"}}>${fmtD(o.fecha)}</div>
                    <div style=${{fontSize:12,fontWeight:700,color:cv?"#059669":"#cbd5e1"}}>${cv?mxn(cv.tot):"—"}</div>
                  </div>`;
                })}
              </div>`
            :html`<${Kanban} ords=${filt} cls=${cls} tecs=${tecs} buds=${buds} sel=${sel} onSel=${id=>setSel(sel===id?null:id)} onMv=${(id,st)=>setOrds(p=>{const n=p.map(o=>o.id===id?{...o,est:st}:o);lsSet("redcom_ords",n);return n;})}/>`}
          </div>
          ${sOrd&&html`<div style=${{
              width:isMobile?"100%":"355px",
              flexShrink:0,
              borderLeft:"1px solid #e2e8f0",
              overflowY:"auto",
              position:isMobile?"fixed":"relative",
              inset:isMobile?"0 0 66px 0":"auto",
              zIndex:isMobile?40:"auto",
              background:"#fff"
            }}>
            <${Detail} ord=${sOrd} cli=${sCli} tec=${sTec} bud=${sBud} invItems=${inv}
              onEdit=${o=>setEditOrd(o)} onDel=${delOrd} onBud=${o=>setBudOrd(o)}
              onNotaVenta=${()=>{
                const nv={id:newNVId(),ord:sOrd,cli:sCli,bud:sBud,tecNombre:sTec?.nombre||"—",fecha:new Date().toLocaleDateString("es-MX")};
                addNota(nv);
                printNotaVenta(nv,config);
              }}
              onSt=${(id,st)=>setOrds(p=>{const n=p.map(o=>o.id===id?{...o,est:st}:o);lsSet("redcom_ords",n);return n;})}
              onSaveDiag=${(id,diag,diagCosto)=>setOrds(p=>{const n=p.map(o=>o.id===id?{...o,diag,diagCosto}:o);lsSet("redcom_ords",n);return n;})}
              onPrint=${printTicket}
              onFotos=${id=>setShowFotos(id)}
              onFirma=${id=>setShowFirma(id)}
              onPortal=${o=>{
                const url=portalURL(o.token||"");
                if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>alert("Link copiado: "+url));}
                else{alert("Link portal: "+url);}
              }}/>
          </div>`}
        </div>`}

      ${sec==="clients"&&html`<${ClientsSection} cls=${cls} ords=${ords} pagos=${pagos} gars=${gars} onAdd=${()=>setNewCli(true)} onEdit=${c=>setEditCli(c)} onDel=${delCli}/>`}
      ${sec==="inv"&&html`<${InvSection} inv=${inv} provs=${provs} ocs=${ocs} session=${session} onSaveOC=${saveOC} onAdd=${()=>setNewInv(true)} onEdit=${p=>setEditInv(p)} onDel=${delInv}/>`}
      ${sec==="techs"&&html`<${TecSection} tecs=${tecs} ords=${ords} onAdd=${()=>setNewTec(true)} onEdit=${t=>setEditTec(t)} onDel=${delTec}/>`}
      ${sec==="cots"&&canCotizar&&html`<${CotizacionesSection}
        cots=${cots} cls=${cls} inv=${inv} svcs=${svcs} tecs=${tecs} session=${session}
        onAdd=${()=>setNewCot(true)}
        onEdit=${ct=>setEditCot(ct)}
        onDel=${delCot}
        onPrint=${ct=>{const cli=cls.find(x=>x.id===ct.cid);const tec=tecs.find(x=>x.id===ct.tec);printCotizacion(ct,cli||{nombre:"—"},tec,config);}}
      />`}
      ${sec==="provs"&&isAdmin&&html`<${ProveedoresSection}
        provs=${provs} inv=${inv}
        onAdd=${()=>setNewProv(true)}
        onEdit=${pv=>setEditProv(pv)}
        onDel=${delProv}
        onNewOC=${pv=>{setNewOCPrvInit(pv);setNewOC(true);setSec("ocs");}}/>`}
      ${sec==="ocs"&&isAdmin&&html`<${OCSection}
        ocs=${ocs} provs=${provs} inv=${inv} session=${session}
        onAdd=${()=>setNewOC(true)}
        onEdit=${oc=>setEditOC(oc)}
        onDel=${delOC}
        onPrint=${(oc,pv)=>printOC(oc,pv)}/>`}
      ${sec==="reportes"&&isAdmin&&html`<${ReportesSection}
        ords=${ords} cls=${cls} inv=${inv} tecs=${tecs} svcs=${svcs}
        pagos=${pagos} cots=${cots} gars=${gars} onImportInv=${importInv}/>`}
      ${sec==="caja"&&isAdmin&&html`<${CajaSection}
        pagos=${pagos} cortes=${cortes} ords=${ords} cls=${cls} inv=${inv} session=${session} config=${config}
        onAddPago=${addPago} onCorte=${addCorte} onDelPago=${delPago}/>`}
      ${sec==="garantias"&&isAdmin&&html`<${GarantiasSection}
        gars=${gars} ords=${ords} cls=${cls} tecs=${tecs}
        onAdd=${addGar} onReclamo=${reclamoGar} onDel=${delGar}/>`}
      ${sec==="ia"&&html`<${IASection} inv=${inv} svcs=${svcs} tecs=${tecs}/>`}
      ${sec==="servicios"&&isAdmin&&html`<${ServiciosSection} svcs=${svcs} onAdd=${()=>setNewSvc(true)} onEdit=${s=>setEditSvc(s)} onDel=${delSvc}/>`}
      ${sec==="users"&&isAdmin&&html`<${UsersSection} users=${users} tecs=${tecs} session=${session} onAdd=${()=>setNewUser(true)} onEdit=${u=>setEditUser(u)} onDel=${delUser}/>`}
      ${sec==="dash"&&html`<${Dashboard} ords=${ords} buds=${buds} cls=${cls} tecs=${tecs} notas=${notas} pagos=${pagos} onDelNota=${delNota} onPrintNota=${nv=>printNotaVenta(nv,config)}/>`}
      ${sec==="cal"&&html`<${CalendarioSection} ords=${ords} cls=${cls} tecs=${tecs} citas=${citas} recs=${recs} session=${session} config=${config} onSaveCita=${saveCita} onDelCita=${delCita} onSaveRec=${saveRec} onDelRec=${delRec} onSyncGCal=${syncGCal}/>`}
    </main>

    <!-- MODALS ÓRDENES -->
    ${(showNewOrd||editOrd)&&html`<${OrdModal} cls=${cls} tecs=${tecs} edit=${editOrd} onSave=${saveOrd} onClose=${()=>{setNewOrd(false);setEditOrd(null);}} onPrint=${printTicket}/>`}
    ${budOrd&&html`<${BudModal} ord=${budOrd} cli=${gcl(cls,budOrd.cid)} invItems=${inv} svcItems=${svcs} tarifaMO=${tarifaMO} exist=${Object.values(buds).find(b=>b.oid===budOrd.id)} onSave=${saveBud} onClose=${()=>setBudOrd(null)}/>`}
    <!-- MODALS CLIENTES -->
    ${(showNewCli||editCli)&&html`<${ClientModal} edit=${editCli} onSave=${saveCli} onClose=${()=>{setNewCli(false);setEditCli(null);}}/>`}
    <!-- MODALS INVENTARIO -->
    ${(showNewInv||editInv)&&html`<${InvModal} edit=${editInv} onSave=${saveInv} onClose=${()=>{setNewInv(false);setEditInv(null);}}/>`}
    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav">
      ${NAV_ITEMS.map(({key,lbl,icon})=>html`
        <button key=${key} class=${"bnav-btn"+(sec===key?" active":"")}
          onClick=${()=>{
            if(key==="_more"){setShowMoreMenu(p=>!p);return;}
            setSec(key);setSel(null);setShowMoreMenu(false);
          }}>
          <${Ic} n=${icon} z=${20} s=${sec===key?"#1d4ed8":"#94a3b8"}/>
          ${lbl}
          ${key==="orders"&&ords.filter(o=>o.est!=="Entregado").length>0?html`
            <span style=${{background:"#eff6ff",color:"#1d4ed8",fontSize:8,padding:"0 5px",borderRadius:99,fontWeight:800,lineHeight:"16px"}}>
              ${ords.filter(o=>o.est!=="Entregado").length}
            </span>`:""
          }
          ${key==="_more"&&MORE_ITEMS.some(i=>i.key===sec)?html`
            <span style=${{width:6,height:6,borderRadius:"50%",background:"#1d4ed8",position:"absolute",top:6,right:"calc(50% - 3px)"}}/>`:""
          }
        </button>`)}
    </nav>

    <!-- MÁS MENU overlay -->
    <div class=${"bnav-overlay"+(showMoreMenu?" open":"")} onClick=${()=>setShowMoreMenu(false)}/>
    <div class=${"bnav-more-menu"+(showMoreMenu?" open":"")}>
      <div style=${{padding:"10px 18px 6px",fontSize:11,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1}}>Más secciones</div>
      ${MORE_ITEMS.map(({key,lbl,icon})=>html`
        <div key=${key} class=${"bnav-more-item"+(sec===key?" active":"")}
          onClick=${()=>{setSec(key);setSel(null);setShowMoreMenu(false);}}>
          <${Ic} n=${icon} z=${18} s=${sec===key?"#1d4ed8":"#64748b"}/>
          <span>${lbl}</span>
          ${sec===key?html`<span style=${{marginLeft:"auto",fontSize:11,color:"#1d4ed8"}}>●</span>`:""}
        </div>`)}
    </div>

    <!-- NOTIFICACIONES -->
    ${showSearch&&html`<${GlobalSearch} ords=${ords} cls=${cls} inv=${inv} cots=${cots} onNav=${k=>{setSec(k);setSel(null);}} onClose=${()=>setShowSearch(false)}/>`}
    ${showNotif&&html`<${NotifPanel}
      ords=${ords} inv=${inv} gars=${gars} cls=${cls}
      onClose=${()=>setShowNotif(false)}
      onNavTo=${k=>{setSec(k);setSel(null);setShowNotif(false);}}/>`}
    <!-- FOTOS -->
    ${showFotos&&html`<${FotosModal}
      ord=${ords.find(o=>o.id===showFotos)||{id:showFotos,fotos:[]}}
      onSave=${fotos=>saveFotos(showFotos,fotos)}
      onClose=${()=>setShowFotos(null)}/>`}
    <!-- FIRMA -->
    ${showFirma&&html`<${FirmaModal}
      ord=${ords.find(o=>o.id===showFirma)||{id:showFirma}}
      cli=${cls.find(c=>c.id===(ords.find(o=>o.id===showFirma)?.cid))}
      onSave=${firma=>saveFirma(showFirma,firma)}
      onClose=${()=>setShowFirma(null)}/>`}
    <!-- MODALS PROVEEDORES -->
    ${(newProv||editProv)&&isAdmin&&html`<${ProvModal} edit=${editProv} onSave=${saveProv} onClose=${()=>{setNewProv(false);setEditProv(null);}}/>`}
    <!-- MODALS OC -->
    ${(newOC||editOC)&&isAdmin&&html`<${OCModal}
      edit=${editOC} prvInit=${newOCPrvInit} provs=${provs} inv=${inv} session=${session}
      onSave=${saveOC} onClose=${()=>{setNewOC(false);setEditOC(null);setNewOCPrvInit(null);}}/>`}
    <!-- MODALS COTIZACIONES -->
    ${(newCot||editCot)&&canCotizar&&html`<${CotModal}
      edit=${editCot} cls=${cls} inv=${inv} svcs=${svcs} tecs=${tecs} session=${session} config=${config}
      onSave=${saveCot} onClose=${()=>{setNewCot(false);setEditCot(null);}}/>`}
    <!-- MODALS SERVICIOS -->
    ${(newSvc||editSvc)&&html`<${SvcModal} edit=${editSvc} onSave=${saveSvc} onClose=${()=>{setNewSvc(false);setEditSvc(null);}}/>`}
    <!-- MODALS USUARIOS -->
    ${(showNewUser||editUser)&&html`<${UserModal} edit=${editUser} tecs=${tecs} onSave=${saveUser} onClose=${()=>{setNewUser(false);setEditUser(null);}}/>`}
    <!-- GOOGLE DRIVE -->
    ${showGasModal&&html`<${GasModal} current=${gas} onSave=${v=>{setGas(v);gasUrl=v;}} onClose=${()=>setShowGasModal(false)}/>`}
    <!-- PREFERENCIAS -->
    ${showConfig&&html`<${PreferenciasModal} config=${config} session=${session} users=${users} setUsers=${setUsers} onSave=${saveConfig} onClose=${()=>setShowConfig(false)}/>`}
    <!-- MODALS TÉCNICOS -->
    ${(showNewTec||editTec)&&html`<${TecModal} edit=${editTec} onSave=${saveTec} onClose=${()=>{setNewTec(false);setEditTec(null);}}/>`}
  </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
