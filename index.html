      ${loading&&html`
        <div style=${{display:"flex",gap:10}}>
          <div style=${{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#1d4ed8,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
          <div style=${{background:"#fff",border:"1px solid #e2e8f0",borderRadius:"4px 12px 12px 12px",padding:"12px 16px",display:"flex",gap:4,alignItems:"center"}}>
            ${[0,1,2].map(i=>html`<div key=${i} style=${{width:7,height:7,borderRadius:99,background:"#1d4ed8",
              animation:"pulse 1.2s ease-in-out infinite",animationDelay:(i*0.2)+"s"}}></div>`)}
          </div>
        </div>`}
      <div ref=${endRef}/>
    </div>

    <!-- Sugerencias (solo al inicio) -->
    ${msgs.length<=1&&html`
      <div style=${{padding:"0 20px 10px",flexShrink:0}}>
        <div style=${{fontSize:11,color:"#94a3b8",fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>Preguntas frecuentes</div>
        <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
          ${SUGERENCIAS.map((s,i)=>html`
            <button key=${i} onClick=${()=>send(s)} class="btn btn-ghost btn-sm" style=${{fontSize:11,borderRadius:99}}>
              ${s}
            </button>`)}
        </div>
      </div>`}

    <!-- Input -->
    <div style=${{padding:"12px 20px",borderTop:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}>
      <div style=${{display:"flex",gap:8,alignItems:"flex-end"}}>
        <textarea
          ref=${inputRef}
          value=${input}
          onChange=${e=>setInput(e.target.value)}
          onKeyDown=${e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
          placeholder="Describe el problema o pregunta técnica... (Enter para enviar)"
          rows=${2}
          style=${{flex:1,resize:"none",borderRadius:10,padding:"10px 12px",fontSize:13,lineHeight:1.5,
                   border:"1px solid #e2e8f0",outline:"none",fontFamily:"inherit",
                   background:loading?"#f8fafc":"#fff"}}
          disabled=${loading}
        />
        <button onClick=${()=>send()} disabled=${!input.trim()||loading}
          style=${{width:44,height:44,borderRadius:10,border:"none",cursor:"pointer",
                   background:input.trim()&&!loading?"#1d4ed8":"#e2e8f0",
                   display:"flex",alignItems:"center",justifyContent:"center",
                   transition:"background .15s",flexShrink:0}}>
          <${Ic} n="wa" z=${18} s=${input.trim()&&!loading?"#fff":"#94a3b8"}/>
        </button>
      </div>
      <div style=${{fontSize:10,color:"#94a3b8",marginTop:4}}>Enter para enviar · Shift+Enter para nueva línea</div>
    </div>
  </div>`;
}

/* ══ MODAL COTIZACIÓN ══════════════════════════════════════════════════ */
function CotModal({edit,cls,inv,svcs,tecs,session,config,onSave,onClose}){
  const blank={id:null,cid:"",tec:session?.tecId||"",ref:"",notas:"",validez:15,iva:true,est:"Borrador",items:[],fecha:new Date().toISOString().slice(0,10)};
  const [f,setF]=useState(edit||blank);
  const [tab,setTab]=useState("inv"); // inv | svc | custom
  const [selInv,setSelInv]=useState("");
  const [selSvc,setSelSvc]=useState("");
  const [custNombre,setCN]=useState("");
  const [custCat,setCC]=useState("Videovigilancia IP");
  const [custDesc,setCD]=useState("");
  const [custPrecio,setCP]=useState(0);
  const [qty,setQty]=useState(1);
  const [showWA,setShowWA]=useState(false);

  const sf=k=>e=>setF(p=>({...p,[k]:e.target.type==="checkbox"?e.target.checked:e.target.type==="number"?Number(e.target.value):e.target.value}));
  const sub=f.items.reduce((a,i)=>a+(i.qty*(i.precio||0)),0);
  const iva=f.iva?+(sub*0.16).toFixed(2):0;
  const tot=+(sub+iva).toFixed(2);

  const CATS=["Videovigilancia IP","Videovigilancia Analógica","Cableado Estructurado","Cómputo","Redes","Otro"];
  const CAT_C={
    "Videovigilancia IP":["#eff6ff","#1d4ed8"],
    "Videovigilancia Analógica":["#f5f3ff","#7c3aed"],
    "Cableado Estructurado":["#f0fdf4","#059669"],
    "Cómputo":["#fff7ed","#ea580c"],
    "Redes":["#f0f9ff","#0891b2"],
    "Inventario":["#f8fafc","#475569"],
    "Servicio":["#fdf4ff","#9333ea"],
    "Otro":["#f8fafc","#64748b"]
  };

  function addItem(){
    let item=null;
    if(tab==="inv"){
      const p=inv.find(x=>x.id===selInv); if(!p)return;
      item={id:Date.now()+"",nombre:p.nombre,cat:"Inventario",desc:p.descripcion||"",precio:p.precio,qty:Number(qty),src:"inv",ref:p.id};
    } else if(tab==="svc"){
      const s=svcs.find(x=>x.id===selSvc); if(!s)return;
      item={id:Date.now()+"",nombre:s.nombre,cat:"Servicio",desc:s.desc||"",precio:s.precio,qty:Number(qty),src:"svc",ref:s.id};
    } else {
      if(!custNombre.trim()||custPrecio<=0)return;
      item={id:Date.now()+"",nombre:custNombre,cat:custCat,desc:custDesc,precio:Number(custPrecio),qty:Number(qty),src:"custom"};
    }
    setF(p=>({...p,items:[...p.items,item]}));
    setSelInv("");setSelSvc("");setCN("");setCD("");setCP(0);setQty(1);
  }
  function updQty(id,v){setF(p=>({...p,items:p.items.map(i=>i.id===id?{...i,qty:Math.max(1,Number(v))}:i)}));}
  function updPrecio(id,v){setF(p=>({...p,items:p.items.map(i=>i.id===id?{...i,precio:Math.max(0,Number(v))}:i)}));}
  function rmItem(id){setF(p=>({...p,items:p.items.filter(i=>i.id!==id)}));}

  function save(){
    if(!f.cid){alert("Selecciona un cliente.");return;}
    if(f.items.length===0){alert("Agrega al menos un artículo.");return;}
    const id=f.id||`COT-${String(++COTSEQ).padStart(4,"0")}`;
    onSave({...f,id,sub,iva:f.iva?iva:0,tot});
  }

  const cli=cls.find(x=>x.id===f.cid)||null;
  const tec=tecs.find(x=>x.id===f.tec)||null;

  const ESTS=["Borrador","Enviada","Aceptada","Rechazada"];
  const EST_C={Borrador:["#f1f5f9","#64748b"],Enviada:["#eff6ff","#1d4ed8"],Aceptada:["#f0fdf4","#059669"],Rechazada:["#fef2f2","#dc2626"]};

  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:780}} onClick=${e=>e.stopPropagation()}>

      <!-- Header -->
      <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style=${{fontSize:17,fontWeight:700}}>${f.id||"Nueva Cotización"}</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:1}}>Sistema de cotizaciones Redcom</div>
        </div>
        <div style=${{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          ${ESTS.map(x=>html`<button key=${x} onClick=${()=>setF(p=>({...p,est:x}))} style=${{
            padding:"3px 11px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",border:"1.5px solid",
            borderColor:f.est===x?EST_C[x][1]:"#e2e8f0",background:f.est===x?EST_C[x][0]:"#fff",
            color:EST_C[x][1]}}>${x}</button>`)}
          <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
        </div>
      </div>

      <div style=${{padding:"18px 24px",display:"grid",gap:14,overflowY:"auto",maxHeight:"75vh"}}>

        <!-- Datos generales -->
        <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
          <div><label>Cliente *</label>
            <select value=${f.cid} onChange=${sf("cid")}>
              <option value="">— Seleccionar cliente —</option>
              ${cls.map(cl=>html`<option key=${cl.id} value=${cl.id}>${cl.nombre}${cl.empresa?" · "+cl.empresa:""}</option>`)}
            </select></div>
          <div><label>Técnico / Asesor</label>
            <select value=${f.tec} onChange=${sf("tec")}>
              <option value="">— Sin asignar —</option>
              ${tecs.filter(t=>t.activo&&t.rol!=="Sistema").map(t=>html`<option key=${t.id} value=${t.id}>${t.nombre}</option>`)}
            </select></div>
          <div><label>Fecha</label><input type="date" value=${f.fecha} onChange=${sf("fecha")}/></div>
          <div><label>Válida (días)</label><input type="number" min="1" max="365" value=${f.validez} onChange=${sf("validez")}/></div>
          <div><label>Referencia / Proyecto</label><input value=${f.ref} onChange=${sf("ref")} placeholder="ej. Proyecto CCTV Bodega"/></div>
          <div style=${{display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
            <label>
              <input type="checkbox" checked=${f.iva} onChange=${sf("iva")} style=${{width:"auto",marginRight:6}}/>
              Aplicar IVA 16%
            </label>
          </div>
        </div>
        <div><label>Notas internas</label><input value=${f.notas} onChange=${sf("notas")} placeholder="ej. Cliente prefiere marcas Hikvision"/></div>

        <!-- Agregar artículos — tabs -->
        <div style=${{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
          <!-- Tab bar -->
          <div style=${{display:"flex",borderBottom:"1px solid #e2e8f0",background:"#fff"}}>
            ${[["inv","📦 Inventario"],["svc","🔧 Servicios"],["custom","✏️ Artículo libre"]].map(([k,lbl])=>html`
              <button key=${k} onClick=${()=>setTab(k)} style=${{
                flex:1,padding:"9px 4px",border:"none",cursor:"pointer",fontFamily:"inherit",
                fontSize:12,fontWeight:700,background:tab===k?"#eff6ff":"transparent",
                color:tab===k?"#1d4ed8":"#64748b",borderBottom:tab===k?"2px solid #1d4ed8":"2px solid transparent"}}>
                ${lbl}
              </button>`)}
          </div>
          <div style=${{padding:"14px 16px"}}>
            ${tab==="inv"&&html`<div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
              <div style=${{flex:1,minWidth:200}}><label>Artículo del inventario</label>
                <select value=${selInv} onChange=${e=>setSelInv(e.target.value)}>
                  <option value="">— Seleccionar —</option>
                  ${inv.map(p=>html`<option key=${p.id} value=${p.id}>[${p.cat}] ${p.nombre} — ${mxn(p.precio)}</option>`)}
                </select></div>
              <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
              <button class="btn btn-primary" onClick=${addItem} disabled=${!selInv}>+ Agregar</button>
            </div>`}
            ${tab==="svc"&&html`<div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
              <div style=${{flex:1,minWidth:200}}><label>Servicio del catálogo</label>
                <select value=${selSvc} onChange=${e=>setSelSvc(e.target.value)}>
                  <option value="">— Seleccionar —</option>
                  ${(svcs||[]).filter(s=>s.activo).map(s=>html`<option key=${s.id} value=${s.id}>[${s.cat}] ${s.nombre} — ${mxn(s.precio)}</option>`)}
                </select></div>
              <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
              <button class="btn btn-primary" onClick=${addItem} disabled=${!selSvc}>+ Agregar</button>
            </div>`}
            ${tab==="custom"&&html`<div style=${{display:"grid",gap:8}}>
              <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><label>Nombre del artículo *</label><input value=${custNombre} onChange=${e=>setCN(e.target.value)} placeholder="ej. Cámara Hikvision 2MP IR"/></div>
                <div><label>Categoría</label>
                  <select value=${custCat} onChange=${e=>setCC(e.target.value)}>
                    ${CATS.map(x=>html`<option key=${x}>${x}</option>`)}
                  </select></div>
              </div>
              <div><label>Descripción breve</label><input value=${custDesc} onChange=${e=>setCD(e.target.value)} placeholder="ej. Resolución 1080p, visión nocturna 30m"/></div>
              <div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
                <div style=${{flex:1,minWidth:100}}><label>Precio unitario *</label><input type="number" min="0" step="10" value=${custPrecio} onChange=${e=>setCP(e.target.value)}/></div>
                <div style=${{width:72}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
                <button class="btn btn-primary" onClick=${addItem} disabled=${!custNombre.trim()||custPrecio<=0}>+ Agregar</button>
              </div>
            </div>`}
          </div>
        </div>

        <!-- Desglose de ítems -->
        ${f.items.length>0?html`
          <div>
            <div style=${{fontWeight:700,fontSize:13,marginBottom:8}}>Desglose · ${f.items.length} concepto${f.items.length!==1?"s":""}</div>
            <div style=${{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
              ${f.items.map(it=>{
                const cc=CAT_C[it.cat]||CAT_C["Otro"];
                return html`<div key=${it.id} style=${{display:"grid",gridTemplateColumns:"1fr 80px 110px 110px 36px",gap:8,padding:"9px 12px",borderBottom:"1px solid #f1f5f9",alignItems:"center"}}>
                  <div>
                    <div style=${{display:"flex",alignItems:"center",gap:6}}>
                      <span style=${{background:cc[0],color:cc[1],fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:99,whiteSpace:"nowrap"}}>${it.cat}</span>
                      <span style=${{fontWeight:600,fontSize:13}}>${it.nombre}</span>
                    </div>
                    ${it.desc&&html`<div style=${{fontSize:11,color:"#94a3b8",marginTop:2}}>${it.desc}</div>`}
                  </div>
                  <input type="number" min="1" value=${it.qty} onChange=${e=>updQty(it.id,e.target.value)}
                    style=${{textAlign:"center",padding:"4px 6px",fontSize:12}}/>
                  <input type="number" min="0" step="10" value=${it.precio} onChange=${e=>updPrecio(it.id,e.target.value)}
                    style=${{textAlign:"right",padding:"4px 6px",fontSize:12}}/>
                  <div style=${{textAlign:"right",fontWeight:700,fontSize:13,color:"#1e293b"}}>${mxn(it.qty*it.precio)}</div>
                  <button onClick=${()=>rmItem(it.id)} style=${{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:18,lineHeight:1}}>×</button>
                </div>`;
              })}
              <div style=${{background:"#f8fafc",padding:"10px 14px",display:"flex",justifyContent:"flex-end",gap:20,flexWrap:"wrap"}}>
                <span style=${{fontSize:12,color:"#475569"}}>Subtotal: <b>${mxn(sub)}</b></span>
                ${f.iva&&html`<span style=${{fontSize:12,color:"#475569"}}>IVA 16%: <b>${mxn(iva)}</b></span>`}
                <span style=${{fontSize:16,fontWeight:800,color:"#1d4ed8"}}>TOTAL: ${mxn(tot)}</span>
              </div>
            </div>
          </div>`
        :html`<div style=${{textAlign:"center",padding:24,color:"#94a3b8",background:"#f8fafc",borderRadius:8,border:"1px dashed #e2e8f0",fontSize:13}}>
          Agrega artículos para crear la cotización
        </div>`}
      </div>

      <!-- Footer -->
      <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style=${{display:"flex",gap:6}}>
          ${f.items.length>0&&cli&&html`<button class="btn btn-ghost" onClick=${()=>printCotizacion({...f,sub,tot},cli,tec)}>
            <${Ic} n="print" z=${14}/> Vista previa
          </button>`}
          ${f.items.length>0&&cli?.tel&&html`<button class="btn btn-success" onClick=${()=>setShowWA(true)}>
            <${Ic} n="wa" z=${14} s="#059669"/> WhatsApp
          </button>`}
        </div>
        <div style=${{display:"flex",gap:8}}>
          <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
          <button class="btn btn-primary" onClick=${save} disabled=${!f.cid||f.items.length===0}>
            <${Ic} n="ok" z=${14} s="#fff"/> ${f.id?"Guardar cambios":"Crear cotización"}
          </button>
        </div>
      </div>

      ${showWA&&cli&&html`<div class="modal-bg" onClick=${()=>setShowWA(false)}>
        <div class="modal fade-in" style=${{maxWidth:480}} onClick=${e=>e.stopPropagation()}>
          <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between"}}>
            <h3 style=${{fontSize:15,fontWeight:700}}>Enviar por WhatsApp</h3>
            <button class="btn btn-ghost btn-sm" onClick=${()=>setShowWA(false)}><${Ic} n="x" z=${14}/></button>
          </div>
          <div style=${{padding:"16px 24px"}}>
            <div style=${{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:12,fontSize:11,fontFamily:"'IBM Plex Mono',monospace",whiteSpace:"pre-wrap",lineHeight:1.6,maxHeight:220,overflowY:"auto"}}>
              ${buildCotWAMsg({...f,sub,tot},cli,tec)}
            </div>
          </div>
          <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"flex-end",gap:8}}>
            <button class="btn btn-ghost" onClick=${()=>setShowWA(false)}>Cancelar</button>
            <button class="btn btn-success" onClick=${()=>{
              const msg=buildCotWAMsg({...f,sub,tot},cli,tec);
              const tel=fmtTelWA(cli.tel);
              window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg),"_blank");
              setShowWA(false);
            }}><${Ic} n="wa" z=${14} s="#059669"/> Abrir WhatsApp</button>
          </div>
        </div>
      </div>`}
    </div>
  </div>`;
}

/* ══ SECCIÓN COTIZACIONES ═══════════════════════════════════════════════ */
function CotizacionesSection({cots,cls,inv,svcs,tecs,session,config,onAdd,onEdit,onDel,onPrint}){
  const [q,setQ]=useState("");
  const [estF,setEstF]=useState("Todos");
  const [confirm,setConfirm]=useState(null);
  const ESTS=["Todos","Borrador","Enviada","Aceptada","Rechazada"];
  const EST_C={Borrador:["#f1f5f9","#64748b"],Enviada:["#eff6ff","#1d4ed8"],Aceptada:["#f0fdf4","#059669"],Rechazada:["#fef2f2","#dc2626"]};
  const filt=cots.filter(ct=>{
    const cli=cls.find(x=>x.id===ct.cid);
    const mq=!q||ct.id.toLowerCase().includes(q.toLowerCase())||(cli?.nombre||"").toLowerCase().includes(q.toLowerCase())||(ct.ref||"").toLowerCase().includes(q.toLowerCase());
    const me=estF==="Todos"||ct.est===estF;
    return mq&&me;
  });
  const totalAcep=cots.filter(ct=>ct.est==="Aceptada").reduce((a,ct)=>a+ct.tot,0);

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <!-- Header -->
    <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}>
      <div class="section-header">
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Cotizaciones</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:2}}>${cots.length} total · Aceptadas: <b style=${{color:"#059669"}}>${mxn(totalAcep)}</b></div>
        </div>
        <button class="btn btn-primary" onClick=${onAdd}><${Ic} n="plus" z=${14} s="#fff"/> Nueva cotización</button>
      </div>
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div class="search-bar" style=${{maxWidth:280}}>
          <span class="search-icon"><${Ic} n="search" z=${14} s="#94a3b8"/></span>
          <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar folio, cliente, referencia..."/>
        </div>
        <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
          ${ESTS.map(x=>html`<button key=${x} onClick=${()=>setEstF(x)} class="btn btn-sm" style=${{
            background:estF===x?(EST_C[x]||EST_C["Borrador"])[0]:"#f8fafc",
            color:(EST_C[x]||EST_C["Borrador"])[1],
            border:`1px solid ${estF===x?(EST_C[x]||EST_C["Borrador"])[1]:"#e2e8f0"}`}}>${x}</button>`)}
        </div>
      </div>
    </div>

    <!-- Lista -->
    <div style=${{flex:1,overflowY:"auto"}}>
      ${filt.length===0
        ?html`<div class="empty-state"><${Ic} n="box" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin cotizaciones${estF!=="Todos"?" con estado "+estF:""}</div></div>`
        :html`
          <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"110px 1fr 120px 80px 110px 120px 100px"}}>
            ${["Folio","Cliente / Referencia","Técnico","Ítems","Total","Estado",""].map(h=>html`<div key=${h}>${h}</div>`)}
          </div>
          ${filt.map(ct=>{
            const cli=cls.find(x=>x.id===ct.cid);
            const tec=tecs.find(x=>x.id===ct.tec);
            const ec=EST_C[ct.est]||EST_C["Borrador"];
            return html`<div key=${ct.id} class="tbl-row" style=${{display:"grid",gridTemplateColumns:"110px 1fr 120px 80px 110px 120px 100px"}}>
              <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"#1d4ed8",fontWeight:600}}>${ct.id}</div>
              <div>
                <div style=${{fontWeight:600,fontSize:13}}>${cli?.nombre||"—"}</div>
                <div style=${{fontSize:11,color:"#94a3b8"}}>${ct.ref||fmtD(ct.fecha)}</div>
              </div>
              <div style=${{fontSize:12,color:"#475569"}}>${tec?.nombre||"—"}</div>
              <div style=${{fontSize:12,color:"#475569",textAlign:"center"}}>${ct.items?.length||0}</div>
              <div style=${{fontWeight:700,fontSize:13,color:"#1e293b"}}>${mxn(ct.tot)}</div>
              <div><span style=${{background:ec[0],color:ec[1],padding:"2px 10px",borderRadius:99,fontSize:11,fontWeight:700}}>${ct.est}</span></div>
              <div style=${{display:"flex",gap:3,padding:"9px 6px",justifyContent:"flex-end"}}>
                <button class="btn btn-ghost btn-sm" title="Imprimir" onClick=${()=>onPrint(ct)}><${Ic} n="print" z=${12}/></button>

}

/* ══ MODAL FIRMA DIGITAL ═════════════════════════════════════════════════ */
function FirmaModal({ord,cli,onSave,onClose}){
  const canvasRef=React.useRef();
  const [drawing,setDrawing]=useState(false);
  const [signed,setSigned]=useState(false);
  const [nombre,setNombre]=useState(cli?.nombre||"");
  const lastPos=React.useRef({x:0,y:0});

  function getPos(e,canvas){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    if(e.touches){return{x:(e.touches[0].clientX-rect.left)*scaleX,y:(e.touches[0].clientY-rect.top)*scaleY};}
    return{x:(e.clientX-rect.left)*scaleX,y:(e.clientY-rect.top)*scaleY};
  }

  function startDraw(e){
    e.preventDefault();
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const pos=getPos(e,canvas);
    ctx.beginPath();ctx.moveTo(pos.x,pos.y);
    lastPos.current=pos;
    setDrawing(true);setSigned(true);
  }

  function draw(e){
    e.preventDefault();
    if(!drawing) return;
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const pos=getPos(e,canvas);
    ctx.lineWidth=2.5;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#1d4ed8";
    ctx.lineTo(pos.x,pos.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pos.x,pos.y);
    lastPos.current=pos;
  }

  function endDraw(e){e.preventDefault();setDrawing(false);}

  function clear(){
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);
    setSigned(false);
  }

  function save(){
    if(!signed){alert("Por favor dibuja tu firma.");return;}
    if(!nombre.trim()){alert("Ingresa el nombre del que recibe.");return;}
    const canvas=canvasRef.current;
    const base64=canvas.toDataURL("image/png");
    onSave({base64,nombre,fecha:new Date().toISOString().slice(0,10),hora:new Date().toTimeString().slice(0,5)});
  }

  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:500}} onClick=${e=>e.stopPropagation()}>
      <div style=${{padding:"18px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style=${{fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:8}}><${Ic} n="sign" z=${18} s="#059669"/> Firma de entrega — ${ord.id}</h2>
        <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
      </div>
      <div style=${{padding:"20px 24px",display:"grid",gap:14}}>
        <div style=${{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#065f46"}}>
          ✓ El cliente firma al recibir su equipo. Queda registrado como evidencia en la orden.
        </div>
        <div><label>Nombre de quien recibe *</label>
          <input value=${nombre} onChange=${e=>setNombre(e.target.value)} placeholder="Nombre completo del cliente"/></div>
        <div>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <label style=${{margin:0}}>Firma *</label>
            <button class="btn btn-ghost btn-sm" onClick=${clear} style=${{fontSize:11}}>✕ Limpiar</button>
          </div>
          <canvas ref=${canvasRef} width=${440} height=${180}
            style=${{width:"100%",height:180,border:"2px solid #e2e8f0",borderRadius:10,background:"#fafafa",cursor:"crosshair",touchAction:"none"}}
            onMouseDown=${startDraw} onMouseMove=${draw} onMouseUp=${endDraw} onMouseLeave=${endDraw}
            onTouchStart=${startDraw} onTouchMove=${draw} onTouchEnd=${endDraw}/>
          ${!signed&&html`<div style=${{textAlign:"center",fontSize:11,color:"#94a3b8",marginTop:4}}>↑ Dibuja la firma aquí con el mouse o dedo</div>`}
        </div>
        <div style=${{fontSize:11,color:"#94a3b8"}}>
          Fecha: ${new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"})} · ${new Date().toTimeString().slice(0,5)}
        </div>
      </div>
      <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"flex-end",gap:8}}>
        <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
        <button class="btn btn-primary" style=${{background:"#059669",borderColor:"#059669"}} onClick=${save}>
          <${Ic} n="sign" z=${14} s="#fff"/> Confirmar entrega con firma
        </button>
      </div>
    </div>
  </div>`;
}

  return html`<div class="modal-bg" onClick=${onClose}>

        <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
      </div>
      <div style=${{padding:"20px 24px",display:"grid",gap:12,overflowY:"auto",maxHeight:"72vh"}}>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Nombre *</label><input value=${f.nombre} onChange=${sf("nombre")} placeholder="ej. ctonline.mx"/></div>
          <div><label>Contacto</label><input value=${f.contacto} onChange=${sf("contacto")} placeholder="ej. Ventas TVC"/></div>

        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Teléfono</label><input value=${f.tel} onChange=${sf("tel")} placeholder="800-000-0000"/></div>
          <div><label>Correo</label><input type="email" value=${f.email} onChange=${sf("email")} placeholder="ventas@proveedor.mx"/></div>
        </div>
        <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label>Sitio web</label><input value=${f.web} onChange=${sf("web")} placeholder="https://..."/></div>
          <div><label>Condiciones de pago</label><input value=${f.condPago} onChange=${sf("condPago")} placeholder="ej. Crédito 30 días"/></div>

          <div style=${{display:"flex",flexWrap:"wrap",gap:6}}>
            ${ALL_CATS.map(cat=>html`<button key=${cat} onClick=${()=>toggleCat(cat)} style=${{
              padding:"4px 12px",borderRadius:99,fontSize:11,fontWeight:600,cursor:"pointer",border:"1.5px solid",
              borderColor:f.cats.includes(cat)?"#1d4ed8":"#e2e8f0",
              background:f.cats.includes(cat)?"#eff6ff":"#fff",
              color:f.cats.includes(cat)?"#1d4ed8":"#64748b"}}>${cat}</button>`)}
          </div>
        </div>
        <div><label>Notas</label><textarea value=${f.notas} onChange=${sf("notas")} rows=${2} placeholder="Notas internas sobre el proveedor..."/></div>
        <div style=${{display:"flex",alignItems:"center",gap:8}}>
          <input type="checkbox" checked=${f.activo} onChange=${e=>setF(p=>({...p,activo:e.target.checked}))} style=${{width:"auto"}}/>
          <label style=${{margin:0,fontWeight:600,fontSize:12}}>Proveedor activo</label>
        </div>
      </div>
      <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"flex-end",gap:8}}>
        <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
        <button class="btn btn-primary" onClick=${save}><${Ic} n="ok" z=${14} s="#fff"/> ${edit?"Guardar":"Crear proveedor"}</button>
      </div>
    </div>
  </div>`;
}

function OCSection({ocs,provs,inv,session,onAdd,onEdit,onDel,onPrint}){
  const [q,setQ]=useState("");
  const [estF,setEstF]=useState("Todos");
  const [confirm,setConfirm]=useState(null);
  const ESTS=["Todos","Borrador","Enviada","Recibida","Cancelada"];
  const EST_C={Borrador:["#f1f5f9","#64748b"],Enviada:["#eff6ff","#1d4ed8"],Recibida:["#f0fdf4","#059669"],Cancelada:["#fef2f2","#dc2626"]};
  const filt=ocs.filter(oc=>{
    const pv=provs.find(p=>p.id===oc.prvId);
    const mq=!q||oc.id.toLowerCase().includes(q.toLowerCase())||(pv?.nombre||"").toLowerCase().includes(q.toLowerCase());
    const me=estF==="Todos"||oc.est===estF;
    return mq&&me;
  });

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}>
      <div class="section-header">
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Órdenes de Compra</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:2}}>${ocs.length} total · Pendientes: <b style=${{color:"#1d4ed8"}}>${ocs.filter(o=>o.est==="Enviada").length}</b></div>
        </div>
        <button class="btn btn-primary" onClick=${()=>onAdd(null)}><${Ic} n="plus" z=${14} s="#fff"/> Nueva OC</button>
      </div>
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div class="search-bar" style=${{maxWidth:260}}>
          <span class="search-icon"><${Ic} n="search" z=${14} s="#94a3b8"/></span>
          <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar OC, proveedor..."/>
        </div>
        <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
          ${ESTS.map(x=>html`<button key=${x} onClick=${()=>setEstF(x)} class="btn btn-sm" style=${{
            background:estF===x?(EST_C[x]||EST_C["Borrador"])[0]:"#f8fafc",
            color:(EST_C[x]||EST_C["Borrador"])[1],
            border:`1px solid ${estF===x?(EST_C[x]||EST_C["Borrador"])[1]:"#e2e8f0"}`}}>${x}</button>`)}
        </div>
      </div>
    </div>
    <div style=${{flex:1,overflowY:"auto"}}>
      ${filt.length===0
        ?html`<div class="empty-state"><${Ic} n="truck" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin órdenes de compra</div></div>`
        :html`
          <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"110px 1fr 130px 80px 120px 120px 100px"}}>
            ${["Folio","Proveedor","Fecha","Ítems","Total","Estado",""].map(h=>html`<div key=${h}>${h}</div>`)}
          </div>
          ${filt.map(oc=>{
            const pv=provs.find(p=>p.id===oc.prvId);
            const ec=EST_C[oc.est]||EST_C["Borrador"];
            const tot=oc.items.reduce((a,i)=>a+(i.qty*(i.precCosto||0)),0);
            return html`<div key=${oc.id} class="tbl-row" style=${{display:"grid",gridTemplateColumns:"110px 1fr 130px 80px 120px 120px 100px"}}>
              <div style=${{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,color:"#1d4ed8",fontWeight:600}}>${oc.id}</div>
              <div>
                <div style=${{fontWeight:600,fontSize:13}}>${pv?.nombre||"—"}</div>
                ${oc.notas&&html`<div style=${{fontSize:11,color:"#94a3b8"}}>${oc.notas}</div>`}
              </div>
              <div style=${{fontSize:12}}>${fmtD(oc.fecha)}</div>
              <div style=${{fontSize:13,textAlign:"center"}}>${oc.items.length}</div>
              <div style=${{fontWeight:700,fontSize:13}}>${mxn(tot)}</div>
              <div><span style=${{background:ec[0],color:ec[1],padding:"2px 9px",borderRadius:99,fontSize:11,fontWeight:700}}>${oc.est}</span></div>
              <div style=${{display:"flex",gap:3,padding:"9px 6px",justifyContent:"flex-end"}}>
                <button class="btn btn-ghost btn-sm" title="Imprimir" onClick=${()=>onPrint(oc,pv)}><${Ic} n="print" z=${12}/></button>
                <button class="btn btn-ghost btn-sm" title="Editar" onClick=${()=>onEdit(oc)}><${Ic} n="edit" z=${12}/></button>
                <button class="btn btn-danger btn-sm" onClick=${()=>setConfirm(oc)}><${Ic} n="trash" z=${12} s="#dc2626"/></button>
              </div>
            </div>`;
          })}`}
    </div>
    ${confirm&&html`<${Confirm}
      msg=${"¿Eliminar la OC <b>"+confirm.id+"</b>?"}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}

function OCModal({edit,prvInit,provs,inv,session,onSave,onClose}){
  const blank={id:null,prvId:prvInit?.id||"",fecha:new Date().toISOString().slice(0,10),est:"Borrador",notas:"",items:[]};
  const [f,setF]=useState(edit||blank);
  const [selInv,setSelInv]=useState("");
  const [custNom,setCN]=useState("");
  const [custPrecio,setCP]=useState(0);
  const [qty,setQty]=useState(1);
  const sf=k=>e=>setF(p=>({...p,[k]:e.target.value}));
  const ESTS=["Borrador","Enviada","Recibida","Cancelada"];
  const EST_C={Borrador:["#f1f5f9","#64748b"],Enviada:["#eff6ff","#1d4ed8"],Recibida:["#f0fdf4","#059669"],Cancelada:["#fef2f2","#dc2626"]};
  const tot=f.items.reduce((a,i)=>a+(i.qty*(i.precCosto||0)),0);

  // Suggest low-stock items
  const lowStock=inv.filter(i=>i.stock<=3);

  function addFromInv(){
    const p=inv.find(x=>x.id===selInv); if(!p) return;
    if(f.items.find(i=>i.invId===p.id)){setSelInv("");return;}
    setF(prev=>({...prev,items:[...prev.items,{id:Date.now()+"",invId:p.id,nombre:p.nombre,cat:p.cat,precCosto:p.costo||0,qty:Number(qty)}]}));
    setSelInv(""); setQty(1);
  }
  function addCustom(){
    if(!custNom.trim()) return;
    setF(prev=>({...prev,items:[...prev.items,{id:Date.now()+"",nombre:custNom,cat:"Otro",precCosto:Number(custPrecio),qty:Number(qty)}]}));
    setCN(""); setCP(0); setQty(1);
  }
  function updItem(id,k,v){setF(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:Number(v)}:i)}));}
  function rmItem(id){setF(p=>({...p,items:p.items.filter(i=>i.id!==id)}));}
  function save(){
    if(!f.prvId){alert("Selecciona un proveedor.");return;}
    if(f.items.length===0){alert("Agrega al menos un artículo.");return;}
    onSave({...f,id:f.id||`OC-${String(++OCMPSEQ).padStart(4,"0")}`});
  }

  return html`<div class="modal-bg" onClick=${onClose}>
    <div class="modal fade-in" style=${{maxWidth:720}} onClick=${e=>e.stopPropagation()}>
      <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div>
          <h2 style=${{fontSize:16,fontWeight:700}}>${f.id||"Nueva Orden de Compra"}</h2>
          <div style=${{fontSize:11,color:"#94a3b8",marginTop:1}}>Orden de compra a proveedor</div>
        </div>
        <div style=${{display:"flex",gap:6,flexWrap:"wrap"}}>
          ${ESTS.map(x=>html`<button key=${x} onClick=${()=>setF(p=>({...p,est:x}))} style=${{
            padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:700,cursor:"pointer",border:"1.5px solid",
            borderColor:f.est===x?EST_C[x][1]:"#e2e8f0",background:f.est===x?EST_C[x][0]:"#fff",
            color:EST_C[x][1]}}>${x}</button>`)}
          <button class="btn btn-ghost btn-sm" onClick=${onClose}><${Ic} n="x" z=${14}/></button>
        </div>
      </div>
      <div style=${{padding:"18px 24px",display:"grid",gap:14,overflowY:"auto",maxHeight:"72vh"}}>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
          <div><label>Proveedor *</label>
            <select value=${f.prvId} onChange=${sf("prvId")}>
              <option value="">— Seleccionar —</option>
              ${provs.filter(p=>p.activo).map(p=>html`<option key=${p.id} value=${p.id}>${p.nombre}</option>`)}
            </select></div>
          <div><label>Fecha</label><input type="date" value=${f.fecha} onChange=${sf("fecha")}/></div>
          <div><label>Notas / Referencia</label><input value=${f.notas} onChange=${sf("notas")} placeholder="ej. Reposición mensual"/></div>
        </div>

        ${lowStock.length>0&&html`
          <div style=${{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:10,padding:"10px 14px"}}>
            <div style=${{fontSize:11,fontWeight:700,color:"#9a3412",marginBottom:6}}>⚠️ Artículos con stock bajo — haz clic para agregar</div>
            <div style=${{display:"flex",flexWrap:"wrap",gap:6}}>
              ${lowStock.map(p=>html`<button key=${p.id} onClick=${()=>{
                if(f.items.find(i=>i.invId===p.id)) return;
                setF(prev=>({...prev,items:[...prev.items,{id:Date.now()+"",invId:p.id,nombre:p.nombre,cat:p.cat,precCosto:p.costo||0,qty:1}]}));
              }} style=${{padding:"3px 10px",fontSize:11,borderRadius:99,border:"1px solid #fed7aa",background:"#fff",cursor:"pointer",color:"#9a3412",fontWeight:600}}>
                ${p.nombre} (${p.stock} uds)
              </button>`)}
            </div>
          </div>`}

        <div style=${{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,overflow:"hidden"}}>
          <div style=${{display:"flex",borderBottom:"1px solid #e2e8f0",background:"#fff"}}>
            <div style=${{padding:"10px 16px",fontSize:12,fontWeight:700,color:"#1e293b"}}>Agregar artículos</div>
          </div>
          <div style=${{padding:"14px 16px",display:"grid",gap:10}}>
            <div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
              <div style=${{flex:1,minWidth:180}}><label>Del inventario</label>
                <select value=${selInv} onChange=${e=>setSelInv(e.target.value)}>
                  <option value="">— Seleccionar artículo —</option>
                  ${inv.map(p=>html`<option key=${p.id} value=${p.id}>[${p.cat}] ${p.nombre} — costo: ${mxn(p.costo||0)}</option>`)}
                </select></div>
              <div style=${{width:70}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
              <button class="btn btn-primary" onClick=${addFromInv} disabled=${!selInv}>+ Agregar</button>
            </div>
            <div style=${{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap",paddingTop:8,borderTop:"1px solid #e2e8f0"}}>
              <div style=${{flex:1,minWidth:160}}><label>Artículo libre</label>
                <input value=${custNom} onChange=${e=>setCN(e.target.value)} placeholder="Nombre del artículo"/></div>
              <div style=${{width:100}}><label>Precio costo</label>
                <input type="number" min="0" value=${custPrecio} onChange=${e=>setCP(e.target.value)}/></div>
              <div style=${{width:70}}><label>Cant.</label><input type="number" min="1" value=${qty} onChange=${e=>setQty(e.target.value)}/></div>
              <button class="btn btn-ghost" onClick=${addCustom} disabled=${!custNom.trim()}>+ Agregar</button>
            </div>
          </div>
        </div>

        ${f.items.length>0&&html`
          <div>
            <div style=${{fontWeight:700,fontSize:13,marginBottom:8}}>Artículos · ${f.items.length} concepto${f.items.length!==1?"s":""}</div>
            <div style=${{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
              ${f.items.map(it=>html`<div key=${it.id} style=${{display:"grid",gridTemplateColumns:"1fr 80px 110px 110px 36px",gap:8,padding:"9px 12px",borderBottom:"1px solid #f1f5f9",alignItems:"center"}}>
                <div>
                  <div style=${{fontWeight:600,fontSize:13}}>${it.nombre}</div>
                  <div style=${{fontSize:10,color:"#94a3b8"}}>${it.cat}</div>
                </div>
                <input type="number" min="1" value=${it.qty} onChange=${e=>updItem(it.id,"qty",e.target.value)} style=${{textAlign:"center",padding:"4px 6px",fontSize:12}}/>
                <input type="number" min="0" step="10" value=${it.precCosto} onChange=${e=>updItem(it.id,"precCosto",e.target.value)} style=${{textAlign:"right",padding:"4px 6px",fontSize:12}}/>
                <div style=${{textAlign:"right",fontWeight:700,fontSize:13}}>${mxn(it.qty*it.precCosto)}</div>
                <button onClick=${()=>rmItem(it.id)} style=${{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:18}}>×</button>
              </div>`)}
              <div style=${{background:"#f8fafc",padding:"10px 14px",display:"flex",justifyContent:"flex-end"}}>
                <span style=${{fontSize:16,fontWeight:800,color:"#1d4ed8"}}>TOTAL: ${mxn(tot)}</span>
              </div>
            </div>
          </div>`}
      </div>
      <div style=${{padding:"14px 24px",borderTop:"1px solid #e2e8f0",display:"flex",justifyContent:"flex-end",gap:8}}>
        <button class="btn btn-ghost" onClick=${onClose}>Cancelar</button>
        <button class="btn btn-primary" onClick=${save} disabled=${!f.prvId||f.items.length===0}>
          <${Ic} n="ok" z=${14} s="#fff"/> ${f.id?"Guardar":"Crear OC"}
        </button>
      </div>
    </div>
  </div>`;
}

    table{width:100%;border-collapse:collapse}thead tr{background:#1d4ed8;color:#fff}thead th{padding:9px 10px;font-size:11px;text-transform:uppercase;text-align:left}
    .total{text-align:right;font-size:20px;font-weight:800;color:#1d4ed8;margin-top:12px}
    @media print{body{padding:16px}.noprint{display:none}}

  <div class="noprint" style="text-align:right;margin-bottom:16px"><button onclick="window.print()" style="background:#1d4ed8;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer">🖨️ Imprimir</button></div>
  <div class="header">
    <div><div style="font-size:20px;font-weight:900">REDCOM</div><div style="font-size:11px;color:#64748b">Orden de Compra</div></div>
    <div style="text-align:right"><div style="font-size:20px;font-weight:700;color:#1d4ed8">${oc.id}</div><div style="font-size:11px;color:#64748b">${oc.fecha}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div style="background:#f8fafc;border-radius:10px;padding:14px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:6px">Proveedor</div>
      <div style="font-weight:700">${pv?.nombre||"—"}</div>${pv?.tel?`<div style="font-size:12px;color:#64748b">📞 ${pv.tel}</div>`:""}${pv?.email?`<div style="font-size:12px;color:#64748b">✉️ ${pv.email}</div>`:""}${pv?.condPago?`<div style="font-size:12px;color:#64748b;margin-top:4px">💳 ${pv.condPago}</div>`:""}
    </div>
    <div style="background:#f8fafc;border-radius:10px;padding:14px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:6px">Detalles</div>
      <div style="font-size:13px">Fecha: <b>${oc.fecha}</b></div><div style="font-size:13px;margin-top:4px">Estado: <b>${oc.est}</b></div>${oc.notas?`<div style="font-size:12px;color:#64748b;margin-top:4px">${oc.notas}</div>`:""}

  </div>
  <table><thead><tr><th>Artículo</th><th style="width:60px;text-align:center">Cant.</th><th style="width:110px;text-align:right">P. Costo</th><th style="width:110px;text-align:right">Total</th></tr></thead><tbody>${rows}</tbody></table>
  <div class="total">TOTAL: ${mxn(tot)}</div>
  </body></html>`;
  const w=window.open("","_blank","width=720,height=800");

}

function CajaCobrarTab({ords,cls,pagos,session,config,onAddPago}){
  const [monto,setMonto]   = useState("");
  const [metodo,setMetodo] = useState("efectivo");
  const [ordId,setOrdId]   = useState("");
  const [concepto,setConcepto] = useState("");
  const [nota,setNota]     = useState("");
  const [ordSearch,setOrdSearch] = useState("");

  const hoy   = new Date().toISOString().slice(0,10);
  const ahora = new Date().toTimeString().slice(0,5);

  const ordsPend = ords.filter(o=>
    (o.est==="Listo"||o.est==="Diagnóstico"||o.est==="En reparación")
    && !pagos.some(p=>p.ordId===o.id && p.fecha===hoy)
  );
  const ordsFiltered = ordSearch.trim()
    ? ordsPend.filter(o=>{
        const cl=cls.find(x=>x.id===o.cid);
        return o.id.toLowerCase().includes(ordSearch.toLowerCase())
          || cl?.nombre?.toLowerCase().includes(ordSearch.toLowerCase())
          || o.equipo.toLowerCase().includes(ordSearch.toLowerCase());
      })
    : ordsPend;

  const selOrd = ords.find(o=>o.id===ordId);
  const selCli = cls.find(x=>x.id===selOrd?.cid);

  function selectOrd(id){
    setOrdId(id);
    const o=ords.find(x=>x.id===id);
    const cl=cls.find(x=>x.id===o?.cid);
    if(o) setConcepto("Reparación "+o.equipo+" — "+(cl?.nombre||""));
    if(o?.total) setMonto(String(o.total));
  }

  function pad(v){
    setMonto(p=>{
      if(v==="⌫") return p.slice(0,-1);
      if(v==="." && p.includes(".")) return p;
      if(p==="0" && v!==".") return v;
      return (p||"")+v;
    });
  }

  function registrar(){
    if(!monto||isNaN(Number(monto))||Number(monto)<=0){alert("Ingresa un monto válido.");return;}
    const nuevoPago={
      id:"PAG"+String(++PAGOQ).padStart(4,"0"),
      concepto:concepto.trim()||"Cobro "+metodo,
      metodo, monto:Number(monto),
      ordId, nota, fecha:hoy, hora:ahora, user:session?.nombre||""
    };
    onAddPago(nuevoPago);
    const ordRel=ords.find(o=>o.id===ordId);
    const cliRel=cls.find(x=>x.id===ordRel?.cid);
    printTicketCobro(nuevoPago, ordRel||null, cliRel||null, config||{});
    setMonto(""); setConcepto(""); setOrdId(""); setNota(""); setOrdSearch("");
  }

  const METODOS=[
    ["efectivo","💵","Efectivo","#059669","#f0fdf4","#bbf7d0"],
    ["transferencia","🏦","Transferencia","#1d4ed8","#eff6ff","#bfdbfe"],
    ["tarjeta","💳","Tarjeta","#9333ea","#fdf4ff","#e9d5ff"],
  ];

  const montoDisplay = monto
    ? "$"+Number(monto).toLocaleString("es-MX",{minimumFractionDigits:monto.includes(".")?2:0})
    : "$0";
  const cobrarLabel = monto
    ? "💰 COBRAR $"+Number(monto||0).toLocaleString("es-MX",{minimumFractionDigits:0})
    : "Ingresa monto";

  return html`<div style=${{flex:1,display:"flex",overflow:"hidden"}}>

    <!-- LEFT -->
    <div style=${{flex:1,overflowY:"auto",padding:"16px 12px 16px 20px",display:"flex",flexDirection:"column",gap:12}}>

      <!-- Buscar orden -->
      <div style=${{background:"var(--bg)",borderRadius:12,border:"1px solid var(--border)",padding:14}}>
        <div style=${{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:8}}>🔍 Vincular orden</div>
        <input value=${ordSearch} onChange=${e=>setOrdSearch(e.target.value)}
          placeholder="Buscar por ID, cliente o equipo…" style=${{marginBottom:8}}/>
        ${ordId&&selOrd&&html`
          <div style=${{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div>
              <div style=${{fontSize:12,fontWeight:700,color:"#1d4ed8"}}>${selOrd.id} — ${selOrd.equipo}</div>
              <div style=${{fontSize:11,color:"#3b82f6"}}>${selCli?.nombre||"?"} · ${selOrd.est}</div>
            </div>
            <button class="btn btn-ghost btn-sm" onClick=${()=>{setOrdId("");setConcepto("");setMonto("");}}>✕</button>
          </div>`}
        ${!ordId&&ordsFiltered.length>0&&html`
          <div style=${{maxHeight:150,overflowY:"auto",border:"1px solid var(--border)",borderRadius:8}}>
            ${ordsFiltered.map(o=>{
              const cl=cls.find(x=>x.id===o.cid);
              return html`<div key=${o.id} onClick=${()=>selectOrd(o.id)}
                style=${{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}
                onMouseOver=${e=>e.currentTarget.style.background="var(--bg2)"}
                onMouseOut=${e=>e.currentTarget.style.background="transparent"}>
                <div>
                  <div style=${{fontSize:12,fontWeight:700,color:"var(--text)"}}>${o.id} · ${o.equipo}</div>
                  <div style=${{fontSize:11,color:"var(--text3)"}}>${cl?.nombre||"?"}</div>
                </div>
                <div style=${{fontSize:12,fontWeight:700,color:"#059669"}}>${o.total?mxn(o.total):""}</div>
              </div>`;
            })}
          </div>`}
        ${!ordId&&ordsFiltered.length===0&&html`
          <div style=${{fontSize:11,color:"var(--text4)",padding:"4px 0"}}>
            ${ordsPend.length===0?"✓ Sin órdenes pendientes":ordSearch?"Sin resultados":"Escribe para buscar"}
          </div>`}
      </div>

      <!-- Concepto -->
      <div style=${{background:"var(--bg)",borderRadius:12,border:"1px solid var(--border)",padding:14}}>
        <div style=${{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:8}}>📝 Concepto</div>
        <input value=${concepto} onChange=${e=>setConcepto(e.target.value)}
          placeholder="ej. Reparación pantalla iPhone 12" style=${{marginBottom:8}}/>
        <textarea value=${nota} onChange=${e=>setNota(e.target.value)}
          placeholder="Nota interna (opcional)…" rows=${2}
          style=${{resize:"none",fontSize:12,width:"100%",boxSizing:"border-box",fontFamily:"inherit",
            border:"1px solid var(--border)",borderRadius:8,padding:"8px 10px",
            background:"var(--input-bg)",color:"var(--text)",outline:"none"}}/>
      </div>

      <!-- Método -->
      <div style=${{background:"var(--bg)",borderRadius:12,border:"1px solid var(--border)",padding:14}}>
        <div style=${{fontSize:12,fontWeight:700,color:"var(--text)",marginBottom:10}}>💳 Método de pago</div>
        <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          ${METODOS.map(([k,ic,lbl,col,bg,brd])=>html`
            <div key=${k} onClick=${()=>setMetodo(k)} style=${{
              padding:"12px 8px",borderRadius:10,cursor:"pointer",textAlign:"center",
              border:"2px solid",transition:"all .15s",
              borderColor:metodo===k?col:brd,background:metodo===k?bg:"var(--bg2)"}}>
              <div style=${{fontSize:22,marginBottom:4}}>${ic}</div>
              <div style=${{fontSize:11,fontWeight:700,color:metodo===k?col:"var(--text3)"}}>${lbl}</div>
            </div>`)}
        </div>
      </div>
    </div>

    <!-- RIGHT: numpad -->
    <div style=${{width:252,flexShrink:0,background:"var(--bg)",borderLeft:"1px solid var(--border)",display:"flex",flexDirection:"column",padding:12,gap:10}}>

      <div style=${{background:"linear-gradient(135deg,#1e3a8a,#1d4ed8)",borderRadius:12,padding:"16px 14px",textAlign:"center"}}>
        <div style=${{fontSize:10,color:"rgba(255,255,255,.6)",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Monto a cobrar</div>
        <div style=${{fontSize:monto?28:22,fontWeight:800,color:"#fff",minHeight:36,lineHeight:1}}>${montoDisplay}</div>
        <div style=${{fontSize:10,color:"rgba(255,255,255,.5)",marginTop:4,textTransform:"capitalize"}}>
          ${METODOS.find(m=>m[0]===metodo)?.[2]||""}
        </div>
      </div>

      <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
        ${["7","8","9","4","5","6","1","2","3",".","0","⌫"].map(v=>html`
          <button key=${v} onClick=${()=>pad(v)} style=${{
            padding:"11px 0",borderRadius:8,border:"1px solid var(--border)",
            background:v==="⌫"?"#fef2f2":"var(--bg2)",
            color:v==="⌫"?"#dc2626":"var(--text)",
            fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}
            onMouseOver=${e=>e.currentTarget.style.background=v==="⌫"?"#fee2e2":"var(--bg3)"}
            onMouseOut=${e=>e.currentTarget.style.background=v==="⌫"?"#fef2f2":"var(--bg2)"}>
            ${v}
          </button>`)}
      </div>

      <div style=${{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
        ${[50,100,200,500,1000,2000].map(v=>html`
          <button key=${v} onClick=${()=>setMonto(String(v))} style=${{
            padding:"5px 2px",border:"1px solid var(--border)",borderRadius:6,
            background:"var(--bg3)",color:"var(--text3)",fontSize:10,fontWeight:700,
            cursor:"pointer",fontFamily:"inherit"}}>
            $${v}
          </button>`)}
      </div>

      <button onClick=${registrar} style=${{
        padding:"13px",borderRadius:10,border:"none",cursor:"pointer",
        background:monto?"linear-gradient(135deg,#059669,#10b981)":"#e2e8f0",
        color:monto?"#fff":"#94a3b8",fontSize:13,fontWeight:800,fontFamily:"inherit"}}>
        ${cobrarLabel}
      </button>
    </div>
  </div>`;
}

}

    efectivo:arr.filter(p=>p.metodo==="efectivo").reduce((s,p)=>s+p.monto,0),
    transferencia:arr.filter(p=>p.metodo==="transferencia").reduce((s,p)=>s+p.monto,0),
    tarjeta:arr.filter(p=>p.metodo==="tarjeta").reduce((s,p)=>s+p.monto,0),

      <div style=${{marginLeft:"auto",display:"flex",gap:14}}>

      ${lista.length===0

        :html`
          <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"100px 72px 90px 1fr 130px 110px 110px",padding:"10px 20px"}}>
            ${["Fecha","Hora","Orden","Concepto","Método","Monto","Registró"].map(h=>html`<div key=${h}>${h}</div>`)}

          ${lista.map(p=>{
            const mc=BADGE[p.metodo]||["#f8fafc","#64748b"];

              <div style=${{fontSize:11,color:"var(--text3)"}}>${fmtD(p.fecha)}</div>
              <div style=${{fontFamily:"monospace",fontSize:11,color:"var(--text4)"}}>${p.hora||"—"}</div>
              <div style=${{fontSize:11,fontWeight:700,color:"#1d4ed8",fontFamily:"monospace"}}>${p.ordId||"—"}</div>

/* ══ CAJA SECTION ════════════════════════════════════════════════════════ */
function CajaSection({pagos,cortes,ords,cls,inv,session,config,onAddPago,onCorte,onDelPago}){
  const [tab,setTab]   = useState("cobrar");
  const [confirm,setConfirm] = useState(null);
  const [showCorteModal,setShowCorteModal] = useState(false);

  const hoy  = new Date().toISOString().slice(0,10);
  const ayer = new Date(Date.now()-86400000).toISOString().slice(0,10);

  const tot=arr=>({
    efectivo:arr.filter(p=>p.metodo==="efectivo").reduce((s,p)=>s+p.monto,0),
    transferencia:arr.filter(p=>p.metodo==="transferencia").reduce((s,p)=>s+p.monto,0),
    tarjeta:arr.filter(p=>p.metodo==="tarjeta").reduce((s,p)=>s+p.monto,0),
    total:arr.reduce((s,p)=>s+p.monto,0),
  });

  const pagosHoy  = pagos.filter(p=>p.fecha===hoy);
  const totHoy    = tot(pagosHoy);
  const delta     = totHoy.total - tot(pagos.filter(p=>p.fecha===ayer)).total;
  const ordsPend  = ords.filter(o=>(o.est==="Listo"||o.est==="Diagnóstico"||o.est==="En reparación")&&!pagos.some(p=>p.ordId===o.id&&p.fecha===hoy));

  const TABS=[["cobrar","💰","Cobrar"],["movimientos","📋","Movimientos"],["historial","🗓️","Historial"],["cortes","✂️","Cortes"]];

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden",background:"var(--bg2)"}}>

    <!-- Stat bar -->
    <div style=${{background:"var(--bg)",borderBottom:"1px solid var(--border)",padding:"12px 20px",display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,flexShrink:0}}>
      ${[
        ["TOTAL HOY",totHoy.total,"#1d4ed8","#eff6ff",delta],
        ["💵 EFECTIVO",totHoy.efectivo,"#059669","#f0fdf4",null],
        ["🏦 TRANSFERENCIA",totHoy.transferencia,"#1d4ed8","#eff6ff",null],
        ["💳 TARJETA",totHoy.tarjeta,"#9333ea","#fdf4ff",null],
      ].map(([lbl,val,col,bg,dlt])=>html`
        <div key=${lbl} style=${{background:bg,border:"1px solid",borderColor:col+"33",borderRadius:10,padding:"10px 14px"}}>
          <div style=${{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:1,color:col,opacity:.7,marginBottom:4}}>${lbl}</div>
          <div style=${{fontSize:20,fontWeight:800,color:col}}>${mxn(val)}</div>
          ${dlt!==null&&html`<div style=${{fontSize:10,marginTop:3,color:dlt>=0?"#059669":"#dc2626",fontWeight:600}}>${dlt>=0?"▲":"▼"} ${mxn(Math.abs(dlt))} vs ayer</div>`}
        </div>`)}
    </div>

    <!-- Tabs -->
    <div style=${{background:"var(--bg)",borderBottom:"1px solid var(--border)",display:"flex",padding:"0 16px",flexShrink:0}}>
      ${TABS.map(([k,ic,lbl])=>html`
        <button key=${k} onClick=${()=>setTab(k)} style=${{
          padding:"10px 16px",border:"none",cursor:"pointer",fontFamily:"inherit",
          fontSize:12,fontWeight:700,background:"transparent",display:"flex",alignItems:"center",gap:6,
          color:tab===k?"#1d4ed8":"#64748b",
          borderBottom:tab===k?"2px solid #1d4ed8":"2px solid transparent"}}>
          ${ic} ${lbl}
          ${k==="cobrar"&&ordsPend.length>0&&html`<span style=${{background:"#dc2626",color:"#fff",fontSize:9,padding:"1px 5px",borderRadius:99}}>${ordsPend.length}</span>`}
          ${k==="movimientos"&&pagosHoy.length>0&&html`<span style=${{background:"#1d4ed8",color:"#fff",fontSize:9,padding:"1px 5px",borderRadius:99}}>${pagosHoy.length}</span>`}
        </button>`)}
      <div style=${{marginLeft:"auto",display:"flex",alignItems:"center"}}>
        <button class="btn btn-primary btn-sm" onClick=${()=>setShowCorteModal(true)} style=${{fontSize:11}}>
          <${Ic} n="cut" z=${13} s="#fff"/> Corte
        </button>
      </div>
    </div>

    <!-- Content -->
    <div style=${{flex:1,overflow:"hidden",display:"flex"}}>
      ${tab==="cobrar"     &&html`<${CajaCobrarTab} ords=${ords} cls=${cls} pagos=${pagos} session=${session} config=${config} onAddPago=${onAddPago}/>`}
      ${tab==="movimientos"&&html`<${CajaMovimientosTab} pagosHoy=${pagosHoy} ords=${ords} cls=${cls} totHoy=${totHoy} onDel=${setConfirm}/>`}
      ${tab==="historial"  &&html`<${CajaHistorialTab} pagos=${pagos}/>`}
      ${tab==="cortes"     &&html`<${CajaCortesTab} cortes=${cortes}/>`}
    </div>

    ${showCorteModal&&html`<${CorteModal} totHoy=${totHoy} hoy=${hoy} session=${session} onCorte=${onCorte} onClose=${()=>setShowCorteModal(false)}/>`}
    ${confirm&&html`<${Confirm}
      msg=${"¿Eliminar cobro de <b>"+mxn(confirm.monto)+"</b>?"}
      onOk=${()=>{onDelPago(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}


/* ══ REPORTES EXCEL ══════════════════════════════════════════════════════ */
function ReportesSection({ords,cls,inv,tecs,svcs,pagos,cots,gars,onImportInv}){
  const [rango,setRango]=useState("mes");
  const [fechaD,setFD]=useState(new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10));
  const [fechaH,setFH]=useState(new Date().toISOString().slice(0,10));
  const [generando,setGenerando]=useState("");

  function getRango(){
    const hoy=new Date();
    if(rango==="hoy"){const d=hoy.toISOString().slice(0,10);return[d,d];}
    if(rango==="semana"){const d=new Date(hoy);d.setDate(hoy.getDate()-7);return[d.toISOString().slice(0,10),hoy.toISOString().slice(0,10)];}
    if(rango==="mes"){return[new Date(hoy.getFullYear(),hoy.getMonth(),1).toISOString().slice(0,10),hoy.toISOString().slice(0,10)];}
    if(rango==="anio"){return[hoy.getFullYear()+"-01-01",hoy.toISOString().slice(0,10)];}
    return[fechaD,fechaH];
  }

  function inRange(fecha){const[d,h]=getRango();return fecha>=d&&fecha<=h;}

  function toCSV(headers,rows){
    const esc=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
    return[headers.map(esc).join(","),...rows.map(r=>r.map(esc).join(","))].join("\n");
  }

  function download(filename, csv){
    const bom="\uFEFF";
    const blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
  }

  const [importando,setImportando]=useState(false);
  const [importPreview,setImportPreview]=useState(null); // {rows,errors}
  const fileRef=React.useRef();

  function parseCSV(text){
    const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
    if(lines.length<2) return{rows:[],errors:["El archivo está vacío o no tiene datos."]};
    const headers=lines[0].split(",").map(h=>h.replace(/^"|"$/g,"").trim().toLowerCase());
    // Expected: sku, nombre, categoría, stock, precio costo, precio venta, margen %, valor en stock
    // Flexible matching
    const findCol=(keys)=>{for(const k of keys){const i=headers.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
    const iSKU=findCol(["sku","id"]);
    const iNom=findCol(["nombre","name","descripci"]);
    const iCat=findCol(["categor"]);
    const iStock=findCol(["stock"]);
    const iCosto=findCol(["costo","cost"]);
    const iVenta=findCol(["venta","precio","price"]);
    const iMargen=findCol(["margen","margin","ganancia"]);
    if(iNom<0) return{rows:[],errors:["No se encontró columna 'Nombre' en el archivo."]};
    const rows=[];const errors=[];
    lines.slice(1).forEach((line,i)=>{
      const cols=line.match(/(".*?"|[^,]+|(?<=,)(?=,))/g)||line.split(",");
      const get=idx=>idx>=0?(cols[idx]||"").replace(/^"|"$/g,"").trim():"";
      const nombre=get(iNom);
      if(!nombre){return;}
      const precio=parseFloat(get(iVenta))||0;
      const costo=parseFloat(get(iCosto))||0;
      const stock=parseInt(get(iStock))||0;
      const margen=parseFloat(get(iMargen))||0;
      const cat=get(iCat)||"Otro";
      const rawId=get(iSKU);
      const id=rawId||`P${Date.now()}_${i}`;
      if(precio<0||stock<0){errors.push(`Fila ${i+2}: valores negativos ignorados.`);return;}
      rows.push({id,nombre,cat,stock,precio,costo,margen});
    });
    return{rows,errors};
  }

  function handleFile(e){
    const file=e.target.files[0];
    if(!file){return;}
    if(!file.name.toLowerCase().endsWith(".csv")&&!file.name.toLowerCase().endsWith(".txt")){alert("Solo se aceptan archivos .csv");e.target.value="";return;}
    setImportando(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      const result=parseCSV(ev.target.result);
      setImportPreview(result);
      setImportando(false);
    };
    reader.readAsText(file,"UTF-8");
    e.target.value="";
  }

  function exportOrdenes(){
    setGenerando("ordenes");
    const [d,h]=getRango();
    const rows=ords.filter(o=>o.fecha>=d&&o.fecha<=h).map(o=>{
      const cli=cls.find(c=>c.id===o.cid);
      const tec=tecs.find(t=>t.id===o.tec);
      return[o.id,o.fecha,cli?.nombre||"",cli?.tel||"",o.equipo,o.serie||"",o.prob,o.est,o.urg,tec?.nombre||"",o.notas||""];
    });
    download(`Redcom_Ordenes_${d}_${h}.csv`,
      toCSV(["Folio","Fecha","Cliente","Teléfono","Equipo","Serie","Problema","Estado","Urgencia","Técnico","Notas"],rows));
    setTimeout(()=>setGenerando(""),800);
  }

  function exportVentas(){
    setGenerando("ventas");
    const [d,h]=getRango();
    const rows=pagos.filter(p=>p.fecha>=d&&p.fecha<=h).map(p=>{
      const ord=ords.find(o=>o.id===p.ordId);
      const cli=cls.find(c=>c.id===ord?.cid);
      return[p.id,p.fecha,p.hora||"",p.concepto,p.metodo,p.monto,p.ordId||"",cli?.nombre||"",p.user||""];
    });
    download(`Redcom_Ventas_${d}_${h}.csv`,
      toCSV(["ID Cobro","Fecha","Hora","Concepto","Método","Monto","Orden","Cliente","Cajero"],rows));
    setTimeout(()=>setGenerando(""),800);
  }

  function exportTecnicos(){
    setGenerando("tecnicos");
    const [d,h]=getRango();
    const filtOrd=ords.filter(o=>o.fecha>=d&&o.fecha<=h);
    const rows=tecs.filter(t=>t.rol!=="Sistema").map(t=>{
      const mis=filtOrd.filter(o=>o.tec===t.id);
      const entregadas=mis.filter(o=>o.est==="Entregado").length;
      const enProceso=mis.filter(o=>o.est!=="Entregado").length;
      const urgentes=mis.filter(o=>o.urg==="Urgente").length;
      return[t.nombre,t.especialidad,mis.length,entregadas,enProceso,urgentes];
    });
    download(`Redcom_Tecnicos_${d}_${h}.csv`,
      toCSV(["Técnico","Especialidad","Total Órdenes","Entregadas","En Proceso","Urgentes"],rows));
    setTimeout(()=>setGenerando(""),800);
  }

  function exportInventario(){
    setGenerando("inventario");
    const rows=inv.map(p=>[p.id,p.nombre,p.cat,p.stock,p.costo||0,p.precio,p.margen||0,(p.precio-(p.costo||0))*p.stock]);
    download(`Redcom_Inventario_${new Date().toISOString().slice(0,10)}.csv`,
      toCSV(["SKU","Nombre","Categoría","Stock","Precio Costo","Precio Venta","Margen %","Valor en Stock"],rows));
    setTimeout(()=>setGenerando(""),800);
  }

  function exportCotizaciones(){
    setGenerando("cotizaciones");
    const [d,h]=getRango();
    const rows=cots.filter(ct=>ct.fecha>=d&&ct.fecha<=h).map(ct=>{
      const cli=cls.find(c=>c.id===ct.cid);
      const tec=tecs.find(t=>t.id===ct.tec);
      return[ct.id,ct.fecha,cli?.nombre||"",ct.ref||"",tec?.nombre||"",ct.items.length,ct.sub||0,ct.iva||0,ct.tot||0,ct.est];
    });
    download(`Redcom_Cotizaciones_${d}_${h}.csv`,
      toCSV(["Folio","Fecha","Cliente","Referencia","Asesor","Ítems","Subtotal","IVA","Total","Estado"],rows));
    setTimeout(()=>setGenerando(""),800);
  }

  function exportGarantias(){
    setGenerando("garantias");
    const rows=gars.map(g=>{
      const cli=cls.find(c=>c.id===g.cliId);
      return[g.id,g.ordId,cli?.nombre||"",g.equipo,g.fechaEntrega,g.fechaVence,g.dias,g.estado,g.reclamoNotas||""];
    });
    download(`Redcom_Garantias_${new Date().toISOString().slice(0,10)}.csv`,
      toCSV(["ID Garantía","Orden","Cliente","Equipo","Fecha Entrega","Fecha Vence","Días","Estado","Notas Reclamo"],rows));
    setTimeout(()=>setGenerando(""),800);
  }

  // Stats for preview cards
  const [d,h]=getRango();
  const ordsF=ords.filter(o=>o.fecha>=d&&o.fecha<=h);
  const pagosF=pagos.filter(p=>p.fecha>=d&&p.fecha<=h);
  const totalVentas=pagosF.reduce((a,p)=>a+p.monto,0);

  const REPORTS=[
    {key:"ordenes",  icon:"orders",  color:"#1d4ed8",bg:"#eff6ff",  title:"Órdenes de Trabajo", desc:"Folio, cliente, equipo, técnico, estado",   count:ordsF.length+" órdenes",         fn:exportOrdenes},
    {key:"ventas",   icon:"cash",    color:"#059669",bg:"#f0fdf4",  title:"Ventas / Cobros",     desc:"Cobros con método de pago y cajero",        count:mxn(totalVentas)+" en el período",fn:exportVentas},
    {key:"tecnicos", icon:"techs",   color:"#7c3aed",bg:"#f5f3ff",  title:"Productividad Técnicos",desc:"Órdenes por técnico, entregadas, urgentes",count:tecs.filter(t=>t.rol!=="Sistema").length+" técnicos",fn:exportTecnicos},
    {key:"inventario",icon:"inv",    color:"#ea580c",bg:"#fff7ed",  title:"Inventario",           desc:"Stock, costos, precios y valor en almacén", count:inv.length+" artículos",         fn:exportInventario, canImport:true},
    {key:"cotizaciones",icon:"tag",  color:"#0891b2",bg:"#f0f9ff",  title:"Cotizaciones",         desc:"Cotizaciones emitidas con totales",          count:cots.filter(ct=>ct.fecha>=d&&ct.fecha<=h).length+" cotizaciones",fn:exportCotizaciones},
    {key:"garantias",icon:"warranty",color:"#d97706",bg:"#fffbeb",  title:"Garantías",            desc:"Vigentes, expiradas y reclamos",             count:gars.length+" garantías",        fn:exportGarantias},
  ];

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:14}}>
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Reportes y Exportación</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:2}}>Exporta a CSV — compatible con Excel, Google Sheets</div>
        </div>
      </div>
      <!-- Rango de fechas -->
      <div style=${{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <div style=${{display:"flex",gap:4}}>
          ${[["hoy","Hoy"],["semana","7 días"],["mes","Este mes"],["anio","Este año"],["custom","Personalizado"]].map(([k,lbl])=>html`
            <button key=${k} onClick=${()=>setRango(k)} class="btn btn-sm" style=${{
              background:rango===k?"#1d4ed8":"#f8fafc",color:rango===k?"#fff":"#64748b",
              border:`1px solid ${rango===k?"#1d4ed8":"#e2e8f0"}`}}>${lbl}</button>`)}
        </div>
        ${rango==="custom"&&html`<div style=${{display:"flex",gap:6,alignItems:"center"}}>
          <input type="date" value=${fechaD} onChange=${e=>setFD(e.target.value)} style=${{padding:"5px 8px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:12}}/>
          <span style=${{fontSize:11,color:"#94a3b8"}}>al</span>
          <input type="date" value=${fechaH} onChange=${e=>setFH(e.target.value)} style=${{padding:"5px 8px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:12}}/>
        </div>`}
      </div>
    </div>

    <div style=${{flex:1,overflowY:"auto",padding:"20px 24px"}}>
      <div style=${{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(290px,1fr))",gap:14}}>
        ${REPORTS.map(r=>html`
          <div key=${r.key} style=${{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"18px 20px",boxShadow:"0 1px 4px rgba(0,0,0,.04)",display:"flex",flexDirection:"column",gap:12}}>
            <div style=${{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style=${{width:42,height:42,borderRadius:10,background:r.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <${Ic} n=${r.icon} z=${20} s=${r.color}/>
              </div>
              <div style=${{flex:1}}>
                <div style=${{fontWeight:700,fontSize:14}}>${r.title}</div>
                <div style=${{fontSize:11,color:"#94a3b8",marginTop:2}}>${r.desc}</div>
              </div>
            </div>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
              <div style=${{fontSize:12,fontWeight:600,color:r.color,background:r.bg,padding:"3px 10px",borderRadius:99}}>${r.count}</div>
              <div style=${{display:"flex",gap:6}}>
                ${r.canImport&&html`<button class="btn btn-sm" onClick=${()=>fileRef.current?.click()}
                  style=${{background:"#fff",color:"#059669",border:"1.5px solid #059669",fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
                  <${Ic} n="ok" z=${13} s="#059669"/> Importar CSV
                </button>`}
                <button class="btn btn-sm" onClick=${r.fn}
                  style=${{background:generando===r.key?r.bg:"#fff",color:r.color,border:`1.5px solid ${r.color}`,fontWeight:700,display:"flex",alignItems:"center",gap:5}}>
                  ${generando===r.key
                    ?html`<span style=${{display:"inline-block",width:12,height:12,border:"2px solid "+r.color,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>`
                    :html`<${Ic} n="download" z=${13} s=${r.color}/>`}
                  ${generando===r.key?"Generando...":"Exportar CSV"}
                </button>
              </div>
            </div>
          </div>`)}
      </div>
    </div>
  </div>`;
}


/* ══ MÓDULO GARANTÍAS ════════════════════════════════════════════════════ */
function GarantiasSection({gars,ords,cls,tecs,onAdd,onReclamo,onDel}){
  const [q,setQ]=useState("");
  const [estF,setEstF]=useState("Todos");
  const [confirm,setConfirm]=useState(null);
  const [showReclamo,setShowReclamo]=useState(null);
  const hoy=new Date();

  const filt=gars.filter(g=>{
    const cli=cls.find(c=>c.id===g.cliId);
    const mq=!q||g.ordId.toLowerCase().includes(q.toLowerCase())||(cli?.nombre||"").toLowerCase().includes(q.toLowerCase())||g.equipo.toLowerCase().includes(q.toLowerCase());
    const me=estF==="Todos"||g.estado===estF;
    return mq&&me;
  }).map(g=>{
    const vence=new Date(g.fechaVence);
    const diasRestantes=Math.ceil((vence-hoy)/(1000*60*60*24));
    const estado=g.estado==="Reclamada"?"Reclamada":diasRestantes<0?"Expirada":diasRestantes<=7?"Por vencer":"Vigente";
    return {...g,estado,diasRestantes};
  });

  const EST_C={Vigente:["#f0fdf4","#059669"],Expirada:["#f8fafc","#94a3b8"],"Por vencer":["#fffbeb","#d97706"],Reclamada:["#fef2f2","#dc2626"]};

  return html`<div style=${{height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style=${{padding:"16px 24px",borderBottom:"1px solid #e2e8f0",background:"#fff",flexShrink:0}}>
      <div class="section-header">
        <div>
          <h2 style=${{fontSize:18,fontWeight:700}}>Garantías</h2>
          <div style=${{fontSize:12,color:"#94a3b8",marginTop:2}}>
            ${gars.filter(g=>g.estado!=="Expirada"&&g.estado!=="Reclamada").length} activas ·
            <span style=${{color:"#d97706",fontWeight:600}}> ${filt.filter(g=>g.diasRestantes>=0&&g.diasRestantes<=7&&g.estado!=="Reclamada").length} por vencer</span>
          </div>
        </div>
      </div>
      <div style=${{display:"flex",gap:8,flexWrap:"wrap"}}>
        <div class="search-bar" style=${{maxWidth:280}}>
          <span class="search-icon"><${Ic} n="search" z=${14} s="#94a3b8"/></span>
          <input value=${q} onChange=${e=>setQ(e.target.value)} placeholder="Buscar orden, cliente, equipo..."/>
        </div>
        <div style=${{display:"flex",gap:4,flexWrap:"wrap"}}>
          ${["Todos","Vigente","Por vencer","Expirada","Reclamada"].map(x=>html`
            <button key=${x} onClick=${()=>setEstF(x)} class="btn btn-sm" style=${{
              background:estF===x?(EST_C[x]||["#eff6ff","#1d4ed8"])[0]:"#f8fafc",
              color:(EST_C[x]||["#eff6ff","#1d4ed8"])[1],
              border:`1px solid ${estF===x?(EST_C[x]||["#eff6ff","#1d4ed8"])[1]:"#e2e8f0"}`}}>${x}</button>`)}
        </div>
      </div>
    </div>
    <div style=${{flex:1,overflowY:"auto"}}>
      ${filt.length===0
        ?html`<div class="empty-state"><${Ic} n="warranty" z=${28} s="#cbd5e1"/><div style=${{marginTop:10}}>Sin garantías${estF!=="Todos"?" con estado "+estF:""}</div></div>`
        :html`
          <div class="tbl-hdr" style=${{display:"grid",gridTemplateColumns:"110px 1fr 130px 110px 100px 120px 90px"}}>
            ${["Orden","Cliente / Equipo","Vence","Días restantes","Garantía","Estado",""].map(h=>html`<div key=${h}>${h}</div>`)}
          </div>
          ${filt.map(g=>{
            const cli=cls.find(c=>c.id===g.cliId);
            const ec=EST_C[g.estado]||["#f8fafc","#64748b"];
            return html`<div key=${g.id} class="tbl-row" style=${{display:"grid",gridTemplateColumns:"110px 1fr 130px 110px 100px 120px 90px"}}>
              <div style=${{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",color:"#1d4ed8",fontWeight:600}}>${g.ordId}</div>
              <div>
                <div style=${{fontWeight:600,fontSize:13}}>${cli?.nombre||"—"}</div>
                <div style=${{fontSize:11,color:"#94a3b8"}}>${g.equipo}</div>
              </div>
              <div style=${{fontSize:12}}>${fmtD(g.fechaVence)}</div>
              <div style=${{fontSize:13,fontWeight:700,color:g.diasRestantes<0?"#94a3b8":g.diasRestantes<=7?"#d97706":"#059669"}}>
                ${g.diasRestantes<0?"Expirada":g.diasRestantes===0?"Hoy":g.diasRestantes+" días"}
              </div>
              <div style=${{fontSize:12,color:"#475569"}}>${g.dias} días</div>
              <div><span style=${{background:ec[0],color:ec[1],padding:"2px 9px",borderRadius:99,fontSize:11,fontWeight:700}}>${g.estado}</span></div>
              <div style=${{display:"flex",gap:3,padding:"9px 6px",justifyContent:"flex-end"}}>
                ${g.estado!=="Expirada"&&g.estado!=="Reclamada"&&html`
                  <button class="btn btn-sm" style=${{background:"#fef2f2",color:"#dc2626",border:"1px solid #fca5a5",fontSize:10,padding:"3px 7px"}}
                    onClick=${()=>setShowReclamo(g)}>Reclamo</button>`}
                <button class="btn btn-danger btn-sm" onClick=${()=>setConfirm(g)}><${Ic} n="trash" z=${11} s="#dc2626"/></button>
              </div>
            </div>`;
          })}`}
    </div>
    ${showReclamo&&html`<${ReclamoModal}
      gar=${showReclamo} cls=${cls} tecs=${tecs}
      onSave=${(g,notas)=>{onReclamo(g,notas);setShowReclamo(null);}}
      onClose=${()=>setShowReclamo(null)}/>`}
    ${confirm&&html`<${Confirm}
      msg=${"¿Eliminar la garantía de la orden <b>"+confirm.ordId+"</b>?"}
      onOk=${()=>{onDel(confirm.id);setConfirm(null);}}
      onCancel=${()=>setConfirm(null)}/>`}
  </div>`;
}

    <div class="modal fade-in" style=${{maxWidth:460}} onClick=${e=>e.stopPropagation()}>

      </div>
